<!doctype html>
<html lang="tl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Overtime Scheduler — Polished Mobile</title>
  <meta name="description" content="Mobile-first overtime scheduler: roomy spacing, accessible controls, iOS-safe date input, locked-by-default." />
  <style>
    :root{
      --bg:#0f1724; --card:#0b1220; --text:#e6eef8; --muted:#9fb0c6;
      --accent:#60a5fa; --accent-2:#3b82f6; --danger:#ef4444;
      --glass: rgba(255,255,255,0.03);
      --shadow: 0 12px 40px rgba(2,6,23,0.6);
      --input-h:46px; --radius:12px;
      --mobile-width:360px; --pad:18px; --gap:14px;
      --fs:16px;
    }

    /* Reset & base */
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%;margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;-webkit-font-smoothing:antialiased;font-size:var(--fs)}
    input,button,select,textarea{font-family:inherit}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer}

    /* Canvas */
    .canvas{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:22px;background:var(--bg)}
    .app{width:var(--mobile-width);max-width:100%;display:flex;flex-direction:column;gap:18px;align-items:stretch}

    /* Card */
    .card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,0.04);overflow:visible}

    /* Header */
    .header{display:flex;flex-direction:column;gap:10px}
    .brand{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .brand h1{font-size:1.05rem;margin:0}
    .brand p{margin:0;color:var(--muted);font-size:.9rem}
    .controls{display:flex;gap:10px;align-items:center}
    .search{flex:1;border-radius:10px;padding:10px 12px;height:var(--input-h);border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:var(--text);min-width:0}

    /* Status / small text */
    .meta{font-size:.88rem;color:var(--muted);text-align:center}

    /* Entries list */
    .list{display:flex;flex-direction:column;gap:12px}
    .item{display:flex;flex-direction:column;gap:10px;padding:12px;border-radius:12px;background:var(--glass);border:1px solid rgba(255,255,255,0.04)}
    .item-top{display:flex;gap:10px;align-items:center;justify-content:space-between}
    .item-left{flex:1;display:flex;flex-direction:column;gap:8px}
    .name{font-weight:600;font-size:0.98rem}
    .notes{color:var(--muted);font-size:.88rem}
    .date-pill{min-width:96px;text-align:center;padding:8px;border-radius:10px;border:1px solid rgba(255,255,255,0.02);background:transparent;color:var(--text)}
    .item-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}

    /* Buttons */
    .btn{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#fff;border:0;padding:9px 12px;border-radius:10px;font-weight:600}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted)}
    .btn.danger{background:transparent;border:1px solid rgba(255,0,0,0.08);color:var(--danger)}
    .btn.full{width:100%}

    /* Add form */
    #formCard{display:flex;flex-direction:column;gap:12px}
    #formCard label{font-size:.9rem;color:var(--muted);margin:0 0 6px 0;text-align:center;display:block}
    .field{display:flex;flex-direction:column;gap:6px}
    input[type="text"], input[type="date"], textarea{
      width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--text);height:var(--input-h);text-align:center;box-sizing:border-box;
    }

    .add-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .form-actions{display:flex;gap:10px;flex-direction:column}
    .form-actions .btn{width:100%}

    /* Date wrapper: reserve space for native calendar icon */
    .date-wrap{position:relative;width:100%}
    .date-wrap input[type="date"]{padding:10px 44px 10px 12px;-webkit-appearance:textfield;appearance:textfield}
    .date-wrap input[type="date"]::-webkit-calendar-picker-indicator{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:28px;height:28px;opacity:0.95;cursor:pointer;padding:4px}
    .date-wrap input[type="date"]::-webkit-datetime-edit, .date-wrap input[type="date"]::-webkit-datetime-edit-fields-wrapper, .date-wrap input[type="date"]::-webkit-datetime-edit-text { padding:0;margin:0;line-height:1.1; }

    /* Inline edit styles */
    .editing .edit-input{display:block}
    .edit-input{display:none;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--text);width:100%;box-sizing:border-box}

    /* Empty state */
    .empty{padding:18px;border-radius:10px;background:rgba(255,255,255,0.01);text-align:center;color:var(--muted)}

    /* Modal */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;padding:20px;z-index:9999}
    .modal{background:var(--card);padding:16px;border-radius:12px;max-width:420px;width:100%;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,0.06)}

    /* Disabled visual */
    .lock-guard[disabled]{opacity:0.45;pointer-events:none}

    /* Responsive tweaks for very small phones */
    @media (max-width:340px){
      :root{ --mobile-width:320px; --pad:12px; }
      .add-row{grid-template-columns:1fr}
      .form-actions{gap:8px}
      .date-wrap input[type="date"]{padding-right:12px}
    }

    /* Desktop: keep mobile canvas centered but same width */
    @media (min-width:720px){
      .canvas{padding-top:28px}
      .app{box-shadow:0 12px 50px rgba(0,0,0,0.5);border-radius:14px}
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="app" role="application" aria-label="Overtime Scheduler — Mobile">
      <header class="card header" aria-labelledby="appTitle">
        <div class="brand">
          <div>
            <h1 id="appTitle">Overtime Scheduler</h1>
            <p class="meta">Locked by default — unlock to add or edit</p>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <div id="lockIndicator" aria-hidden="true" style="width:10px;height:10px;border-radius:50%;background:#ef4444"></div>
            <div id="lockLabel" class="meta" style="font-size:.9rem">Locked</div>
          </div>
        </div>

        <div class="controls" role="search">
          <input id="search" class="search" placeholder="Search name or notes" aria-label="Search entries" />
          <button id="openUnlock" class="btn ghost" title="Unlock actions">Unlock</button>
        </div>
      </header>

      <main class="card" aria-live="polite">
        <div style="display:flex;flex-direction:column;gap:12px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <strong>Entries</strong>
            <span id="status" class="meta">Idle</span>
          </div>

          <div id="rows" class="list" aria-live="polite"></div>
          <div id="empty" class="empty" style="display:none">Walang entries. I-unlock at magdagdag ng bagong overtime.</div>
        </div>
      </main>

      <aside id="formCard" class="card" aria-labelledby="addOvertimeTitle">
        <strong id="addOvertimeTitle" style="display:block;text-align:center">Add Overtime</strong>

        <form id="addForm" autocomplete="off" novalidate>
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" class="lock-guard" type="text" placeholder="Employee name" required />
          </div>

          <div class="add-row">
            <div class="field">
              <label for="overtime_date">Date</label>
              <div class="date-wrap">
                <input id="overtime_date" name="overtime_date" class="lock-guard" type="date" />
              </div>
            </div>

            <div class="field">
              <label for="notes">Notes</label>
              <input id="notes" name="notes" class="lock-guard" type="text" placeholder="Short note" />
            </div>
          </div>

          <div class="form-actions">
            <button id="submitBtn" class="btn lock-guard" type="submit">Add</button>
            <button id="resetBtn" type="button" class="btn ghost lock-guard">Reset</button>
            <button id="lockToggle" type="button" class="btn ghost" title="Lock or unlock">Unlock</button>
          </div>
        </form>
      </aside>

      <footer style="text-align:center;color:var(--muted);font-size:.85rem;padding:6px 0">
        <div style="font-weight:700">BoxTechHub™</div>
        <div style="font-size:.8rem;margin-top:4px">© 2026 BoxTechHub</div>
      </footer>
    </div>
  </div>

  <!-- Unlock modal -->
  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal" role="document" aria-labelledby="modalTitle">
      <h3 id="modalTitle" style="margin:0 0 8px 0">Unlock Actions</h3>
      <p style="margin:0 0 10px;color:var(--muted)">Enter password to enable Add / Edit / Delete</p>
      <input id="pwInput" type="password" placeholder="Password" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);margin-bottom:10px" />
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button id="pwCancel" class="btn ghost">Cancel</button>
        <button id="pwSubmit" class="btn">Submit</button>
      </div>
      <div id="pwError" style="color:var(--danger);margin-top:8px;display:none"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const SUPABASE_URL = 'https://bisvmgjgyvludhqsvvcn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpc3ZtZ2pneXZsdWRocXN2dmNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTI1ODMsImV4cCI6MjA4NzI2ODU4M30.eodsmChKwoEiPlNz9d2Ge3lAmO3BWfdKRWVRdgk9Xl8';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const rowsEl = document.getElementById('rows');
    const statusEl = document.getElementById('status');
    const emptyEl = document.getElementById('empty');
    const form = document.getElementById('addForm');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const searchInput = document.getElementById('search');
    const lockToggle = document.getElementById('lockToggle');
    const openUnlock = document.getElementById('openUnlock');
    const lockIndicator = document.getElementById('lockIndicator');
    const lockLabel = document.getElementById('lockLabel');

    const modalBackdrop = document.getElementById('modalBackdrop');
    const pwInput = document.getElementById('pwInput');
    const pwSubmit = document.getElementById('pwSubmit');
    const pwCancel = document.getElementById('pwCancel');
    const pwError = document.getElementById('pwError');

    const LOCAL_KEY = 'overtime_unlocked_v2';
    let dataCache = [];
    let unlocked = false;

    function safeGetLocal(key){ try { return localStorage.getItem(key); } catch (e) { return null; } }
    function safeSetLocal(key, value){ try { localStorage.setItem(key, value); return true; } catch (e) { return false; } }
    function formatDate(d){ if(!d) return '—'; return new Date(d + 'T00:00:00').toLocaleDateString(); }
    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    // Update lock-guarded elements
    function updateGuardedControls(){
      const guarded = document.querySelectorAll('.lock-guard');
      guarded.forEach(el => {
        if (unlocked) el.removeAttribute('disabled');
        else el.setAttribute('disabled','true');
      });
      lockIndicator.style.background = unlocked ? '#60a5fa' : '#ef4444';
      lockLabel.textContent = unlocked ? 'Unlocked' : 'Locked';
      lockToggle.textContent = unlocked ? 'Lock' : 'Unlock';
      openUnlock.textContent = unlocked ? 'Lock' : 'Unlock';
    }

    function setUnlockedState(state, persist = true){
      unlocked = !!state;
      updateGuardedControls();
      if (persist) safeSetLocal(LOCAL_KEY, unlocked ? 'true' : 'false');
    }

    // Modal controls
    function openModal(){ modalBackdrop.style.display = 'flex'; modalBackdrop.setAttribute('aria-hidden','false'); pwInput.value=''; pwError.style.display='none'; pwInput.focus(); }
    function closeModal(){ modalBackdrop.style.display = 'none'; modalBackdrop.setAttribute('aria-hidden','true'); pwError.style.display='none'; }

    async function submitPassword(password){
      try {
        pwError.style.display = 'block';
        pwError.textContent = 'Checking...';
        const res = await fetch('/api/unlock', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password }) });
        const raw = await res.text();
        let parsed;
        try { parsed = raw ? JSON.parse(raw) : null; } catch (e) { parsed = null; }
        if (!res.ok) {
          const msg = parsed?.error || parsed?.message || raw || `HTTP ${res.status}`;
          pwError.textContent = `Server: ${msg}`;
          return;
        }
        setUnlockedState(true, true);
        closeModal();
      } catch (err) {
        console.error(err);
        pwError.textContent = 'Network or server error.';
      }
    }

    // Render list
    function createRowElement(row){
      const el = document.createElement('div');
      el.className = 'item';
      el.dataset.id = row.id;
      el.innerHTML = `
        <div class="item-top">
          <div class="item-left">
            <div class="name" data-field="name">${escapeHtml(row.name)}</div>
            <div class="notes" data-field="notes">${escapeHtml(row.notes || '')}</div>
          </div>
          <div class="date-pill" data-field="overtime_date">${row.overtime_date ? formatDate(row.overtime_date) : '—'}</div>
        </div>
        <div class="item-bottom" style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <div class="meta-small" style="color:var(--muted)">${row.id ? 'ID: ' + row.id : ''}</div>
          <div class="item-actions">
            <button class="btn ghost lock-guard" data-action="edit">Edit</button>
            <button class="btn ghost lock-guard" data-action="delete">Delete</button>
          </div>
        </div>
      `;
      return el;
    }

    function renderList(items){
      rowsEl.innerHTML = '';
      if (!items || !items.length) { emptyEl.style.display = 'block'; statusEl.textContent = 'No entries'; return; }
      emptyEl.style.display = 'none';
      items.forEach(r => rowsEl.appendChild(createRowElement(r)));
      updateGuardedControls();
      statusEl.textContent = `Loaded ${items.length} entries`;
    }

    // Load rows (Supabase)
    async function loadRows(){
      statusEl.textContent = 'Loading...';
      try {
        const { data, error } = await supabase.from('overtime_data').select('id,name,notes,overtime_date').order('overtime_date',{ascending:true});
        if (error) throw error;
        dataCache = (data || []);
        renderList(dataCache);
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error loading data';
      }
    }

    // Add form
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!unlocked) { alert('Actions are locked. Unlock to add entries.'); return; }
      const name = form.name.value.trim();
      const notes = form.notes.value.trim();
      const overtime_date = form.overtime_date.value || null;
      if (!name) { alert('Name is required'); return; }
      submitBtn.disabled = true; submitBtn.textContent = 'Adding...';
      try {
        const { data, error } = await supabase.from('overtime_data').insert([{ name, notes, overtime_date }]).select();
        if (error) throw error;
        dataCache = [...dataCache, ...(data||[])];
        renderList(dataCache);
        form.reset();
      } catch (err) {
        console.error(err);
        alert('Insert failed: ' + (err.message || err));
      } finally {
        submitBtn.disabled = false; submitBtn.textContent = 'Add';
      }
    });

    resetBtn.addEventListener('click', () => form.reset());

    // Row actions (edit/delete/save/cancel)
    rowsEl.addEventListener('click', async (ev) => {
      const action = ev.target?.dataset?.action;
      if (!action) return;
      const item = ev.target.closest('.item');
      const id = item?.dataset?.id;
      if (!id) return;

      if (action === 'delete') {
        if (!unlocked) { alert('Actions are locked. Unlock to delete.'); return; }
        if (!confirm('Delete this entry? This cannot be undone.')) return;
        try {
          const { error } = await supabase.from('overtime_data').delete().eq('id', id);
          if (error) throw error;
          dataCache = dataCache.filter(r => String(r.id) !== String(id));
          renderList(dataCache);
        } catch (err) {
          console.error(err);
          alert('Delete failed: ' + (err.message || err));
        }
        return;
      }

      if (action === 'edit') {
        if (!unlocked) { alert('Actions are locked. Unlock to edit.'); return; }
        // Replace item content with inline edit form
        const row = dataCache.find(r => String(r.id) === String(id));
        if (!row) return;
        item.classList.add('editing');
        item.innerHTML = `
          <div style="display:flex;flex-direction:column;gap:10px">
            <input class="edit-input" data-edit="name" type="text" value="${escapeHtml(row.name)}" />
            <div class="date-wrap"><input class="edit-input" data-edit="overtime_date" type="date" value="${row.overtime_date || ''}" /></div>
            <input class="edit-input" data-edit="notes" type="text" value="${escapeHtml(row.notes || '')}" />
            <div style="display:flex;gap:8px">
              <button class="btn ghost" data-action="save">Save</button>
              <button class="btn ghost" data-action="cancel">Cancel</button>
            </div>
          </div>
        `;
        updateGuardedControls();
        return;
      }

      if (action === 'save') {
        if (!unlocked) { alert('Actions are locked. Unlock to save.'); return; }
        const inputs = item.querySelectorAll('.edit-input');
        const name = inputs[0]?.value.trim();
        const overtime_date = inputs[1]?.value || null;
        const notes = inputs[2]?.value.trim();
        if (!name) { alert('Name required'); return; }
        try {
          const { data, error } = await supabase.from('overtime_data').update({ name, notes, overtime_date }).eq('id', id).select();
          if (error) throw error;
          dataCache = dataCache.map(r => String(r.id) === String(id) ? (data && data[0]) || { ...r, name, notes, overtime_date } : r);
          renderList(dataCache);
        } catch (err) {
          console.error(err);
          alert('Update failed: ' + (err.message || err));
        }
        return;
      }

      if (action === 'cancel') {
        renderList(dataCache);
        return;
      }
    });

    // Search
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) return renderList(dataCache);
      const filtered = dataCache.filter(r =>
        (r.name||'').toLowerCase().includes(q) ||
        (r.notes||'').toLowerCase().includes(q) ||
        (r.overtime_date||'').includes(q)
      );
      renderList(filtered);
    });

    // Unlock modal handlers
    openUnlock.addEventListener('click', () => { if (!unlocked) openModal(); else { if (!confirm('Lock actions?')) return; setUnlockedState(false, true); } });
    lockToggle.addEventListener('click', () => { if (!unlocked) openModal(); else { if (!confirm('Lock actions?')) return; setUnlockedState(false, true); } });
    pwSubmit.addEventListener('click', () => submitPassword(pwInput.value || '') );
    pwCancel.addEventListener('click', () => closeModal());
    pwInput.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); pwSubmit.click(); } });

    // On load: force locked on every page load
    window.addEventListener('DOMContentLoaded', async () => {
      setUnlockedState(false, true);
      await loadRows();
    });
  </script>
</body>
</html>
