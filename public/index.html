<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Overtime Scheduler</title>
  <meta name="description" content="Simple Supabase-powered overtime schedule UI" />
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --muted:#6b7280;
      --accent:#2563eb;
      --accent-2:#06b6d4;
      --danger:#ef4444;
      --radius:12px;
      --glass: rgba(255,255,255,0.6);
      --shadow: 0 6px 18px rgba(15,23,42,0.08);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Segoe UI Mono", monospace;
    }
    [data-theme="dark"]{
      --bg:#0b1220;
      --card:#071026;
      --muted:#9aa4b2;
      --accent:#60a5fa;
      --accent-2:#34d399;
      --glass: rgba(255,255,255,0.03);
      --shadow: 0 8px 30px rgba(2,6,23,0.6);
    }

    html,body{height:100%}
    body{
      margin:0;
      min-height:100%;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg,var(--bg), #fff);
      padding:28px;
      color: #0f172a;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .container{
      max-width:980px;
      margin:0 auto;
      display:grid;
      grid-template-columns: 1fr 380px;
      gap:28px;
      align-items:start;
    }

    header{
      grid-column:1 / -1;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:6px;
    }
    h1{font-size:20px;margin:0}
    p.lead{margin:0;color:var(--muted);font-size:13px}

    /* Form card */
    .card{
      background: linear-gradient(180deg,var(--card), rgba(255,255,255,0.02));
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
      border:1px solid rgba(15,23,42,0.04);
    }

    form{display:flex;flex-direction:column;gap:10px}
    label{font-size:13px;color:var(--muted);display:block}
    input[type="text"], input[type="date"], textarea{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(15,23,42,0.06);
      background:transparent;
      outline:none;
      font-size:14px;
      color:inherit;
      transition:box-shadow .12s, border-color .12s;
    }
    input:focus, textarea:focus{
      box-shadow:0 6px 18px rgba(37,99,235,0.08);
      border-color:var(--accent);
    }
    textarea{min-height:84px;resize:vertical}

    .row{display:flex;gap:8px}
    .row > *{flex:1}

    .actions{display:flex;gap:8px;align-items:center}
    button{
      background:linear-gradient(180deg,var(--accent), #1e40af);
      color:white;
      border:0;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      transition:transform .08s ease, box-shadow .08s;
    }
    button.secondary{
      background:transparent;
      color:var(--muted);
      border:1px solid rgba(15,23,42,0.06);
      font-weight:600;
    }
    button:active{transform:translateY(1px)}

    /* List column */
    .list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .item{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px;
      border-radius:10px;
      background:var(--glass);
      border:1px solid rgba(15,23,42,0.04);
      align-items:center;
      transition:transform .12s ease, box-shadow .12s;
    }
    .item:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
    .meta{color:var(--muted);font-size:13px}
    .name{font-weight:700}
    .date{font-family:var(--mono);font-size:13px;color:var(--accent-2)}

    /* top controls */
    .controls{display:flex;gap:8px;align-items:center}
    .search{
      padding:8px 10px;border-radius:10px;border:1px solid rgba(15,23,42,0.06);background:transparent;
    }

    /* status */
    #status{font-size:13px;color:var(--muted)}

    /* responsive */
    @media (max-width:980px){
      .container{grid-template-columns:1fr; padding:18px}
      .card{padding:14px}
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <header>
      <div>
        <h1>Overtime Scheduler</h1>
        <p class="lead">View and add overtime entries — simple Supabase demo</p>
      </div>
      <div class="controls">
        <input id="search" class="search" placeholder="Search name or notes" />
        <button id="themeToggle" class="secondary" title="Toggle dark mode">Toggle</button>
      </div>
    </header>

    <!-- Left: list -->
    <section class="card list" aria-live="polite">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <strong>Entries</strong>
        <span id="status">Idle</span>
      </div>
      <div id="rows" style="display:flex;flex-direction:column;gap:12px;margin-top:8px"></div>
      <div id="empty" class="meta" style="display:none">No entries yet.</div>
    </section>

    <!-- Right: form -->
    <aside class="card">
      <strong style="display:block;margin-bottom:8px">Add Overtime</strong>
      <form id="addForm" autocomplete="off">
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Employee name" required />
        </div>
        <div class="row">
          <div>
            <label for="overtime_date">Date</label>
            <input id="overtime_date" name="overtime_date" type="date" />
          </div>
          <div>
            <label for="notes">Notes</label>
            <input id="notes" name="notes" type="text" placeholder="Short note" />
          </div>
        </div>
        <div class="actions" style="margin-top:6px">
          <button id="submitBtn" type="submit">Add</button>
          <button type="button" class="secondary" id="resetBtn">Reset</button>
        </div>
      </form>

      <hr style="margin:14px 0;border:none;border-top:1px solid rgba(15,23,42,0.04)" />
      <div style="font-size:13px;color:var(--muted)">
        <div><strong>Tips</strong></div>
        <ul style="margin:6px 0 0 18px;padding:0;color:var(--muted)">
          <li>Use the search box to filter entries locally.</li>
          <li>For production, move writes to a server endpoint and keep service keys secret.</li>
        </ul>
      </div>
    </aside>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // Replace with your Supabase values
    const SUPABASE_URL = 'https://your-project-ref.supabase.co';
    const SUPABASE_ANON_KEY = 'your-anon-key';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM
    const rowsEl = document.getElementById('rows');
    const statusEl = document.getElementById('status');
    const form = document.getElementById('addForm');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const emptyEl = document.getElementById('empty');
    const searchInput = document.getElementById('search');
    const themeToggle = document.getElementById('themeToggle');

    // Theme
    const root = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') root.setAttribute('data-theme','dark');
    themeToggle.addEventListener('click', () => {
      const isDark = root.getAttribute('data-theme') === 'dark';
      if (isDark) { root.removeAttribute('data-theme'); localStorage.setItem('theme','light'); }
      else { root.setAttribute('data-theme','dark'); localStorage.setItem('theme','dark'); }
    });

    // State
    let dataCache = [];

    // Helpers
    function formatDate(d){
      if(!d) return '—';
      const dt = new Date(d + 'T00:00:00');
      return dt.toLocaleDateString();
    }
    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    function renderList(items){
      rowsEl.innerHTML = '';
      if(!items.length){ emptyEl.style.display = 'block'; return; }
      emptyEl.style.display = 'none';
      items.forEach(r => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;gap:12px;align-items:center">
              <div style="min-width:0">
                <div class="name">${escapeHtml(r.name)}</div>
                <div class="meta">${escapeHtml(r.notes || '')}</div>
              </div>
              <div class="date">${formatDate(r.overtime_date)}</div>
            </div>
          </div>
        `;
        rowsEl.appendChild(div);
      });
    }

    async function loadRows(){
      statusEl.textContent = 'Loading...';
      try {
        const { data, error } = await supabase
          .from('overtime_data')
          .select('id, name, notes, overtime_date')
          .order('id', { ascending: true });

        if (error) throw error;
        dataCache = data || [];
        renderList(dataCache);
        statusEl.textContent = `Loaded ${dataCache.length} rows`;
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error loading data';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = form.name.value.trim();
      const notes = form.notes.value.trim();
      const overtime_date = form.overtime_date.value || null;

      if(!name){ alert('Name is required'); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Adding...';

      try {
        const { data, error } = await supabase
          .from('overtime_data')
          .insert([{ name, notes, overtime_date }]);

        if (error) throw error;
        form.reset();
        await loadRows();
      } catch (err) {
        console.error(err);
        alert('Insert failed: ' + (err.message || err));
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Add';
      }
    });

    resetBtn.addEventListener('click', () => form.reset());

    // Search filter (client-side)
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      if(!q) return renderList(dataCache);
      const filtered = dataCache.filter(r =>
        (r.name || '').toLowerCase().includes(q) ||
        (r.notes || '').toLowerCase().includes(q) ||
        (r.overtime_date || '').includes(q)
      );
      renderList(filtered);
    });

    // Initial load
    window.addEventListener('DOMContentLoaded', loadRows);
  </script>
</body>
</html>
