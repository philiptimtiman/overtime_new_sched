<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Overtime Scheduler — Always Locked on Load</title>
  <meta name="description" content="Overtime scheduler that always starts locked on page load; mobile-friendly and search stays available while locked." />
  <style>
    :root{
      --bg:#0f1724; --card:#0b1220; --text:#e6eef8; --muted:#9fb0c6;
      --accent:#60a5fa; --danger:#ef4444; --glass: rgba(255,255,255,0.03);
      --shadow: 0 8px 30px rgba(2,6,23,0.6); --input-h:44px; --gap:12px;
      --action-col:160px; --radius:10px;
    }

    /* Base / mobile-friendly */
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;padding:18px;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
    input,button,select,textarea{font-family:inherit;font-size:16px} /* prevents iOS zoom */

    /* Layout */
    .container{max-width:980px;margin:0 auto;display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start}
    header{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:6px}
    header > .title-block{display:flex;flex-direction:column;gap:4px}
    h1{font-size:20px;margin:0;line-height:1.05}
    p.lead{margin:0;color:var(--muted);font-size:13px}

    .card{background:var(--card);border-radius:12px;padding:16px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,0.04)}
    .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .search{padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.03);color:var(--text);height:var(--input-h);min-width:120px;flex:1 1 auto;min-width:0}
    .btn{background:linear-gradient(180deg,var(--accent),#1e40af);color:#fff;border:0;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:600}
    .btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}
    .btn.ghost{background:transparent;border:0;color:var(--muted);padding:8px 10px;border-radius:8px;cursor:pointer}
    .btn.danger{background:transparent;border:1px solid rgba(255,0,0,0.08);color:var(--danger);padding:8px 10px;border-radius:8px}

    .list{display:flex;flex-direction:column;gap:12px}
    .item{padding:12px;border-radius:12px;background:var(--glass);border:1px solid rgba(255,255,255,0.04);display:flex;flex-direction:column;gap:10px;min-height:64px;min-width:0}
    .display-left{display:flex;flex-direction:column;gap:6px;min-width:0;flex:1}
    .name{font-weight:700}
    .meta{color:var(--muted);font-size:13px}
    .date{font-family:ui-monospace,monospace;color:var(--accent);font-size:13px}

    form{display:flex;flex-direction:column;gap:10px}
    label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
    input[type="text"], input[type="date"], .edit-input, textarea {
      padding:10px 12px;border-radius:var(--radius);border:1px solid rgba(255,255,255,0.04);
      background:transparent;color:var(--text);height:var(--input-h);width:100%;min-width:0;font-size:16px;
    }

    /* Remove default iOS date appearance to reduce overlap */
    input[type="date"] { -webkit-appearance: none; appearance: none; padding-right: 14px; }

    /* Add form row (desktop two-column, mobile stacked) */
    .add-row { display:flex; gap:8px; min-width:0; }
    .add-row > div { flex:1; min-width:0; }

    /* Edit layout: grid for stable columns on wide screens, stack on small screens */
    .edit-row {
      display: grid;
      grid-template-columns: 1fr var(--action-col);
      gap: var(--gap);
      align-items: start;
      width:100%;
      min-width:0;
    }
    .edit-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
      align-items: start;
      min-width:0;
    }
    .edit-fields .field-name { grid-column: 1 / -1; }
    .edit-fields .field-date { grid-column: 1 / 2; }
    .edit-fields .field-notes { grid-column: 2 / 3; }

    .action-col { display:flex; align-items:flex-start; justify-content:flex-end; min-width:0 }
    .action-col .actions-inline { display:flex; flex-direction:column; gap:8px; align-items:flex-end; }

    /* Prevent children from shrinking to zero (common cause of overlap) */
    .item, .display-left, .edit-fields, .edit-row, .action-col, .controls, .add-row { min-width:0 }
    .display-left > * { min-width:0; overflow-wrap:break-word }

    /* Small screens: stack fields and move actions below; increase spacing for touch */
    @media (max-width:760px){
      .container{grid-template-columns:1fr;gap:12px;padding:12px}
      header{flex-direction:column;align-items:stretch;gap:8px}
      header > .title-block{align-items:center;text-align:center;width:100%}
      h1{font-size:18px}
      p.lead{font-size:12px;opacity:0.95}

      .controls{width:100%;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
      .controls .search{flex:1 1 auto;min-width:0}

      /* Add form stacks on mobile to avoid side-by-side overlap */
      .add-row { flex-direction:column; gap:10px; }
      .add-row > div { width:100%; }

      /* Edit row stacks on mobile so inputs never overlap actions */
      .edit-row { grid-template-columns: 1fr; }
      .edit-fields { grid-template-columns: 1fr; }
      .edit-fields .field-name, .edit-fields .field-date, .edit-fields .field-notes { grid-column: auto; }
      .action-col { justify-content:flex-start; margin-top:8px; }
      .action-col .actions-inline { flex-direction:row; gap:8px; flex-wrap:wrap; }
      .btn { padding:10px 12px; font-size:15px; }
      .item { padding:14px; }
      input[type="text"], input[type="date"], .edit-input { height:48px; font-size:16px; padding:12px; }
    }

    /* Locked state visuals (modal override below) */
    .locked .btn,
    .locked .btn.ghost,
    .locked input,
    .locked button {
      opacity: 0.45;
      pointer-events: none;
    }
    .locked #lockToggle { opacity:1; pointer-events:auto; }

    /* Keep search usable while locked */
    .locked .search,
    .locked .search * {
      pointer-events: auto !important;
      opacity: 1 !important;
    }

    /* Modal */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px}
    .modal{background:var(--card);padding:18px;border-radius:12px;min-width:260px;max-width:520px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,0.06);z-index:10000}

    /* Keep modal interactive while page is locked */
    .locked .modal-backdrop,
    .locked .modal-backdrop *,
    .locked .modal,
    .locked .modal * {
      pointer-events: auto !important;
      opacity: 1 !important;
    }

    /* iOS polish */
    @supports (-webkit-touch-callout: none) {
      body { padding-bottom: 22px; }
      .modal { -webkit-overflow-scrolling: touch; }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <header>
      <div class="title-block">
        <h1>Overtime Scheduler</h1>
        <p class="lead">Always locked on load — search stays available while locked</p>
      </div>

      <div class="controls" role="group" aria-label="Search and lock controls">
        <input id="search" class="search" placeholder="Search name or notes" aria-label="Search name or notes" autocomplete="off" />
        <div class="lock-indicator" aria-hidden="true" style="display:flex;align-items:center;gap:8px">
          <div id="lockDot" style="width:10px;height:10px;border-radius:50%;background:#ef4444"></div>
          <div id="lockText" style="color:var(--muted);font-size:13px">Checking…</div>
        </div>
        <button id="lockToggle" class="btn secondary" title="Lock or unlock actions">Lock</button>
      </div>
    </header>

    <section class="card list" aria-live="polite">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <strong>Entries</strong>
        <span id="status">Idle</span>
      </div>

      <div id="rows" style="display:flex;flex-direction:column;gap:12px;margin-top:8px"></div>
      <div id="empty" class="meta" style="display:none">No entries yet.</div>

      <div class="meta" style="margin-top:12px">Tip: Unlock to enable Add/Edit/Delete.</div>
    </section>

    <aside class="card" id="formCard">
      <strong style="display:block;margin-bottom:8px">Add Overtime</strong>
      <form id="addForm" autocomplete="off">
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Employee name" required autocomplete="name" />
        </div>

        <div class="add-row" style="margin-top:8px;min-width:0">
          <div>
            <label for="overtime_date">Date</label>
            <input id="overtime_date" name="overtime_date" type="date" autocomplete="bday" />
          </div>
          <div>
            <label for="notes">Notes</label>
            <input id="notes" name="notes" type="text" placeholder="Short note" autocomplete="off" />
          </div>
        </div>

        <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">
          <button id="submitBtn" class="btn" type="submit">Add</button>
          <button type="button" id="resetBtn" class="btn secondary">Reset</button>
        </div>
      </form>
    </aside>
  </div>

  <!-- Password modal (direct child of body so override applies) -->
  <div id="modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal" role="document">
      <h3 id="modalTitle">Unlock Actions</h3>
      <p id="modalDesc" style="color:var(--muted);margin-top:6px">Enter password to unlock editing, deleting, and adding. (server-validated)</p>
      <div style="margin-top:12px">
        <input id="pwInput" type="password" autocomplete="current-password" placeholder="Password" style="padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);width:100%" />
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap">
        <button id="pwCancel" class="btn secondary">Cancel</button>
        <button id="pwSubmit" class="btn">Submit</button>
      </div>
      <div id="pwError" style="color:var(--danger);margin-top:8px;display:none;font-size:13px"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // Replace with your Supabase values
    const SUPABASE_URL = 'https://bisvmgjgyvludhqsvvcn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpc3ZtZ2pneXZsdWRocXN2dmNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTI1ODMsImV4cCI6MjA4NzI2ODU4M30.eodsmChKwoEiPlNz9d2Ge3lAmO3BWfdKRWVRdgk9Xl8';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM refs
    const rowsEl = document.getElementById('rows');
    const statusEl = document.getElementById('status');
    const form = document.getElementById('addForm');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const searchInput = document.getElementById('search');
    const lockToggle = document.getElementById('lockToggle');
    const lockDot = document.getElementById('lockDot');
    const lockText = document.getElementById('lockText');
    const modal = document.getElementById('modal');
    const pwInput = document.getElementById('pwInput');
    const pwSubmit = document.getElementById('pwSubmit');
    const pwCancel = document.getElementById('pwCancel');
    const pwError = document.getElementById('pwError');
    const emptyEl = document.getElementById('empty');

    let dataCache = [];
    let locked = true;

    function formatDate(d){ if(!d) return '—'; return new Date(d + 'T00:00:00').toLocaleDateString(); }
    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    // Ensure search element reference exists
    const searchEl = document.getElementById('search');

    function setLockedState(val){
      locked = !!val;
      localStorage.setItem('overtime_locked', locked ? 'true' : 'false');
      if (locked) {
        document.body.classList.add('locked');
        lockDot.style.background = '#ef4444';
        lockText.textContent = 'Locked';
        lockToggle.textContent = 'Unlock';
      } else {
        document.body.classList.remove('locked');
        lockDot.style.background = '#60a5fa';
        lockText.textContent = 'Unlocked';
        lockToggle.textContent = 'Lock';
      }

      // Safety: ensure search remains enabled and interactive regardless of locked state
      if (searchEl) {
        searchEl.disabled = false;
        searchEl.setAttribute('aria-disabled', 'false');
        searchEl.tabIndex = 0;
      }
    }

    function renderList(items){
      rowsEl.innerHTML = '';
      if(!items.length){ emptyEl.style.display = 'block'; return; }
      emptyEl.style.display = 'none';
      items.forEach(row => {
        const wrapper = document.createElement('div');
        wrapper.className = 'item';
        wrapper.dataset.id = row.id;
        wrapper.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;width:100%">
            <div class="display-left">
              <div class="name" data-field="name">${escapeHtml(row.name)}</div>
              <div class="meta" data-field="notes">${escapeHtml(row.notes || '')}</div>
              <div class="date" data-field="overtime_date">${formatDate(row.overtime_date)}</div>
            </div>
            <div style="min-width:120px;display:flex;justify-content:flex-end;gap:8px">
              <button class="btn ghost" data-action="edit">Edit</button>
              <button class="btn ghost" data-action="delete">Delete</button>
            </div>
          </div>
        `;
        rowsEl.appendChild(wrapper);
      });
    }

    async function loadRows(){
      statusEl.textContent = 'Loading...';
      try {
        const { data, error } = await supabase.from('overtime_data').select('id,name,notes,overtime_date').order('overtime_date',{ascending:true});
        if (error) throw error;
        dataCache = (data || []);
        renderList(dataCache);
        statusEl.textContent = `Loaded ${dataCache.length} rows`;
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error loading data';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (locked) { alert('Actions are locked. Unlock to add entries.'); return; }
      const name = form.name.value.trim();
      const notes = form.notes.value.trim();
      const overtime_date = form.overtime_date.value || null;
      if (!name) return alert('Name is required');
      submitBtn.disabled = true; submitBtn.textContent = 'Adding...';
      try {
        const { data, error } = await supabase.from('overtime_data').insert([{ name, notes, overtime_date }]).select();
        if (error) throw error;
        dataCache = [...dataCache, ...(data||[])];
        renderList(dataCache);
        form.reset();
      } catch (err) {
        console.error(err);
        alert('Insert failed: ' + (err.message || err));
      } finally {
        submitBtn.disabled = false; submitBtn.textContent = 'Add';
      }
    });

    resetBtn.addEventListener('click', () => form.reset());

    rowsEl.addEventListener('click', async (e) => {
      const action = e.target?.dataset?.action;
      if (!action) return;
      const item = e.target.closest('.item');
      const id = item?.dataset?.id;
      if (!id) return;

      if (action === 'delete') {
        if (locked) { alert('Actions are locked. Unlock to delete.'); return; }
        if (!confirm('Delete this entry? This cannot be undone.')) return;
        try {
          const { error } = await supabase.from('overtime_data').delete().eq('id', id);
          if (error) throw error;
          dataCache = dataCache.filter(r => String(r.id) !== String(id));
          renderList(dataCache);
        } catch (err) {
          console.error(err);
          alert('Delete failed: ' + (err.message || err));
        }
        return;
      }

      if (action === 'edit') {
        if (locked) { alert('Actions are locked. Unlock to edit.'); return; }
        enterEditMode(item, id);
        return;
      }

      if (action === 'save') {
        if (locked) { alert('Actions are locked. Unlock to save.'); return; }
        await saveEdit(item, id);
        return;
      }

      if (action === 'cancel') {
        exitEditMode(item, id);
        return;
      }
    });

    function enterEditMode(item, id) {
      const row = dataCache.find(r => String(r.id) === String(id));
      if (!row) return;
      item.innerHTML = `
        <div class="edit-row">
          <div class="edit-fields">
            <div class="field-name"><input class="edit-input" data-edit="name" value="${escapeHtml(row.name)}" aria-label="Edit name" /></div>
            <div class="field-date"><input class="edit-input" data-edit="overtime_date" type="date" value="${row.overtime_date || ''}" aria-label="Edit date" /></div>
            <div class="field-notes"><input class="edit-input" data-edit="notes" value="${escapeHtml(row.notes || '')}" aria-label="Edit notes" /></div>
          </div>
          <div class="action-col">
            <div class="actions-inline">
              <button class="btn ghost" data-action="save">Save</button>
              <button class="btn ghost" data-action="cancel">Cancel</button>
              <button class="btn danger" data-action="delete">Delete</button>
            </div>
          </div>
        </div>
      `;
      const nameInput = item.querySelector('[data-edit="name"]');
      if (nameInput) nameInput.focus();
    }

    function exitEditMode(item, id) {
      const row = dataCache.find(r => String(r.id) === String(id));
      if (!row) return;
      item.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;width:100%">
          <div class="display-left">
            <div class="name" data-field="name">${escapeHtml(row.name)}</div>
            <div class="meta" data-field="notes">${escapeHtml(row.notes || '')}</div>
            <div class="date" data-field="overtime_date">${formatDate(row.overtime_date)}</div>
          </div>
          <div style="min-width:120px;display:flex;justify-content:flex-end;gap:8px">
            <button class="btn ghost" data-action="edit">Edit</button>
            <button class="btn ghost" data-action="delete">Delete</button>
          </div>
        </div>
      `;
    }

    async function saveEdit(item, id) {
      const nameInput = item.querySelector('[data-edit="name"]');
      const notesInput = item.querySelector('[data-edit="notes"]');
      const dateInput = item.querySelector('[data-edit="overtime_date"]');
      const name = nameInput?.value.trim();
      const notes = notesInput?.value.trim();
      const overtime_date = dateInput?.value || null;
      if (!name) { alert('Name is required'); nameInput?.focus(); return; }
      const saveBtn = item.querySelector('[data-action="save"]');
      if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving...'; }
      try {
        const { data, error } = await supabase.from('overtime_data').update({ name, notes, overtime_date }).eq('id', id).select();
        if (error) throw error;
        if (data && data.length) {
          dataCache = dataCache.map(r => String(r.id) === String(id) ? data[0] : r);
        } else {
          dataCache = dataCache.map(r => String(r.id) === String(id) ? { ...r, name, notes, overtime_date } : r);
        }
        renderList(dataCache);
      } catch (err) {
        console.error(err);
        alert('Update failed: ' + (err.message || err));
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
      }
    }

    function openModal(){ pwInput.value=''; pwError.style.display='none'; modal.style.display='flex'; modal.setAttribute('aria-hidden','false'); pwInput.focus(); }
    function closeModal(){ modal.style.display='none'; modal.setAttribute('aria-hidden','true'); }

    async function submitPassword(password) {
      try {
        pwError.style.display = 'block';
        pwError.textContent = 'Checking...';
        const res = await fetch('/api/unlock', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password }) });
        const raw = await res.text();
        let parsed;
        try { parsed = raw ? JSON.parse(raw) : null; } catch (e) { parsed = null; }
        if (!res.ok) {
          const msg = parsed?.error || parsed?.message || raw || `HTTP ${res.status}`;
          pwError.textContent = `Server: ${msg} (status ${res.status})`;
          return;
        }
        // After successful unlock request, check unlocked endpoint and set state
        const check = await fetch('/api/unlocked');
        const checkJson = check.ok ? await check.json().catch(()=>null) : null;
        if (checkJson && checkJson.unlocked) { setLockedState(false); closeModal(); return; }
        pwError.textContent = `Unlock endpoint returned ${res.status} but unlocked check failed.`;
      } catch (err) {
        console.error(err);
        pwError.textContent = 'Network or server error.';
      }
    }

    lockToggle.addEventListener('click', () => {
      if (locked) { openModal(); pwSubmit.onclick = () => submitPassword(pwInput.value || ''); }
      else { if (!confirm('Locking will disable Add/Edit/Delete. Continue?')) return; setLockedState(true); }
    });
    pwCancel.addEventListener('click', () => closeModal());
    pwInput.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); pwSubmit.click(); } });

    // Keep search usable even if some other code tries to disable it
    if (searchEl) {
      searchEl.disabled = false;
      searchEl.setAttribute('aria-disabled', 'false');
      searchEl.tabIndex = 0;
    }

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) return renderList(dataCache);
      const filtered = dataCache.filter(r =>
        (r.name||'').toLowerCase().includes(q) ||
        (r.notes||'').toLowerCase().includes(q) ||
        (r.overtime_date||'').includes(q)
      );
      renderList(filtered);
    });

    // INIT: always start locked on load/refresh
    window.addEventListener('DOMContentLoaded', async () => {
      // Force locked state on every load
      setLockedState(true);

      // Load rows after locking UI
      await loadRows();
    });
  </script>
</body>
</html>
