<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Overtime Scheduler</title>
  <meta name="description" content="Simple Supabase-powered overtime schedule UI" />
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --text-muted:#6b7280;
      --accent:#2563eb;
      --accent-2:#06b6d4;
      --danger:#ef4444;
      --radius:12px;
      --glass: rgba(255,255,255,0.6);
      --shadow: 0 6px 18px rgba(15,23,42,0.08);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Segoe UI Mono", monospace;
      --footer-bg: rgba(15,23,42,0.02);
      --footer-text: #6b7280;
    }

    /* Dark theme variables tuned for mobile readability */
    [data-theme="dark"]{
      --bg:#071026;                 /* deep but not pitch black */
      --card:#071826;               /* slightly lighter card */
      --text:#e6eef8;               /* high-contrast text */
      --text-muted:#9fb0c6;         /* readable muted text */
      --accent:#60a5fa;
      --accent-2:#7ee7c7;
      --glass: rgba(255,255,255,0.04); /* subtle card surface */
      --shadow: 0 8px 30px rgba(2,6,23,0.6);
      --footer-bg: rgba(255,255,255,0.02); /* very subtle footer background */
      --footer-text: #9fb0c6;       /* footer text readable on dark */
    }

    html,body{height:100%}
    body{
      margin:0;
      min-height:100%;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg,var(--bg), #fff);
      padding:20px;
      color: var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      -webkit-tap-highlight-color: transparent;
    }

    .container{
      max-width:980px;
      margin:0 auto;
      display:grid;
      grid-template-columns: 1fr 380px;
      gap:20px;
      align-items:start;
    }

    header{
      grid-column:1 / -1;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:6px;
    }
    h1{font-size:20px;margin:0}
    p.lead{margin:0;color:var(--text-muted);font-size:13px}

    /* Card */
    .card{
      background: linear-gradient(180deg,var(--card), rgba(255,255,255,0.02));
      border-radius:12px;
      padding:16px;
      box-shadow:var(--shadow);
      border:1px solid rgba(15,23,42,0.04);
      color:var(--text);
    }

    form{display:flex;flex-direction:column;gap:10px}
    label{font-size:13px;color:var(--text-muted);display:block}
    input[type="text"], input[type="date"], textarea{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(15,23,42,0.06);
      background:transparent;
      outline:none;
      font-size:14px;
      color:var(--text);
      transition:box-shadow .12s, border-color .12s;
    }
    input::placeholder, textarea::placeholder { color: rgba(0,0,0,0.35); }
    [data-theme="dark"] input::placeholder, [data-theme="dark"] textarea::placeholder { color: rgba(255,255,255,0.28); }

    input:focus, textarea:focus{
      box-shadow:0 6px 18px rgba(37,99,235,0.08);
      border-color:var(--accent);
    }
    textarea{min-height:84px;resize:vertical}

    .row{display:flex;gap:8px}
    .row > *{flex:1}

    .actions{display:flex;gap:8px;align-items:center}
    button{
      background:linear-gradient(180deg,var(--accent), #1e40af);
      color:white;
      border:0;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      transition:transform .08s ease, box-shadow .08s;
    }
    button.secondary{
      background:transparent;
      color:var(--text-muted);
      border:1px solid rgba(15,23,42,0.06);
      font-weight:600;
    }
    [data-theme="dark"] button.secondary{ color:var(--text-muted); border-color: rgba(255,255,255,0.06); }
    button:active{transform:translateY(1px)}

    /* Toggle button base and theme-specific colors */
    #themeToggle {
      background: transparent;
      border: 1px solid rgba(15,23,42,0.06);
      color: var(--text-muted);
      padding: 8px 10px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: color .12s ease, background .12s ease, border-color .12s ease;
    }
    :root #themeToggle { color: #0f172a; border-color: rgba(15,23,42,0.06); }
    [data-theme="dark"] #themeToggle { color: var(--text); border-color: rgba(255,255,255,0.06); }
    #themeToggle:hover { filter: brightness(0.98); }

    /* List column */
    .list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .item{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px;
      border-radius:10px;
      background:var(--glass);
      border:1px solid rgba(15,23,42,0.04);
      align-items:center;
      transition:transform .12s ease, box-shadow .12s;
      color:var(--text);
      min-height:56px;
    }
    .item:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
    .meta{color:var(--text-muted);font-size:13px}
    .name{font-weight:700;color:var(--text)}
    .date{font-family:var(--mono);font-size:13px;color:var(--accent-2)}

    /* top controls */
    .controls{display:flex;gap:8px;align-items:center}
    .search{
      padding:8px 10px;border-radius:10px;border:1px solid rgba(15,23,42,0.06);background:transparent;color:var(--text);
    }
    [data-theme="dark"] .search{ border-color: rgba(255,255,255,0.06); }

    /* footer / tips area */
    .tips {
      margin-top:12px;
      padding:10px;
      border-radius:10px;
      background:var(--footer-bg);
      color:var(--footer-text);
      font-size:13px;
      line-height:1.35;
    }
    [data-theme="dark"] .tips { background: rgba(255,255,255,0.02); color:var(--footer-text); }

    /* status */
    #status{font-size:13px;color:var(--text-muted)}

    /* responsive: mobile-first adjustments for phones */
    @media (max-width:760px){
      body{padding:14px}
      .container{grid-template-columns:1fr; gap:12px}
      header{flex-direction:column;align-items:flex-start;gap:10px}
      .controls{width:100%;display:flex;gap:8px}
      .search{flex:1}
      .card{padding:12px}
      .item{padding:10px}
      .date{font-size:12px}
      /* ensure footer doesn't overlap or obscure list on small screens */
      .tips{font-size:12px;padding:10px}
    }

    /* extra contrast safety for very long lists on dark mode */
    [data-theme="dark"] .item { border-color: rgba(255,255,255,0.04); }
    [data-theme="dark"] .card { border-color: rgba(255,255,255,0.04); }
  </style>
</head>
<body>
  <div class="container" id="app">
    <header>
      <div>
        <h1>Overtime Scheduler</h1>
        <p class="lead">View and add overtime entries — optimized for phone dark mode</p>
      </div>
      <div class="controls">
        <input id="search" class="search" placeholder="Search name or notes" />
        <button id="themeToggle" class="secondary" title="Toggle dark mode">Toggle</button>
      </div>
    </header>

    <!-- Left: list -->
    <section class="card list" aria-live="polite">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <strong>Entries</strong>
        <span id="status">Idle</span>
      </div>
      <div id="rows" style="display:flex;flex-direction:column;gap:12px;margin-top:8px"></div>
      <div id="empty" class="meta" style="display:none">No entries yet.</div>

      <!-- tips moved inside list card but visually subtle so it won't block data on phones -->
      <div class="tips" id="tips">
        Tips: Use the search box to filter entries locally. For production, move writes to a server endpoint and keep service keys secret.
      </div>
    </section>

    <!-- Right: form -->
    <aside class="card">
      <strong style="display:block;margin-bottom:8px">Add Overtime</strong>
      <form id="addForm" autocomplete="off">
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Employee name" required />
        </div>
        <div class="row">
          <div>
            <label for="overtime_date">Date</label>
            <input id="overtime_date" name="overtime_date" type="date" />
          </div>
          <div>
            <label for="notes">Notes</label>
            <input id="notes" name="notes" type="text" placeholder="Short note" />
          </div>
        </div>
        <div class="actions" style="margin-top:6px">
          <button id="submitBtn" type="submit">Add</button>
          <button type="button" class="secondary" id="resetBtn">Reset</button>
        </div>
    </form>
    </aside>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // Replace with your Supabase values
    const SUPABASE_URL = 'https://bisvmgjgyvludhqsvvcn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpc3ZtZ2pneXZsdWRocXN2dmNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTI1ODMsImV4cCI6MjA4NzI2ODU4M30.eodsmChKwoEiPlNz9d2Ge3lAmO3BWfdKRWVRdgk9Xl8';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM
    const rowsEl = document.getElementById('rows');
    const statusEl = document.getElementById('status');
    const form = document.getElementById('addForm');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const emptyEl = document.getElementById('empty');
    const searchInput = document.getElementById('search');
    const themeToggle = document.getElementById('themeToggle');
    const tipsEl = document.getElementById('tips');

    // Theme: initialize and update button text/aria
    const root = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') root.setAttribute('data-theme','dark');

    function updateThemeButton() {
      const isDark = root.getAttribute('data-theme') === 'dark';
      themeToggle.textContent = isDark ? 'Light mode' : 'Dark mode';
      themeToggle.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
      // ensure tips remain subtle but readable on small screens
      if (isDark) {
        tipsEl.style.opacity = '0.95';
      } else {
        tipsEl.style.opacity = '0.95';
      }
    }

    themeToggle.addEventListener('click', () => {
      const isDark = root.getAttribute('data-theme') === 'dark';
      if (isDark) {
        root.removeAttribute('data-theme');
        localStorage.setItem('theme','light');
      } else {
        root.setAttribute('data-theme','dark');
        localStorage.setItem('theme','dark');
      }
      updateThemeButton();
    });

    updateThemeButton();

    // State
    let dataCache = [];

    // Helpers
    function formatDate(d){
      if(!d) return '—';
      const dt = new Date(d + 'T00:00:00');
      return dt.toLocaleDateString();
    }
    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    function renderList(items){
      rowsEl.innerHTML = '';
      if(!items.length){ emptyEl.style.display = 'block'; return; }
      emptyEl.style.display = 'none';
      items.forEach(r => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;gap:12px;align-items:center">
              <div style="min-width:0">
                <div class="name">${escapeHtml(r.name)}</div>
                <div class="meta">${escapeHtml(r.notes || '')}</div>
              </div>
              <div class="date">${formatDate(r.overtime_date)}</div>
            </div>
          </div>
        `;
        rowsEl.appendChild(div);
      });
    }

    async function loadRows(){
      statusEl.textContent = 'Loading...';
      try {
        const { data, error } = await supabase
          .from('overtime_data')
          .select('id, name, notes, overtime_date')
          .order('id', { ascending: true });

        if (error) throw error;
        dataCache = data || [];
        renderList(dataCache);
        statusEl.textContent = `Loaded ${dataCache.length} rows`;
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error loading data';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = form.name.value.trim();
      const notes = form.notes.value.trim();
      const overtime_date = form.overtime_date.value || null;

      if(!name){ alert('Name is required'); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Adding...';

      try {
        const { data, error } = await supabase
          .from('overtime_data')
          .insert([{ name, notes, overtime_date }]);

        if (error) throw error;
        form.reset();
        await loadRows();
      } catch (err) {
        console.error(err);
        alert('Insert failed: ' + (err.message || err));
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Add';
      }
    });

    resetBtn.addEventListener('click', () => form.reset());

    // Search filter (client-side)
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      if(!q) return renderList(dataCache);
      const filtered = dataCache.filter(r =>
        (r.name || '').toLowerCase().includes(q) ||
        (r.notes || '').toLowerCase().includes(q) ||
        (r.overtime_date || '').includes(q)
      );
      renderList(filtered);
    });

    // Initial load
    window.addEventListener('DOMContentLoaded', loadRows);
  </script>
</body>
</html>
