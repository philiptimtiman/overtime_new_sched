<!doctype html>
<html lang="tl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Overtime Scheduler — Material Clean</title>
  <meta name="description" content="Mobile-first Material-style overtime scheduler with full functionality." />
  <style>
    :root{
      --bg:#f4f6f8; --surface:#ffffff; --muted:#6b7280; --text:#0f1724;
      --primary:#2563eb; --primary-2:#1e40af; --danger:#ef4444;
      --card-shadow: 0 6px 18px rgba(16,24,40,0.06);
      --radius:12px; --gap:12px; --input-h:48px; --mobile-width:380px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;-webkit-font-smoothing:antialiased}
    input,button,select,textarea{font-family:inherit}
    a{color:inherit}
    .wrap{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px}
    .app{width:100%;max-width:var(--mobile-width);display:flex;flex-direction:column;gap:16px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;flex-direction:column}
    .brand h1{margin:0;font-size:1.05rem}
    .brand p{margin:0;color:var(--muted);font-size:.88rem}
    .card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--card-shadow);padding:14px;border:1px solid rgba(16,24,40,0.03)}
    .search-row{display:flex;gap:10px;align-items:center}
    .search{flex:1;height:44px;border-radius:10px;border:1px solid rgba(16,24,40,0.06);padding:10px 12px;background:#fff}
    .btn{background:linear-gradient(180deg,var(--primary),var(--primary-2));color:#fff;border:0;padding:10px 12px;border-radius:10px;font-weight:600}
    .btn.ghost{background:transparent;border:1px solid rgba(16,24,40,0.06);color:var(--muted)}
    .btn.small{padding:8px 10px;font-size:.95rem}
    .status{color:var(--muted);font-size:.9rem}
    /* list */
    .list{display:flex;flex-direction:column;gap:12px}
    .row{display:flex;flex-direction:column;gap:10px;padding:12px;border-radius:10px;background:#fff;border:1px solid rgba(16,24,40,0.03)}
    .row-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .row-left{display:flex;flex-direction:column;gap:6px;min-width:0}
    .name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .notes{color:var(--muted);font-size:.9rem;overflow:hidden;text-overflow:ellipsis}
    .row-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
    .date-pill{padding:8px 10px;border-radius:8px;background:linear-gradient(180deg,#f8fafc,#eef2ff);border:1px solid rgba(16,24,40,0.03);font-size:.95rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    /* inline edit */
    .edit-input{display:none;padding:10px;border-radius:8px;border:1px solid rgba(16,24,40,0.06);background:#fff}
    .row.editing .display {display:none}
    .row.editing .edit-input{display:block}
    /* add form */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    label{display:block;font-size:.9rem;color:var(--muted);margin-bottom:6px;text-align:center}
    input[type="text"], input[type="date"], textarea{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(16,24,40,0.06);height:var(--input-h);background:#fff;text-align:center}
    .date-wrap{position:relative}
    .date-wrap input[type="date"]{padding-right:44px;-webkit-appearance:textfield;appearance:textfield}
    .date-wrap input[type="date"]::-webkit-calendar-picker-indicator{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:28px;height:28px;opacity:0.95}
    .form-actions{display:flex;flex-direction:column;gap:10px;margin-top:6px}
    .full{width:100%}
    /* modal */
    .modal-backdrop{position:fixed;inset:0;background:rgba(2,6,23,0.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:999}
    .modal{width:100%;max-width:420px;background:var(--surface);padding:16px;border-radius:12px;box-shadow:var(--card-shadow)}
    /* responsive */
    @media (max-width:360px){
      .app{padding:0 6px}
      .form-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <h1>Overtime Scheduler</h1>
          <p class="status" id="status">Idle</p>
        </div>

        <div style="display:flex;gap:8px;align-items:center">
          <div id="lockDot" style="width:12px;height:12px;border-radius:50%;background:#ef4444"></div>
          <div id="lockText" style="color:var(--muted);font-size:.9rem">Locked</div>
        </div>
      </header>

      <div class="card">
        <div class="search-row" style="margin-bottom:10px">
          <input id="search" class="search" placeholder="Search name or notes" aria-label="Search" />
          <button id="unlockBtn" class="btn small">Unlock</button>
        </div>

        <div style="display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:8px">
          <strong>Entries</strong>
          <div class="status" id="loadedCount">0</div>
        </div>

        <div id="rows" class="list" aria-live="polite"></div>
        <div id="empty" class="status" style="display:none;text-align:center;padding:12px">No entries yet.</div>
      </div>

      <aside class="card" id="formCard">
        <strong style="display:block;text-align:center;margin-bottom:8px">Add Overtime</strong>

        <form id="addForm" autocomplete="off" novalidate>
          <div style="margin-bottom:10px">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" class="lock-guard" placeholder="Employee name" />
          </div>

          <div class="form-grid" style="margin-bottom:8px">
            <div>
              <label for="overtime_date">Date</label>
              <div class="date-wrap">
                <input id="overtime_date" name="overtime_date" type="date" class="lock-guard" />
              </div>
            </div>
            <div>
              <label for="notes">Notes</label>
              <input id="notes" name="notes" type="text" class="lock-guard" placeholder="Short note" />
            </div>
          </div>

          <div class="form-actions">
            <button id="submitBtn" class="btn lock-guard full" type="submit">Add</button>
            <button id="resetBtn" type="button" class="btn ghost lock-guard full">Reset</button>
            <button id="lockToggle" type="button" class="btn ghost full">Unlock</button>
          </div>
        </form>
      </aside>

      <footer style="text-align:center;color:var(--muted);font-size:.85rem;padding-top:6px">
        <div style="font-weight:700">BoxTechHub™</div>
        <div style="font-size:.8rem;margin-top:4px">© 2026 BoxTechHub</div>
      </footer>
    </div>
  </div>

  <!-- Unlock modal -->
  <div id="modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal">
      <h3 style="margin:0 0 8px 0">Unlock Actions</h3>
      <p style="margin:0 0 10px;color:var(--muted)">Enter password to enable Add / Edit / Delete</p>
      <input id="pwInput" type="password" placeholder="Password" style="width:100%;padding:12px;border-radius:10px;border:1px solid rgba(16,24,40,0.06);margin-bottom:10px" />
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button id="pwCancel" class="btn ghost">Cancel</button>
        <button id="pwSubmit" class="btn">Submit</button>
      </div>
      <div id="pwError" style="color:var(--danger);margin-top:8px;display:none"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const SUPABASE_URL = 'https://bisvmgjgyvludhqsvvcn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpc3ZtZ2pneXZsdWRocXN2dmNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTI1ODMsImV4cCI6MjA4NzI2ODU4M30.eodsmChKwoEiPlNz9d2Ge3lAmO3BWfdKRWVRdgk9Xl8';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const rowsEl = document.getElementById('rows');
    const statusEl = document.getElementById('status');
    const loadedCount = document.getElementById('loadedCount');
    const emptyEl = document.getElementById('empty');
    const form = document.getElementById('addForm');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const searchInput = document.getElementById('search');
    const unlockBtn = document.getElementById('unlockBtn');
    const lockToggle = document.getElementById('lockToggle');
    const lockDot = document.getElementById('lockDot');
    const lockText = document.getElementById('lockText');

    const modal = document.getElementById('modal');
    const pwInput = document.getElementById('pwInput');
    const pwSubmit = document.getElementById('pwSubmit');
    const pwCancel = document.getElementById('pwCancel');
    const pwError = document.getElementById('pwError');

    const LOCAL_KEY = 'overtime_material_unlocked';
    let dataCache = [];
    let unlocked = false;

    function safeSetLocal(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
    function safeGetLocal(k){ try{ return localStorage.getItem(k); }catch(e){return null} }
    function formatDate(d){ if(!d) return '—'; return new Date(d + 'T00:00:00').toLocaleDateString(); }
    function esc(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    function updateGuarded(){
      document.querySelectorAll('.lock-guard').forEach(el => unlocked ? el.removeAttribute('disabled') : el.setAttribute('disabled','true'));
      lockDot.style.background = unlocked ? '#16a34a' : '#ef4444';
      lockText.textContent = unlocked ? 'Unlocked' : 'Locked';
      unlockBtn.textContent = unlocked ? 'Lock' : 'Unlock';
      lockToggle.textContent = unlocked ? 'Lock' : 'Unlock';
    }

    function setUnlocked(v, persist=true){ unlocked = !!v; updateGuarded(); if(persist) safeSetLocal(LOCAL_KEY, unlocked ? 'true' : 'false'); }

    function openModal(){ modal.style.display='flex'; modal.setAttribute('aria-hidden','false'); pwInput.value=''; pwError.style.display='none'; pwInput.focus(); }
    function closeModal(){ modal.style.display='none'; modal.setAttribute('aria-hidden','true'); pwError.style.display='none'; }

    async function submitPassword(pw){
      try{
        pwError.style.display='block'; pwError.textContent='Checking...';
        const res = await fetch('/api/unlock',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
        const raw = await res.text();
        let parsed; try{ parsed = raw ? JSON.parse(raw) : null }catch(e){ parsed = null }
        if(!res.ok){ pwError.textContent = parsed?.error || parsed?.message || raw || `HTTP ${res.status}`; return; }
        setUnlocked(true,true); closeModal();
      }catch(err){ console.error(err); pwError.textContent='Network or server error.'; }
    }

    function createRow(r){
      const el = document.createElement('div'); el.className='row'; el.dataset.id = r.id;
      el.innerHTML = `
        <div class="row-top">
          <div class="row-left">
            <div class="display name" data-field="name">${esc(r.name)}</div>
            <div class="display notes" data-field="notes">${esc(r.notes||'')}</div>
            <input class="edit-input" data-edit="name" type="text" value="${esc(r.name)}" />
            <input class="edit-input" data-edit="notes" type="text" value="${esc(r.notes||'')}" />
          </div>
          <div class="row-right">
            <div class="display date-pill" data-field="overtime_date">${r.overtime_date ? formatDate(r.overtime_date) : '—'}</div>
            <div class="date-edit" style="display:none"><input class="edit-input" data-edit="overtime_date" type="date" value="${r.overtime_date||''}" /></div>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="meta" style="color:var(--muted)">ID: ${r.id || '—'}</div>
          <div class="actions">
            <button class="btn ghost lock-guard" data-action="edit">Edit</button>
            <button class="btn ghost lock-guard" data-action="delete">Delete</button>
          </div>
        </div>
      `;
      return el;
    }

    function render(items){
      rowsEl.innerHTML=''; if(!items || !items.length){ emptyEl.style.display='block'; loadedCount.textContent='0'; statusEl.textContent='No entries'; return; }
      emptyEl.style.display='none';
      items.forEach(r => rowsEl.appendChild(createRow(r)));
      loadedCount.textContent = items.length;
      statusEl.textContent = `Loaded ${items.length} entries`;
      updateGuarded();
    }

    async function loadRows(){
      statusEl.textContent='Loading...';
      try{
        const { data, error } = await supabase.from('overtime_data').select('id,name,notes,overtime_date').order('overtime_date',{ascending:true});
        if(error) throw error;
        dataCache = data || [];
        render(dataCache);
      }catch(err){ console.error(err); statusEl.textContent='Error loading data'; }
    }

    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      if(!unlocked){ alert('Locked. Unlock to add.'); return; }
      const name = form.name.value.trim(); const notes = form.notes.value.trim(); const overtime_date = form.overtime_date.value || null;
      if(!name){ alert('Name required'); return; }
      submitBtn.disabled=true; submitBtn.textContent='Adding...';
      try{
        const { data, error } = await supabase.from('overtime_data').insert([{name,notes,overtime_date}]).select();
        if(error) throw error;
        dataCache = [...dataCache, ...(data||[])];
        render(dataCache); form.reset();
      }catch(err){ console.error(err); alert('Insert failed: '+(err.message||err)); } finally { submitBtn.disabled=false; submitBtn.textContent='Add'; }
    });

    resetBtn.addEventListener('click', ()=> form.reset());

    rowsEl.addEventListener('click', async (ev)=>{
      const action = ev.target?.dataset?.action; if(!action) return;
      const rowEl = ev.target.closest('.row'); const id = rowEl?.dataset?.id; if(!id) return;

      if(action === 'delete'){
        if(!unlocked){ alert('Locked. Unlock to delete.'); return; }
        if(!confirm('Delete this entry?')) return;
        try{ const { error } = await supabase.from('overtime_data').delete().eq('id', id); if(error) throw error; dataCache = dataCache.filter(r=>String(r.id)!==String(id)); render(dataCache); }catch(err){ console.error(err); alert('Delete failed: '+(err.message||err)); }
        return;
      }

      if(action === 'edit'){
        if(!unlocked){ alert('Locked. Unlock to edit.'); return; }
        rowEl.classList.add('editing');
        rowEl.querySelectorAll('.display').forEach(d=>d.style.display='none');
        rowEl.querySelectorAll('.edit-input').forEach(i=>i.style.display='block');
        // show date edit input container
        const dateEdit = rowEl.querySelector('.date-edit'); if(dateEdit) dateEdit.style.display='block';
        ev.target.closest('.actions').innerHTML = `<button class="btn ghost" data-action="save">Save</button><button class="btn ghost" data-action="cancel">Cancel</button>`;
        updateGuarded();
        return;
      }

      if(action === 'save'){
        if(!unlocked){ alert('Locked. Unlock to save.'); return; }
        const inputs = rowEl.querySelectorAll('.edit-input');
        const name = inputs[0]?.value.trim(); const overtime_date = inputs[1]?.value || null; const notes = inputs[2]?.value.trim();
        if(!name){ alert('Name required'); return; }
        try{
          const { data, error } = await supabase.from('overtime_data').update({name,notes,overtime_date}).eq('id', id).select();
          if(error) throw error;
          dataCache = dataCache.map(r => String(r.id)===String(id) ? (data && data[0]) || { ...r, name, notes, overtime_date } : r);
          render(dataCache);
        }catch(err){ console.error(err); alert('Update failed: '+(err.message||err)); }
        return;
      }

      if(action === 'cancel'){
        render(dataCache);
        return;
      }
    });

    searchInput.addEventListener('input', ()=>{
      const q = searchInput.value.trim().toLowerCase();
      if(!q) return render(dataCache);
      const filtered = dataCache.filter(r => (r.name||'').toLowerCase().includes(q) || (r.notes||'').toLowerCase().includes(q) || (r.overtime_date||'').includes(q));
      render(filtered);
    });

    // unlock modal handlers
    unlockBtn.addEventListener('click', ()=> { if(!unlocked) openModal(); else { if(!confirm('Lock actions?')) return; setUnlocked(false,true); } });
    lockToggle.addEventListener('click', ()=> { if(!unlocked) openModal(); else { if(!confirm('Lock actions?')) return; setUnlocked(false,true); } });
    pwSubmit.addEventListener('click', ()=> submitPassword(pwInput.value || '') );
    pwCancel.addEventListener('click', ()=> closeModal());
    pwInput.addEventListener('keydown', (ev)=> { if(ev.key==='Enter'){ ev.preventDefault(); pwSubmit.click(); } });

    // init
    window.addEventListener('DOMContentLoaded', async ()=>{
      setUnlocked(false,true);
      await loadRows();
    });
  </script>
</body>
</html>
