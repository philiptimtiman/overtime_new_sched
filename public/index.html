<!doctype html>
<html lang="tl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Overtime Scheduler — Mobile First</title>
  <meta name="description" content="Mobile-first overtime scheduler: fixed mobile layout, inputs disabled when locked, iOS-safe date input, centered." />
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --text:#e6eef8;
      --muted:#9fb0c6;
      --accent:#60a5fa;
      --danger:#ef4444;
      --glass: rgba(255,255,255,0.03);
      --shadow: 0 8px 30px rgba(2,6,23,0.6);
      --input-h:44px;
      --radius:12px;
      /* Mobile-first fixed sizes */
      --mobile-width:360px;   /* target mobile width */
      --gutter:12px;
      --fs:16px;
    }

    /* Reset */
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%;margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;-webkit-font-smoothing:antialiased;font-size:var(--fs)}
    input,button,select,textarea{font-family:inherit;font-size:1rem}
    a{color:inherit}

    /* Page wrapper: force a centered mobile canvas */
    .mobile-canvas{
      width:100%;
      min-height:100vh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:18px;
      background:var(--bg);
    }

    /* Fixed mobile container */
    .app {
      width:var(--mobile-width);
      max-width:100%;
      background:transparent;
      display:flex;
      flex-direction:column;
      gap:14px;
      align-items:stretch;
    }

    /* Header */
    .header-card{
      border-radius:var(--radius);
      padding:12px;
      background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));
      border:1px solid rgba(255,255,255,0.04);
      box-shadow:var(--shadow);
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:space-between;
    }
    .title-block{display:flex;flex-direction:column;gap:2px}
    .title-block h1{font-size:1rem;margin:0}
    .title-block p{margin:0;color:var(--muted);font-size:.85rem}

    .controls{display:flex;gap:8px;align-items:center;width:100%}
    .search{flex:1;border-radius:10px;padding:8px 10px;height:40px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:var(--text);min-width:0}

    .btn{background:linear-gradient(180deg,var(--accent),#1e40af);color:#fff;border:0;padding:8px 10px;border-radius:10px;cursor:pointer;font-weight:600}
    .btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}
    .btn.ghost{background:transparent;border:0;color:var(--muted);padding:6px 8px;border-radius:8px;cursor:pointer}
    .btn.danger{background:transparent;border:1px solid rgba(255,0,0,0.08);color:var(--danger);padding:6px 8px;border-radius:8px}

    /* Card */
    .card{background:var(--card);border-radius:12px;padding:12px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,0.04);overflow:visible}

    /* Entries list */
    .list{display:flex;flex-direction:column;gap:10px}
    .item{
      padding:10px;border-radius:10px;background:var(--glass);border:1px solid rgba(255,255,255,0.04);
      display:grid;grid-template-columns:1fr 100px;gap:8px;align-items:center;
    }
    .item .left{display:flex;flex-direction:column;gap:6px}
    .item .right{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
    .value{padding:8px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.02);text-align:center;color:var(--text);min-height:36px;display:flex;align-items:center;justify-content:center}
    .edit-input{display:none;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--text);height:36px}

    .item.editing .value{display:none}
    .item.editing .edit-input{display:block}

    /* Sidebar / Add form (stacked under header for mobile) */
    #formCard{width:100%}
    #formCard .card{padding:12px}
    #formCard strong{display:block;text-align:center;margin:0 0 8px 0;font-size:1rem}
    label{font-size:.9rem;color:var(--muted);margin:0 0 6px 0;text-align:center;display:block}
    input[type="text"], input[type="date"], textarea{
      width:100%; padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.04); background:transparent; color:var(--text); height:var(--input-h); text-align:center; box-sizing:border-box;
    }

    .add-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .form-actions{display:flex;gap:8px;justify-content:center;margin-top:10px}

    /* Date wrapper to avoid iOS overlap */
    .date-wrap{position:relative;width:100%}
    .date-wrap input[type="date"]{padding:10px 44px 10px 12px;-webkit-appearance:textfield;appearance:textfield}
    .date-wrap input[type="date"]::-webkit-calendar-picker-indicator{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:28px;height:28px;opacity:0.95;cursor:pointer;padding:4px}
    .date-wrap input[type="date"]::-webkit-datetime-edit, .date-wrap input[type="date"]::-webkit-datetime-edit-fields-wrapper, .date-wrap input[type="date"]::-webkit-datetime-edit-text { padding:0; margin:0; line-height:1.1; }

    /* Make inputs visibly disabled when locked */
    .lock-guard[disabled]{opacity:0.45;pointer-events:none}

    /* Scale down slightly on very small phones */
    @media (max-width:360px){
      :root{ --mobile-width:320px; }
      .app{ width:var(--mobile-width); }
      .add-row{ grid-template-columns:1fr; }
    }

    /* Desktop: keep the mobile canvas centered and same width (no auto-responsive expansion) */
    @media (min-width:720px){
      .mobile-canvas{ align-items:flex-start; padding-top:28px; }
      .app{ box-shadow: 0 10px 40px rgba(0,0,0,0.5); border-radius:14px; }
    }
  </style>
</head>
<body>
  <div class="mobile-canvas">
    <div class="app" role="application" aria-label="Overtime Scheduler mobile">
      <header class="header-card" role="banner" aria-label="Header">
        <div class="title-block" aria-hidden="true">
          <h1>Overtime Scheduler</h1>
          <p>Locked by default — unlock to add or edit</p>
        </div>

        <div style="display:flex;align-items:center;gap:8px;width:46%;">
          <input id="search" class="search" placeholder="Search name or notes" aria-label="Search" />
        </div>
      </header>

      <section class="card list" aria-live="polite">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <strong>Entries</strong>
          <span id="status" style="font-size:.9rem;color:var(--muted)">Idle</span>
        </div>

        <div id="rows" style="display:flex;flex-direction:column;gap:10px"></div>
        <div id="empty" style="display:none;text-align:center;color:var(--muted);padding:12px">No entries yet.</div>
      </section>

      <aside id="formCard" class="card" aria-labelledby="addOvertimeTitle">
        <strong id="addOvertimeTitle">Add Overtime</strong>

        <form id="addForm" autocomplete="off" novalidate>
          <div style="margin-top:8px">
            <label for="name">Name</label>
            <input id="name" name="name" class="lock-guard" type="text" placeholder="Employee name" required />
          </div>

          <div class="add-row" style="margin-top:10px">
            <div>
              <label for="overtime_date">Date</label>
              <div class="date-wrap">
                <input id="overtime_date" name="overtime_date" class="lock-guard" type="date" />
              </div>
            </div>

            <div>
              <label for="notes">Notes</label>
              <input id="notes" name="notes" class="lock-guard" type="text" placeholder="Short note" />
            </div>
          </div>

          <div class="form-actions">
            <button id="submitBtn" class="btn lock-guard" type="submit">Add</button>
            <button id="resetBtn" type="button" class="btn secondary lock-guard">Reset</button>
            <button id="lockToggle" type="button" class="btn ghost" title="Lock or unlock">Unlock</button>
          </div>
      </form>
      </aside>

      <footer style="text-align:center;color:var(--muted);font-size:.85rem;padding:6px 0">
        <div>BoxTechHub™</div>
        <div style="font-size:.8rem;margin-top:4px">© 2026 BoxTechHub</div>
      </footer>
    </div>
  </div>

  <div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999;padding:18px">
    <div style="background:var(--card);padding:14px;border-radius:12px;max-width:360px;width:100%;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,0.06)">
      <h3 style="margin:0 0 8px 0">Unlock</h3>
      <p style="margin:0 0 10px;color:var(--muted)">Enter password to enable Add/Edit/Delete</p>
      <input id="pwInput" type="password" placeholder="Password" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);margin-bottom:10px" />
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button id="pwCancel" class="btn secondary">Cancel</button>
        <button id="pwSubmit" class="btn">Submit</button>
      </div>
      <div id="pwError" style="color:var(--danger);margin-top:8px;display:none"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const SUPABASE_URL = 'https://bisvmgjgyvludhqsvvcn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpc3ZtZ2pneXZsdWRocXN2dmNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTI1ODMsImV4cCI6MjA4NzI2ODU4M30.eodsmChKwoEiPlNz9d2Ge3lAmO3BWfdKRWVRdgk9Xl8';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const rowsEl = document.getElementById('rows');
    const statusEl = document.getElementById('status');
    const form = document.getElementById('addForm');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const searchInput = document.getElementById('search');
    const lockToggle = document.getElementById('lockToggle');
    const lockDot = document.getElementById('lockDot');
    const lockText = document.getElementById('lockText');
    const modal = document.getElementById('modal');
    const pwInput = document.getElementById('pwInput');
    const pwSubmit = document.getElementById('pwSubmit');
    const pwCancel = document.getElementById('pwCancel');
    const pwError = document.getElementById('pwError');
    const emptyEl = document.getElementById('empty');

    const LOCAL_KEY = 'overtime_unlocked_v1';
    let dataCache = [];
    let unlocked = false;

    function safeGetLocal(key){ try { return localStorage.getItem(key); } catch (e) { return null; } }
    function safeSetLocal(key, value){ try { localStorage.setItem(key, value); return true; } catch (e) { return false; } }
    function formatDate(d){ if(!d) return '—'; return new Date(d + 'T00:00:00').toLocaleDateString(); }
    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    // Ensure lock-guarded elements (including add form inputs) are disabled when locked
    function updateGuardedControls(){
      const guarded = document.querySelectorAll('.lock-guard');
      guarded.forEach(el => {
        if (unlocked) el.removeAttribute('disabled');
        else el.setAttribute('disabled','true');
      });
      // row action buttons (if any)
      const rowActionButtons = rowsEl.querySelectorAll('[data-action]');
      rowActionButtons.forEach(btn => {
        const action = btn.dataset.action;
        if (['edit','delete','save','cancel'].includes(action)) {
          if (unlocked) btn.removeAttribute('disabled'); else btn.setAttribute('disabled','true');
        }
      });
    }

    function setUnlockedState(isUnlocked, persist = true){
      unlocked = !!isUnlocked;
      // visual lock indicator (header has no dot here, but keep text)
      const lockBtn = document.getElementById('lockToggle');
      if (unlocked) {
        lockBtn.textContent = 'Lock';
      } else {
        lockBtn.textContent = 'Unlock';
      }
      updateGuardedControls();
      if (persist) safeSetLocal(LOCAL_KEY, unlocked ? 'true' : 'false');
    }

    function openModal(){ modal.style.display='flex'; pwInput.value=''; pwError.style.display='none'; pwInput.focus(); }
    function closeModal(){ modal.style.display='none'; pwError.style.display='none'; }

    async function submitPassword(password){
      try {
        pwError.style.display = 'block';
        pwError.textContent = 'Checking...';
        const res = await fetch('/api/unlock', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password }) });
        const raw = await res.text();
        let parsed;
        try { parsed = raw ? JSON.parse(raw) : null; } catch (e) { parsed = null; }
        if (!res.ok) {
          const msg = parsed?.error || parsed?.message || raw || `HTTP ${res.status}`;
          pwError.textContent = `Server: ${msg}`;
          return;
        }
        setUnlockedState(true, true);
        closeModal();
      } catch (err) {
        console.error(err);
        pwError.textContent = 'Network or server error.';
      }
    }

    // Render row
    function createRowElement(row){
      const wrapper = document.createElement('div');
      wrapper.className = 'item';
      wrapper.dataset.id = row.id;
      wrapper.innerHTML = `
        <div class="left">
          <div class="value" data-field="name">${escapeHtml(row.name)}</div>
          <div style="margin-top:6px;font-size:.85rem;color:var(--muted);text-align:center">${row.notes ? escapeHtml(row.notes) : ''}</div>
        </div>
        <div class="right">
          <div class="value" data-field="overtime_date">${row.overtime_date ? formatDate(row.overtime_date) : '—'}</div>
          <div style="display:flex;gap:6px;margin-top:6px">
            <button class="btn ghost lock-guard" data-action="edit">Edit</button>
            <button class="btn ghost lock-guard" data-action="delete">Delete</button>
          </div>
        </div>
      `;
      return wrapper;
    }

    function renderList(items){
      rowsEl.innerHTML = '';
      if(!items.length){ emptyEl.style.display = 'block'; return; }
      emptyEl.style.display = 'none';
      items.forEach(row => rowsEl.appendChild(createRowElement(row)));
      updateGuardedControls();
    }

    // Load rows from Supabase (placeholder)
    async function loadRows(){
      statusEl.textContent = 'Loading...';
      try {
        const { data, error } = await supabase.from('overtime_data').select('id,name,notes,overtime_date').order('overtime_date',{ascending:true});
        if (error) throw error;
        dataCache = (data || []);
        renderList(dataCache);
        statusEl.textContent = `Loaded ${dataCache.length} rows`;
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error loading data';
      }
    }

    // Add form submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!unlocked) { alert('Actions are locked. Unlock to add entries.'); return; }
      const name = form.name.value.trim();
      const notes = form.notes.value.trim();
      const overtime_date = form.overtime_date.value || null;
      if (!name) { alert('Name is required'); return; }
      submitBtn.disabled = true; submitBtn.textContent = 'Adding...';
      try {
        const { data, error } = await supabase.from('overtime_data').insert([{ name, notes, overtime_date }]).select();
        if (error) throw error;
        dataCache = [...dataCache, ...(data||[])];
        renderList(dataCache);
        form.reset();
      } catch (err) {
        console.error(err);
        alert('Insert failed: ' + (err.message || err));
      } finally {
        submitBtn.disabled = false; submitBtn.textContent = 'Add';
      }
    });

    resetBtn.addEventListener('click', () => form.reset());

    // Row actions (edit/delete) — simple handlers (edit toggles inline editing)
    rowsEl.addEventListener('click', async (e) => {
      const action = e.target?.dataset?.action;
      if (!action) return;
      const item = e.target.closest('.item');
      const id = item?.dataset?.id;
      if (!id) return;

      if (action === 'delete') {
        if (!unlocked) { alert('Actions are locked. Unlock to delete.'); return; }
        if (!confirm('Delete this entry?')) return;
        try {
          const { error } = await supabase.from('overtime_data').delete().eq('id', id);
          if (error) throw error;
          dataCache = dataCache.filter(r => String(r.id) !== String(id));
          renderList(dataCache);
        } catch (err) {
          console.error(err);
          alert('Delete failed: ' + (err.message || err));
        }
        return;
      }

      if (action === 'edit') {
        if (!unlocked) { alert('Actions are locked. Unlock to edit.'); return; }
        // Simple inline edit: replace values with inputs
        const nameEl = item.querySelector('[data-field="name"]');
        const dateEl = item.querySelector('[data-field="overtime_date"]');
        const currentName = nameEl.textContent || '';
        const currentDate = dateEl.textContent && dateEl.textContent !== '—' ? new Date(dateEl.textContent).toISOString().slice(0,10) : '';
        item.classList.add('editing');
        nameEl.style.display = 'none';
        dateEl.style.display = 'none';

        const nameInput = document.createElement('input');
        nameInput.value = currentName;
        nameInput.className = 'edit-input';
        nameInput.style.display = 'block';
        nameInput.style.width = '100%';
        nameInput.style.marginBottom = '6px';

        const dateInput = document.createElement('input');
        dateInput.type = 'date';
        dateInput.value = currentDate;
        dateInput.className = 'edit-input';
        dateInput.style.display = 'block';
        dateInput.style.width = '100%';

        const left = item.querySelector('.left');
        left.insertBefore(nameInput, left.firstChild);
        left.insertBefore(dateInput, left.children[1]);

        const actions = item.querySelector('.right > div:last-child');
        actions.innerHTML = `
          <button class="btn ghost" data-action="save">Save</button>
          <button class="btn ghost" data-action="cancel">Cancel</button>
        `;
        updateGuardedControls();
        return;
      }

      if (action === 'save') {
        if (!unlocked) { alert('Actions are locked. Unlock to save.'); return; }
        const left = item.querySelector('.left');
        const nameInput = left.querySelector('input[type="text"]');
        const dateInput = left.querySelector('input[type="date"]');
        const name = nameInput?.value.trim();
        const overtime_date = dateInput?.value || null;
        if (!name) { alert('Name required'); return; }
        try {
          const { data, error } = await supabase.from('overtime_data').update({ name, overtime_date }).eq('id', item.dataset.id).select();
          if (error) throw error;
          // update cache
          dataCache = dataCache.map(r => String(r.id) === String(item.dataset.id) ? (data && data[0]) || { ...r, name, overtime_date } : r);
          renderList(dataCache);
        } catch (err) {
          console.error(err);
          alert('Update failed: ' + (err.message || err));
        }
        return;
      }

      if (action === 'cancel') {
        renderList(dataCache);
        return;
      }
    });

    // Search filter
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) return renderList(dataCache);
      const filtered = dataCache.filter(r =>
        (r.name||'').toLowerCase().includes(q) ||
        (r.notes||'').toLowerCase().includes(q) ||
        (r.overtime_date||'').includes(q)
      );
      renderList(filtered);
    });

    // Modal handlers
    pwSubmit.addEventListener('click', () => submitPassword(pwInput.value || '') );
    pwCancel.addEventListener('click', () => closeModal());
    pwInput.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); pwSubmit.click(); } });

    // Lock toggle (opens modal to unlock)
    lockToggle.addEventListener('click', () => {
      if (!unlocked) openModal();
      else { if (!confirm('Locking will disable Add/Edit/Delete. Continue?')) return; setUnlockedState(false, true); }
    });

    // On load: force locked on every page load (mobile-first)
    window.addEventListener('DOMContentLoaded', async () => {
      setUnlockedState(false, true);
      await loadRows();
    });
  </script>
</body>
</html>
