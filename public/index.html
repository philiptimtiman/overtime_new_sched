<!doctype html>
<html lang="tl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Overtime Scheduler</title>
  <meta name="description" content="Overtime Schedule for SLT Foreign TE" />
  <style>
    :root{
      --accent:#10b981; --accent-2:#059669;
      --bg-top:#04251f; --bg-bottom:#0b3b36;
      --text:#e6f7f2; --muted:#9fcfc3; --danger:#ef4444;
      --card-bg-top: rgba(8,40,34,0.06);
      --card-bg-bottom: rgba(6,30,26,0.03);
      --input-h:40px; --radius:10px; --mobile-width:360px;
      --base-font:15px; --theme-transition:220ms ease;
      --ongoing-color: #3b82f6;
      --upcoming-color: #10b981;
      --expiring-color: #f59e0b;
    }

    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%;margin:0;padding:0;background:transparent;color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;-webkit-font-smoothing:antialiased;font-size:var(--base-font)}
    input,button,select,textarea{font-family:inherit}
    button{cursor:pointer}

    .canvas{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px;background:transparent}

    .app{
      width:var(--mobile-width);max-width:100%;
      display:flex;flex-direction:column;gap:12px;align-items:stretch;
      background: linear-gradient(180deg,var(--bg-top),var(--bg-bottom));
      border-radius:14px;padding:10px;box-shadow:0 14px 36px rgba(2,10,8,0.45);border:1px solid rgba(255,255,255,0.03);
      transition:background var(--theme-transition),color var(--theme-transition);
    }

    .card{
      background: linear-gradient(180deg,var(--card-bg-top),var(--card-bg-bottom));
      border-radius:var(--radius);padding:12px;box-shadow:0 8px 20px rgba(2,6,23,0.45);border:1px solid rgba(255,255,255,0.04);
    }

    .header.card{display:flex;flex-direction:column;gap:8px;position:relative;padding-top:12px}
    .brand{display:flex;flex-direction:column;align-items:center;text-align:center}
    .brand h1{margin:0;font-size:1rem}
    .brand p{margin:0;color:var(--muted);font-size:.85rem}

    .controls{display:flex;gap:8px;align-items:center}
    .search{flex:1;border-radius:8px;padding:8px 10px;height:var(--input-h);border:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.12);color:var(--text)}

    .live-row{display:flex;align-items:center;justify-content:center;margin-top:4px}
    .live-clock{font-family:monospace;font-size:0.86rem;color:var(--muted);background:rgba(255,255,255,0.02);padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);min-width:170px;text-align:center;pointer-events:none}

    .theme-row{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:6px}
    .theme-swatch{width:36px;height:36px;border-radius:999px;border:2px solid rgba(255,255,255,0.06);display:inline-flex;align-items:center;justify-content:center;padding:0;background:transparent}
    .theme-swatch .dot{width:24px;height:24px;border-radius:999px}
    .swatch-ocean .dot{background:linear-gradient(180deg,#4f46e5,#3b82f6)}
    .swatch-warm .dot{background:linear-gradient(180deg,#ff7a59,#ff5a36)}
    .swatch-forest .dot{background:linear-gradient(180deg,#10b981,#059669)}
    .swatch-violet .dot{background:linear-gradient(180deg,#d946ef,#a78bfa)}

    .theme-swatch.swatch-black { border: 1px solid rgba(255,255,255,0.06); background: transparent; }
    .swatch-black .dot{
      width:24px;height:24px;border-radius:999px;background:#000000;border:0;box-shadow:0 4px 10px rgba(0,0,0,0.25), inset 0 0 0 1px rgba(255,255,255,0.03);
      display:block;
    }

    .theme-swatch.swatch-white { border: 1px solid rgba(0,0,0,0.08); background: transparent; }
    .swatch-white .dot{
      width:24px;height:24px;border-radius:999px;background:#ffffff;border:0;box-shadow:0 4px 10px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(0,0,0,0.04);
      display:block;
    }

    .theme-swatch.active{transform:scale(1.06);box-shadow:0 8px 26px rgba(0,0,0,0.32);border-color:transparent}

    .meta{font-size:.82rem;color:var(--muted);text-align:center}

    .list{display:flex;flex-direction:column;gap:8px}
    .item{display:flex;flex-direction:column;gap:8px;padding:10px;border-radius:10px;background:linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03)}
    .item-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .item-left{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}

    .name{font-weight:600;font-size:.96rem;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .notes{color:var(--muted);font-size:.82rem;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .date-pill{display:inline-flex;align-items:center;justify-content:center;min-width:72px;max-width:160px;padding:6px 10px;border-radius:8px;background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));border:1px solid rgba(255,255,255,0.02);color:var(--text);box-sizing:border-box;font-size:0.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;line-height:1;text-align:center}
    .date-pill time{ display:block; width:100%; text-align:center; }

    .item-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}

    .btn{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#fff;border:0;padding:8px 10px;border-radius:10px;font-weight:600;font-size:.95rem;transition:background var(--theme-transition), color var(--theme-transition)}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted)}
    .btn.danger{background:transparent;border:1px solid rgba(255,0,0,0.08);color:var(--danger)}
    .btn.full{width:100%}
    .icon-btn{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;padding:0;border-radius:10px;background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.04);transition: background 180ms ease, color 180ms ease, transform 120ms ease, box-shadow 220ms ease;}
    .icon-btn svg{ display:block; width:18px; height:18px; }
    .icon-btn.active{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(0,0,0,0.25);}
    .icon-btn:focus{ outline:2px solid rgba(255,255,255,0.06); outline-offset:2px; }

    #formCard{display:flex;flex-direction:column;gap:10px}
    #formCard label{font-size:var(--label-font);color:var(--muted);margin:0 0 8px 0;text-align:center;display:block;transition:color var(--theme-transition)}
    .field{display:flex;flex-direction:column;gap:8px;min-width:0}

    .add-row{display:grid;grid-template-columns:1fr;gap:8px;align-items:start}
    @media(min-width:520px){ .add-row{grid-template-columns:1fr 1fr} }

    .date-control{display:flex;align-items:center;gap:8px;min-width:0;}
    .date-control input[type="date"],.date-control input[type="text"],.date-control input[type="datetime-local"]{flex:1;min-width:0;height:var(--input-h);padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:rgba(0,0,0,0.12);color:var(--text);text-align:center;box-sizing:border-box;}
    .date-btn{flex:0 0 auto;width:40px;height:40px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
    @media(max-width:320px){ .date-control{flex-direction:column;align-items:stretch} .date-btn{width:100%} }

    input[type="text"], textarea, input[type="date"]{width:100%;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:rgba(0,0,0,0.12);color:var(--text);height:var(--input-h);box-sizing:border-box;min-width:0;font-size:var(--input-font);text-align:center;transition: background var(--theme-transition), color var(--theme-transition), border-color var(--theme-transition);}
    input[type="text"]:focus, textarea:focus, input[type="date"]:focus { text-align:left; outline: none; box-shadow: 0 0 0 3px rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.18); }

    .date-text{padding-right:48px;cursor:pointer}
    .native-date{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:36px;height:36px;opacity:0;border:0;padding:0;margin:0;background:transparent;z-index:3;cursor:pointer}

    .editing .edit-input{display:block}
    .edit-input{display:none;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--text);width:100%;box-sizing:border-box;min-width:0;text-align:left;font-size:var(--input-font)}

    .item.editing { display:flex; flex-direction:column; gap:8px; }
    .item.editing .edit-input { width:100%; max-width:100%; }

    .modal-backdrop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:linear-gradient(180deg, rgba(2,6,6,0.6), rgba(2,6,6,0.7));z-index:99999;}
    .modal{z-index:100000;position:relative;transform:translateZ(0);padding:12px;border-radius:10px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03);transition:background var(--theme-transition), color var(--theme-transition)}

    /* hide only guarded controls inside actions when locked */
    .actions-hidden .item-actions .lock-guard { display: none !important; }

    .form-hidden #formCard { display: none !important; }

    .item.upcoming { box-shadow: 0 8px 20px rgba(16,185,129,0.06); border-color: rgba(16,185,129,0.12); }
    .item.upcoming .date-pill { border-color: rgba(16,185,129,0.18); background: linear-gradient(180deg, rgba(16,185,129,0.04), rgba(16,185,129,0.02)); }

    .item.ongoing { box-shadow: 0 8px 20px rgba(59,130,246,0.06); border-color: rgba(59,130,246,0.12); }
    .item.ongoing .date-pill { border-color: rgba(59,130,246,0.18); background: linear-gradient(180deg, rgba(59,130,246,0.04), rgba(59,130,246,0.02)); }

    .item.expiring { box-shadow: 0 8px 20px rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.12); }
    .item.expiring .date-pill { border-color: rgba(245,158,11,0.18); background: linear-gradient(180deg, rgba(245,158,11,0.04), rgba(245,158,11,0.02)); }

    @media (max-width:420px){
      .add-row{grid-template-columns:1fr}
      .app{width:320px}
      .date-text{padding-right:48px}
      .theme-row{flex-wrap:wrap}
      .date-pill{min-width:64px; max-width:96px; font-size:0.85rem}
      .live-clock{min-width:140px;font-size:0.78rem}
    }

    .counts-card{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03)}
    .counts-row{display:flex;gap:10px;align-items:center}
    .count-pill{min-width:64px;padding:8px 10px;border-radius:10px;background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--text);font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
    .count-label{font-size:0.68rem;color:var(--muted);font-weight:600}
    .count-value{font-size:1.05rem;font-weight:800}

    .count-pill.upcoming { background: linear-gradient(180deg, rgba(16,185,129,0.10), rgba(16,185,129,0.04)); border-color: rgba(16,185,129,0.14); color: #eafff5; }
    .count-pill.ongoing  { background: linear-gradient(180deg, rgba(59,130,246,0.10), rgba(59,130,246,0.04)); border-color: rgba(59,130,246,0.14); color: #eaf4ff; }
    .count-pill.expiring { background: linear-gradient(180deg, rgba(245,158,11,0.10), rgba(245,158,11,0.04)); border-color: rgba(245,158,11,0.14); color: #fff7e6; }

    .count-pill.user { background: linear-gradient(180deg, rgba(99,102,241,0.10), rgba(99,102,241,0.04)); border-color: rgba(99,102,241,0.14); color: #eef2ff; }
    .count-pill.user .count-label { color: #dbeafe; font-weight:700; }

    .counts-row .count-pill { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-width:72px }

    [data-theme="white"] .count-pill { border-color: rgba(0,0,0,0.08); background: rgba(0,0,0,0.03); color: var(--text); }
    [data-theme="white"] .count-pill .count-value { color: var(--text); }
    [data-theme="white"] .count-pill.upcoming { background: linear-gradient(180deg, rgba(16,185,129,0.12), rgba(16,185,129,0.06)); border-color: rgba(16,185,129,0.18); color: #04201a; }
    [data-theme="white"] .count-pill.ongoing { background: linear-gradient(180deg, rgba(59,130,246,0.12), rgba(59,130,246,0.06)); border-color: rgba(59,130,246,0.18); color: #071433; }
    [data-theme="white"] .count-pill.expiring { background: linear-gradient(180deg, rgba(245,158,11,0.12), rgba(245,158,11,0.06)); border-color: rgba(245,158,11,0.18); color: #4a2b00; }
    [data-theme="white"] .date-pill { border-color: rgba(0,0,0,0.06); background: rgba(0,0,0,0.02); color: var(--text); }
    [data-theme="white"] .theme-swatch.active { box-shadow: 0 8px 26px rgba(0,0,0,0.12); transform: scale(1.06); }

  </style>
</head>
<body>
  <div class="canvas">
    <div id="appRoot" class="app" role="application" aria-label="Overtime Scheduler">
      <header class="card header" aria-labelledby="appTitle">
        <div class="brand">
          <h1 id="appTitle" style="margin:0">OVERTIME & LEAVE SCHEDULE</h1>
          <p class="meta" style="margin-top:6px">&#169;2026 BoxTechHub&#8482 v26.2.24.1</p>
          <p class="meta" style="margin-top:6px">philiptimtiman@gmail.com</p>
        </div>

        <div class="live-row" aria-hidden="false">
          <div id="liveClock" class="live-clock" role="status" aria-live="polite">—</div>
        </div>

        <div class="controls" role="search" style="margin-top:8px;display:flex;gap:8px;align-items:center">
          <input id="search" class="search" placeholder="Search name or notes" aria-label="Search entries" />
          <div class="lock-group" style="margin-left:6px;display:flex;align-items:center;gap:8px">
            <div id="lockIndicator" aria-hidden="true" style="width:10px;height:10px;border-radius:50%;background:#ef4444;transition:background var(--theme-transition)"></div>

            <button id="openUnlock" class="btn ghost icon-btn" aria-pressed="false" aria-label="Unlock actions" title="Unlock actions" type="button">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="11" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.4" />
                <path d="M7 11V8a5 5 0 0110 0v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="16" r="1.2" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="theme-row" role="toolbar" aria-label="Theme switcher" style="margin-top:10px">
          <button class="theme-swatch swatch-ocean" data-theme="ocean" aria-label="Ocean Indigo" title="Ocean Indigo" type="button"><span class="dot" aria-hidden="true"></span></button>
          <button class="theme-swatch swatch-warm" data-theme="warm" aria-label="Warm Sunset" title="Warm Sunset" type="button"><span class="dot" aria-hidden="true"></span></button>
          <button class="theme-swatch swatch-forest active" data-theme="forest" aria-label="Forest Teal" title="Forest Teal" type="button"><span class="dot" aria-hidden="true"></span></button>
          <button class="theme-swatch swatch-violet" data-theme="violet" aria-label="Violet Glow" title="Violet Glow" type="button"><span class="dot" aria-hidden="true"></span></button>

          <button class="theme-swatch swatch-black" data-theme="black" aria-label="Black Theme" title="Black Theme" type="button"><span class="dot" aria-hidden="true"></span></button>
          <button class="theme-swatch swatch-white" data-theme="white" aria-label="White Theme" title="White Theme" type="button"><span class="dot" aria-hidden="true"></span></button>
        </div>
      </header>

      <div class="counts-card card" aria-live="polite" style="margin-top:8px">
        <div class="counts-row" aria-hidden="false">
          <div id="upcomingCount" class="count-pill upcoming" title="Upcoming within 24h">
            <div class="count-value">0</div>
            <div class="count-label">Upcoming</div>
          </div>
          <div id="ongoingCount" class="count-pill ongoing" title="On going (today)">
            <div class="count-value">0</div>
            <div class="count-label">On going</div>
          </div>
          <div id="expiringCount" class="count-pill expiring" title="Expiring soon (within grace)">
            <div class="count-value">0</div>
            <div class="count-label">Expiring</div>
          </div>

          <div id="userCount" class="count-pill user" title="Unique users who opened the WebApp">
            <div class="count-value">0</div>
            <div class="count-label">Users</div>
          </div>
        </div>
      </div>

      <aside class="card" id="formCard" aria-labelledby="addOvertimeTitle" style="display:flex;flex-direction:column;gap:8px">
        <strong id="addOvertimeTitle" style="display:block;text-align:center">Add Entries</strong>

        <form id="addForm" autocomplete="off" novalidate>
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" class="lock-guard" type="text" placeholder="Employee name" required />
          </div>

          <div class="add-row" style="display:grid;grid-template-columns:1fr;gap:8px">
            <div class="field">
              <label for="overtime_date">Date</label>
              <div class="date-control">
                <input id="overtime_date" name="overtime_date" class="date-text lock-guard" type="date" aria-label="Overtime date" />
                <button type="button" id="datePickerBtn" class="date-btn lock-guard" aria-label="Open date picker">📅</button>
              </div>
            </div>

            <div class="field">
              <label for="notes">Notes</label>
              <input id="notes" name="notes" class="lock-guard" type="text" placeholder="Short note" />
            </div>
          </div>

          <div class="form-actions" role="group" aria-label="Form actions" style="margin-top:8px">
            <button id="submitBtn" class="btn" type="submit" title="Add entry" aria-label="Add entry">Add</button>
            <button id="resetBtn" type="button" class="btn ghost lock-guard" title="Reset form" aria-label="Reset form">Reset</button>
          </div>
        </form>
      </aside>

      <main class="card" aria-live="polite" style="display:flex;flex-direction:column;gap:10px;margin-top:6px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <strong>Entries</strong>
          <span id="status" class="meta">Idle</span>
        </div>

        <div id="rows" class="list" aria-live="polite"></div>
        <div id="empty" class="empty" style="display:none;color:var(--muted);padding:6px;border-radius:8px;background:rgba(255,255,255,0.01);text-align:center">Walang malapit na overtime o leave sa loob ng 24 oras.</div>
      </main>
    </div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal" role="document" aria-labelledby="modalTitle">
      <h3 id="modalTitle" style="margin:0 0 8px 0">Unlock Actions</h3>
      <p style="margin:0 0 8px;color:var(--muted);font-size:.9rem">Enter password to enable Add / Delete</p>
      <input id="pwInput" type="password" placeholder="Password" style="width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);margin-bottom:8px;height:40px" />
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button id="pwCancel" class="btn ghost">Cancel</button>
        <button id="pwSubmit" class="btn">Submit</button>
      </div>
      <div id="pwError" style="color:var(--danger);margin-top:8px;display:none"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const SUPABASE_URL = 'https://bisvmgjgyvludhqsvvcn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpc3ZtZ2pneXZsdWRocXN2dmNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTI1ODMsImV4cCI6MjA4NzI2ODU4M30.eodsmChKwoEiPlNz9d2Ge3lAmO3BWfdKRWVRdgk9Xl8';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const appRoot = document.getElementById('appRoot');
    const rowsEl = document.getElementById('rows');
    const statusEl = document.getElementById('status');
    const emptyEl = document.getElementById('empty');
    const form = document.getElementById('addForm');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const searchInput = document.getElementById('search');
    const openUnlock = document.getElementById('openUnlock');
    const lockIndicator = document.getElementById('lockIndicator');

    const modalBackdrop = document.getElementById('modalBackdrop');
    const pwInput = document.getElementById('pwInput');
    const pwSubmit = document.getElementById('pwSubmit');
    const pwCancel = document.getElementById('pwCancel');
    const pwError = document.getElementById('pwError');

    const dateInput = document.getElementById('overtime_date');
    const dateBtn = document.getElementById('datePickerBtn');
    const liveClockEl = document.getElementById('liveClock');

    const swatches = Array.from(document.querySelectorAll('.theme-swatch'));
    const THEME_KEY = 'overtime_theme_v1';
    const LOCAL_KEY = 'overtime_unlocked_v2';

    const upcomingCountEl = document.getElementById('upcomingCount');
    const ongoingCountEl = document.getElementById('ongoingCount');
    const expiringCountEl = document.getElementById('expiringCount');
    const userCountEl = document.getElementById('userCount');

    window.dataCache = [];
    let unlocked = false;

    const ORIGINAL_EXPIRY_MINUTES = 1880;
    const EXPIRING_WINDOW_MINUTES = 440;
    const ORIGINAL_EXPIRY_MS = ORIGINAL_EXPIRY_MINUTES * 60 * 1000;
    const EXPIRING_WINDOW_MS = EXPIRING_WINDOW_MINUTES * 60 * 1000;

    function safeGetLocal(key){ try { return localStorage.getItem(key); } catch (e) { return null; } }
    function safeSetLocal(key, value){ try { localStorage.setItem(key, value); return true; } catch (e) { return false; } }

    function formatDateOnlyYMD(iso){
      if (!iso) return '—';
      const d = new Date(iso);
      if (isNaN(d)) return '—';
      const pad = (n) => String(n).padStart(2,'0');
      const yyyy = d.getFullYear();
      const mm = pad(d.getMonth()+1);
      const dd = pad(d.getDate());
      return `${yyyy}/${mm}/${dd}`;
    }

    function toIsoDateFromInput(val){
      if (!val) return null;
      const m = val.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      return m ? `${m[1]}-${m[2]}-${m[3]}` : null;
    }

    function toDateInputValue(stored){
      if (!stored) return '';
      const d = new Date(stored);
      if (!isNaN(d)) {
        const pad = (n) => String(n).padStart(2,'0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      }
      const m = String(stored).match(/^(\d{4})-(\d{2})-(\d{2})$/);
      return m ? `${m[1]}-${m[2]}-${m[3]}` : '';
    }

    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    const THEME_MAP = {
      forest: {
        '--accent':'#10b981','--accent-2':'#059669',
        '--bg-top':'#04251f','--bg-bottom':'#0b3b36',
        '--card-bg-top':'rgba(8,40,34,0.06)','--card-bg-bottom':'rgba(6,30,26,0.03)',
        '--text':'#e6f7f2','--muted':'#9fcfc3'
      },
      ocean: {
        '--accent':'#4f46e5','--accent-2':'#3b82f6',
        '--bg-top':'#071428','--bg-bottom':'#0b1f2b',
        '--card-bg-top':'rgba(10,20,40,0.06)','--card-bg-bottom':'rgba(8,18,34,0.03)',
        '--text':'#e6eef8','--muted':'#9fb0c6'
      },
      warm: {
        '--accent':'#ff7a59','--accent-2':'#ff5a36',
        '--bg-top':'#2b0b3a','--bg-bottom':'#3b0f2f',
        '--card-bg-top':'rgba(60,20,50,0.06)','--card-bg-bottom':'rgba(50,18,45,0.03)',
        '--text':'#f0eef6','--muted':'#c9bfc9'
      },
      violet: {
        '--accent':'#d946ef','--accent-2':'#a78bfa',
        '--bg-top':'#0b0b12','--bg-bottom':'#2b1536',
        '--card-bg-top':'rgba(40,18,40,0.06)','--card-bg-bottom':'rgba(36,14,36,0.03)',
        '--text':'#f3eefb','--muted':'#d6c7e9'
      },
      black: {
        '--accent':'#111111','--accent-2':'#333333',
        '--bg-top':'#000000','--bg-bottom':'#0b0b0b',
        '--card-bg-top':'rgba(255,255,255,0.02)','--card-bg-bottom':'rgba(255,255,255,0.01)',
        '--text':'#e6eef8','--muted':'#9fb0c6'
      },
      white: {
        '--accent':'#0b7285','--accent-2':'#0ea5a4',
        '--bg-top':'#ffffff','--bg-bottom':'#f7f7f7',
        '--card-bg-top':'rgba(0,0,0,0.03)','--card-bg-bottom':'rgba(0,0,0,0.01)',
        '--text':'#0b1220','--muted':'#6b7280'
      }
    };

    function applyTheme(theme){
      if (!theme || !THEME_MAP[theme]) theme = 'forest';
      const vars = THEME_MAP[theme];
      const root = document.documentElement;
      Object.keys(vars).forEach(k => root.style.setProperty(k, vars[k]));
      if (appRoot) appRoot.setAttribute('data-theme', theme);
      swatches.forEach(btn => btn.classList.toggle('active', btn.dataset.theme === theme));
      safeSetLocal(THEME_KEY, theme);
    }

    (function initTheme(){ const saved = safeGetLocal(THEME_KEY) || 'forest'; applyTheme(saved); })();
    swatches.forEach(btn => {
      btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
      btn.addEventListener('keydown', (ev) => { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); btn.click(); } });
    });

    function normalizeStoredDate(val) {
      if (!val) return null;
      const s = String(val).trim();
      const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (m) return `${m[1]}-${m[2]}-${m[3]}`;
      if (s.includes('T')) {
        const d = new Date(s);
        if (!isNaN(d)) {
          const pad = n => String(n).padStart(2,'0');
          return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
        }
      }
      if (/^\d+$/.test(s)) {
        const d = new Date(Number(s));
        if (!isNaN(d)) {
          const pad = n => String(n).padStart(2,'0');
          return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
        }
      }
      const sub = s.match(/(\d{4}-\d{2}-\d{2})/);
      if (sub) return sub[1];
      return null;
    }

    function parseDateOnlyToLocalMidnight(dateOnly) {
      if (!dateOnly) return NaN;
      const m = String(dateOnly).match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (m) {
        return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]), 0, 0, 0, 0);
      }
      const d = new Date(dateOnly);
      return isNaN(d) ? NaN : new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0, 0, 0, 0);
    }

    function isSameLocalDate(a, b) {
      if (!a || !b) return false;
      const da = (a instanceof Date) ? a : parseDateOnlyToLocalMidnight(String(a));
      const db = (b instanceof Date) ? b : parseDateOnlyToLocalMidnight(String(b));
      if (isNaN(da) || isNaN(db)) return false;
      return da.getFullYear() === db.getFullYear()
        && da.getMonth() === db.getMonth()
        && da.getDate() === db.getDate();
    }

    function computeExpiryForOvertimeDate(dateOnly) {
      const startMidnight = parseDateOnlyToLocalMidnight(dateOnly);
      if (isNaN(startMidnight)) return NaN;
      return new Date(startMidnight.getTime() + ORIGINAL_EXPIRY_MS);
    }

    function isExpiringSoon(dateOnly) {
      const expiry = computeExpiryForOvertimeDate(dateOnly);
      if (!expiry || isNaN(expiry)) return false;
      const now = Date.now();
      return expiry.getTime() > now && expiry.getTime() <= (now + EXPIRING_WINDOW_MS);
    }

    function getUpcomingEntries(){
      if (!Array.isArray(window.dataCache)) window.dataCache = [];
      const now = Date.now();
      const in24h = now + (24 * 60 * 60 * 1000);
      return window.dataCache.filter(r => {
        if (!r || !r.overtime_date) return false;
        const start = parseDateOnlyToLocalMidnight(r.overtime_date);
        if (isNaN(start)) return false;
        const startMs = start.getTime();
        return startMs > now && startMs <= in24h;
      }).sort((a,b) => parseDateOnlyToLocalMidnight(a.overtime_date) - parseDateOnlyToLocalMidnight(b.overtime_date));
    }

    function getOngoingEntries(){
      if (!Array.isArray(window.dataCache)) window.dataCache = [];
      const now = new Date();
      return window.dataCache.filter(r => {
        if (!r || !r.overtime_date) return false;
        const start = parseDateOnlyToLocalMidnight(r.overtime_date);
        if (isNaN(start)) return false;
        return isSameLocalDate(start, now);
      }).sort((a,b) => parseDateOnlyToLocalMidnight(a.overtime_date) - parseDateOnlyToLocalMidnight(b.overtime_date));
    }

    function getExpiringEntries(){
      if (!Array.isArray(window.dataCache)) window.dataCache = [];
      const now = Date.now();
      const soonThreshold = now + EXPIRING_WINDOW_MS;
      return window.dataCache.filter(r => {
        if (!r || !r.overtime_date) return false;
        const expiry = computeExpiryForOvertimeDate(r.overtime_date);
        if (!expiry || isNaN(expiry)) return false;
        return expiry.getTime() > now && expiry.getTime() <= soonThreshold;
      }).sort((a,b) => computeExpiryForOvertimeDate(a.overtime_date) - computeExpiryForOvertimeDate(b.overtime_date));
    }

    function updateCounts(){
      try {
        const upcoming = getUpcomingEntries();
        const ongoing = getOngoingEntries();
        const expiring = getExpiringEntries();
        if (upcomingCountEl) {
          const valEl = upcomingCountEl.querySelector('.count-value');
          if (valEl) valEl.textContent = String(upcoming.length);
        }
        if (ongoingCountEl) {
          const valEl = ongoingCountEl.querySelector('.count-value');
          if (valEl) valEl.textContent = String(ongoing.length);
        }
        if (expiringCountEl) {
          const valEl = expiringCountEl.querySelector('.count-value');
          if (valEl) valEl.textContent = String(expiring.length);
        }
        return { upcoming, ongoing, expiring };
      } catch (e) {
        console.warn('updateCounts failed', e);
        if (upcomingCountEl) upcomingCountEl.querySelector('.count-value').textContent = '0';
        if (ongoingCountEl) ongoingCountEl.querySelector('.count-value').textContent = '0';
        if (expiringCountEl) expiringCountEl.querySelector('.count-value').textContent = '0';
        return { upcoming: [], ongoing: [], expiring: [] };
      }
    }

    function createRowElement(row){
      const el = document.createElement('div');
      el.className = 'item';
      el.dataset.id = row.id;
      const dateDisplay = row.overtime_date ? formatDateOnlyYMD(row.overtime_date) : '—';
      const dateAttr = row.overtime_date ? (String(row.overtime_date).split('T')[0]) : '';
      el.innerHTML = `
        <div class="item-top">
          <div class="item-left">
            <div class="name" data-field="name">${escapeHtml(row.name)}</div>
            <div class="notes" data-field="notes">${escapeHtml(row.notes || '')}</div>
          </div>
          <div class="date-pill" data-field="overtime_date" aria-hidden="${row.overtime_date ? 'false' : 'true'}">
            <time datetime="${escapeHtml(dateAttr)}">${escapeHtml(dateDisplay)}</time>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;align-items:center;gap:8px">
          <div class="item-actions">
            <button class="btn ghost lock-guard" data-action="delete" type="button">Delete</button>
          </div>
        </div>
      `;

      try {
        if (row && row.overtime_date) {
          const now = Date.now();
          const startDateObj = parseDateOnlyToLocalMidnight(row.overtime_date);
          const start = isNaN(startDateObj) ? NaN : startDateObj.getTime();
          const expiry = computeExpiryForOvertimeDate(row.overtime_date).getTime();
          if (!isNaN(start) && !isNaN(expiry)) {
            const isFutureUpcoming = start > now && start <= (now + 24*60*60*1000);
            const isActiveToday = isSameLocalDate(startDateObj, new Date());
            const willExpireSoon = expiry > now && expiry <= (now + EXPIRING_WINDOW_MS);
            if (isFutureUpcoming) el.classList.add('upcoming');
            if (isActiveToday) el.classList.add('ongoing');
            if (willExpireSoon) el.classList.add('expiring');
          }
        }
      } catch (e) { /* ignore */ }

      return el;
    }

    function renderList(items){
      rowsEl.innerHTML = '';
      if (!items || !items.length) {
        emptyEl.style.display = 'block';
        statusEl.textContent = 'No entries';
        updateCounts();
        return;
      }
      emptyEl.style.display = 'none';
      items.forEach(r => rowsEl.appendChild(createRowElement(r)));
      statusEl.textContent = `Loaded ${items.length} entries`;
      updateCounts();
    }

    function renderEntriesAccordingToLock(){
      if (!Array.isArray(window.dataCache)) window.dataCache = [];
      if (unlocked) {
        const sorted = window.dataCache.slice().sort((a,b) => parseDateOnlyToLocalMidnight(a.overtime_date) - parseDateOnlyToLocalMidnight(b.overtime_date));
        rowsEl.innerHTML = '';
        sorted.forEach(r => rowsEl.appendChild(createRowElement(r)));
        if (sorted.length) {
          emptyEl.style.display = 'none';
          statusEl.textContent = `Loaded ${sorted.length} entries`;
        } else {
          emptyEl.style.display = 'block';
          statusEl.textContent = 'No entries';
        }
        updateCounts();
        return;
      }

      const { upcoming, ongoing } = updateCounts();
      const combined = [...ongoing, ...upcoming].filter((v, i, a) => a.findIndex(x => String(x.id) === String(v.id)) === i);
      rowsEl.innerHTML = '';
      if (!combined.length) {
        emptyEl.style.display = 'block';
        statusEl.textContent = 'No upcoming or ongoing entries';
        return;
      }
      emptyEl.style.display = 'none';
      combined.forEach(r => rowsEl.appendChild(createRowElement(r)));
      statusEl.textContent = `Showing ${combined.length} entries`;
    }

    async function autoDeleteExpired(){
      if (!Array.isArray(window.dataCache)) window.dataCache = [];
      const now = Date.now();
      const expired = window.dataCache.filter(r => {
        if (!r || !r.overtime_date) return false;
        const expiry = computeExpiryForOvertimeDate(r.overtime_date);
        if (!expiry || isNaN(expiry)) return false;
        return expiry.getTime() < now;
      });

      if (!expired.length) return;

      for (const r of expired) {
        try {
          const { error } = await supabase.from('overtime_data').delete().eq('id', r.id);
          if (error) {
            console.error('Delete failed for id', r.id, error);
            continue;
          }
          window.dataCache = window.dataCache.filter(x => String(x.id) !== String(r.id));
        } catch (err) {
          console.error('Delete error', err);
        }
      }

      renderEntriesAccordingToLock();
      updateCounts();
    }

    async function loadRows(){
      statusEl.textContent = 'Loading...';
      try {
        const { data, error } = await supabase.from('overtime_data').select('id,name,notes,overtime_date').order('overtime_date',{ascending:true});
        if (error) throw error;
        window.dataCache = (data || []).map(r => ({ ...r, overtime_date: normalizeStoredDate(r.overtime_date) }));
        renderEntriesAccordingToLock();
        updateCounts();
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error loading data';
      }
    }

    // -------------------------
    // Visitor registration + active user heartbeat (10s)
    // -------------------------
    const VISITOR_LOCAL_KEY = 'visitor_id';
    let heartbeatTimerLocal = null;
    const HEARTBEAT_INTERVAL_MS = 10 * 1000; // 10s
    const ACTIVE_WINDOW_MS = 2 * 1000; // 2s

    async function registerVisitorIfNeeded(){
      try {
        let vid = safeGetLocal(VISITOR_LOCAL_KEY);
        if (!vid) {
          try {
            vid = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : ('v-' + Date.now() + '-' + Math.random().toString(36).slice(2,9));
          } catch (e) {
            vid = 'v-' + Date.now() + '-' + Math.random().toString(36).slice(2,9);
          }
          safeSetLocal(VISITOR_LOCAL_KEY, vid);
          console.log('[visitor] generated id', vid);
        } else {
          console.log('[visitor] existing id', vid);
        }

        try {
          const { error } = await supabase
            .from('overtime_visitors')
            .upsert([{ visitor_id: vid, last_seen: new Date().toISOString() }], { onConflict: ['visitor_id'] });
          if (error) {
            console.warn('[visitor] upsert returned error', error);
            try {
              const { error: insErr } = await supabase
                .from('overtime_visitors')
                .insert([{ visitor_id: vid, last_seen: new Date().toISOString() }]);
              if (insErr) console.warn('[visitor] fallback insert error', insErr);
            } catch (ie) {
              console.warn('[visitor] fallback insert exception', ie);
            }
          } else {
            console.log('[visitor] upsert ok');
          }
        } catch (upErr) {
          console.warn('[visitor] upsert exception', upErr);
          try {
            const { error: insErr } = await supabase
              .from('overtime_visitors')
              .insert([{ visitor_id: vid, last_seen: new Date().toISOString() }]);
            if (insErr) console.warn('[visitor] fallback insert error', insErr);
          } catch (ie) {
            console.warn('[visitor] fallback insert exception', ie);
          }
        }
      } catch (e) {
        console.warn('[visitor] register failed', e);
      } finally {
        try { await updateUserCount(); } catch(e){ console.warn('[visitor] updateUserCount failed', e); }
      }
    }

    async function sendHeartbeatLocal() {
      const vid = safeGetLocal(VISITOR_LOCAL_KEY);
      if (!vid) return;
      try {
        const { error } = await supabase.from('overtime_visitors').upsert([{ visitor_id: vid, last_seen: new Date().toISOString() }], { onConflict: ['visitor_id'] });
        if (error) console.warn('heartbeat upsert error', error);
        else console.log('heartbeat ok', vid);
      } catch (e) {
        console.warn('heartbeat failed', e);
      }
    }

    function startHeartbeatLocal() {
      if (heartbeatTimerLocal) clearInterval(heartbeatTimerLocal);
      sendHeartbeatLocal();
      heartbeatTimerLocal = setInterval(async () => {
        await sendHeartbeatLocal();
        await updateUserCount();
      }, HEARTBEAT_INTERVAL_MS);
    }

    function stopHeartbeatLocal() {
      if (heartbeatTimerLocal) { clearInterval(heartbeatTimerLocal); heartbeatTimerLocal = null; }
    }

    // stop heartbeat when tab hidden to reduce false positives and writes
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopHeartbeatLocal();
      } else {
        startHeartbeatLocal();
      }
    });

    async function updateUserCount(){
      if (!userCountEl) return;
      try {
        // Prefer server-side RPC if available; fallback to client-side filter
        // Attempt RPC first (if you created count_active_visitors(window_seconds) on DB)
        try {
          const windowSeconds = Math.round(ACTIVE_WINDOW_MS / 1000);
          const { data: rpcData, error: rpcErr } = await supabase.rpc('count_active_visitors', { window_seconds: windowSeconds });
          if (!rpcErr && rpcData !== null && rpcData !== undefined) {
            // rpcData may be a number or array depending on Postgres/Supabase response shape
            const count = (typeof rpcData === 'number') ? rpcData : (Array.isArray(rpcData) ? Number(Object.values(rpcData[0] || {})[0] || 0) : Number(rpcData || 0));
            userCountEl.querySelector('.count-value').textContent = String(count);
            return;
          }
        } catch (e) {
          // ignore rpc failure and fallback
        }

        const { data, error } = await supabase.from('overtime_visitors').select('visitor_id,last_seen');
        if (error) {
          console.warn('[userCount] query error', error);
          userCountEl.querySelector('.count-value').textContent = '—';
          return;
        }
        const now = Date.now();
        const activeUsers = (data||[]).filter(r => {
          if (!r.last_seen) return false;
          const seen = new Date(r.last_seen).getTime();
          return (now - seen) <= ACTIVE_WINDOW_MS;
        }).length;
        userCountEl.querySelector('.count-value').textContent = String(activeUsers);
        console.log('[userCount] active', activeUsers);
      } catch (err) {
        console.warn('[userCount] failed', err);
        try { userCountEl.querySelector('.count-value').textContent = '—'; } catch(e){}
      }
    }

    // -------------------------
    // End visitor logic
    // -------------------------

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!unlocked) { alert('Actions are locked. Unlock to add entries.'); return; }
      const name = form.name.value.trim();
      const notes = form.notes.value.trim();
      const dateVal = dateInput?.value || '';
      const overtime_date = toIsoDateFromInput(dateVal);
      if (!name) { alert('Name is required'); return; }
      submitBtn.disabled = true; submitBtn.setAttribute('aria-busy','true');
      try {
        const { data, error } = await supabase.from('overtime_data').insert([{ name, notes, overtime_date }]).select();
        if (error) throw error;
        const inserted = (data || []).map(r => ({ ...r, overtime_date: normalizeStoredDate(r.overtime_date) }));
        window.dataCache = [...window.dataCache, ...inserted];
        renderEntriesAccordingToLock();
        updateCounts();
        form.reset();
        if (dateInput) dateInput.value = '';
      } catch (err) {
        console.error(err);
        alert('Insert failed: ' + (err.message || err));
      } finally {
        submitBtn.disabled = false; submitBtn.removeAttribute('aria-busy');
      }
    });

    resetBtn.addEventListener('click', () => { form.reset(); if (dateInput) dateInput.value = ''; });

    rowsEl.addEventListener('click', async (ev) => {
      const btn = ev.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      const item = btn.closest('.item');
      const id = item?.dataset?.id;
      if (!id) return;

      if (action === 'delete') {
        if (!unlocked) { alert('Actions are locked. Unlock to delete.'); return; }
        if (!confirm('Delete this entry? This cannot be undone.')) return;
        try {
          const { error } = await supabase.from('overtime_data').delete().eq('id', id);
          if (error) throw error;
          window.dataCache = window.dataCache.filter(r => String(r.id) !== String(id));
          renderEntriesAccordingToLock();
          updateCounts();
        } catch (err) {
          console.error(err);
          alert('Delete failed: ' + (err.message || err));
        }
        return;
      }
    });

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) {
        renderEntriesAccordingToLock();
        updateCounts();
        return;
      }
      const filtered = window.dataCache.filter(r =>
        (r.name||'').toLowerCase().includes(q) ||
        (r.notes||'').toLowerCase().includes(q) ||
        (r.overtime_date||'').includes(q)
      );
      if (!unlocked) {
        const now = Date.now();
        const in24h = now + (24 * 60 * 60 * 1000);
        const filteredCombined = filtered.filter(r => {
          if (!r.overtime_date) return false;
          const start = parseDateOnlyToLocalMidnight(r.overtime_date);
          const expiry = computeExpiryForOvertimeDate(r.overtime_date);
          if (isNaN(start) || isNaN(expiry)) return false;
          const startMs = start.getTime();
          const futureUpcoming = startMs > now && startMs <= in24h;
          const activeWithinGrace = startMs <= now && expiry.getTime() > now;
          return futureUpcoming || activeWithinGrace;
        });
        renderList(filteredCombined);
      } else {
        renderList(filtered);
      }
      updateCounts();
    });

    function updateGuardedControls(){
      document.querySelectorAll('.lock-guard').forEach(el => {
        const tag = (el.tagName || '').toUpperCase();
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') {
          if (!unlocked) el.setAttribute('disabled','true'); else el.removeAttribute('disabled');
        } else {
          if (!unlocked) {
            el.setAttribute('aria-disabled','true');
            el.classList.add('visually-guarded');
            if (el.hasAttribute('disabled')) el.removeAttribute('disabled');
          } else {
            el.removeAttribute('aria-disabled');
            el.classList.remove('visually-guarded');
          }
        }
      });

      lockIndicator.style.background = unlocked ? '#60a5fa' : '#ef4444';
      if (openUnlock) {
        openUnlock.setAttribute('aria-pressed', unlocked ? 'true' : 'false');
        openUnlock.title = unlocked ? 'Lock actions' : 'Unlock actions';
        openUnlock.setAttribute('aria-label', unlocked ? 'Lock actions' : 'Unlock actions');
        openUnlock.classList.toggle('active', unlocked);
      }

      if (!unlocked) appRoot.classList.add('actions-hidden'); else appRoot.classList.remove('actions-hidden');
      if (!unlocked) appRoot.classList.add('form-hidden'); else appRoot.classList.remove('form-hidden');

      renderEntriesAccordingToLock();
      updateCounts();
    }

    function setUnlockedState(state, persist = true){
      unlocked = !!state;
      updateGuardedControls();
      if (persist) safeSetLocal(LOCAL_KEY, unlocked ? 'true' : 'false');
    }

    function openModal(){
      modalBackdrop.style.display = 'flex';
      modalBackdrop.setAttribute('aria-hidden','false');

      try {
        if (appRoot) {
          appRoot.inert = true;
          appRoot.setAttribute('aria-hidden','true');
        }
      } catch (e) {
        if (appRoot) appRoot.setAttribute('aria-hidden','true');
      }

      pwError.style.display = 'none';
      setTimeout(() => { try { pwInput.focus(); } catch(e){} }, 10);
    }

    function closeModal(){
      modalBackdrop.style.display = 'none';
      modalBackdrop.setAttribute('aria-hidden','true');

      try {
        if (appRoot) {
          appRoot.inert = false;
          appRoot.removeAttribute('aria-hidden');
        }
      } catch (e) {
        if (appRoot) appRoot.removeAttribute('aria-hidden');
      }

      pwError.style.display = 'none';
      try { openUnlock.focus(); } catch (e) {}
    }

    async function submitPassword(password){
      try {
        pwError.style.display = 'block';
        pwError.textContent = 'Checking...';
        const res = await fetch('/api/unlock', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password }) });
        const raw = await res.text();
        let parsed;
        try { parsed = raw ? JSON.parse(raw) : null; } catch (e) { parsed = null; }
        if (!res.ok) {
          const msg = parsed?.error || parsed?.message || raw || `HTTP ${res.status}`;
          pwError.textContent = `Server: ${msg}`;
          return;
        }
        setUnlockedState(true, true);
        closeModal();
      } catch (err) {
        console.error(err);
        pwError.textContent = 'Network or server error.';
      }
    }

    if (dateBtn && dateInput) {
      dateBtn.addEventListener('click', () => {
        try { dateInput.showPicker && dateInput.showPicker(); } catch(e){}
        dateInput.focus();
      });
    }

    openUnlock.addEventListener('click', () => { if (!unlocked) openModal(); else { if (!confirm('Lock actions?')) return; setUnlockedState(false, true); } });
    pwSubmit.addEventListener('click', () => submitPassword(pwInput.value || '') );
    pwCancel.addEventListener('click', () => closeModal());
    pwInput.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); pwSubmit.click(); } });

    function formatToYMDHMSFromDateObj(d){
      if (!d || isNaN(d)) return '—';
      const pad = (n) => String(n).padStart(2,'0');
      const yyyy = d.getFullYear();
      const mm = pad(d.getMonth()+1);
      const dd = pad(d.getDate());
      const hh = pad(d.getHours());
      const min = pad(d.getMinutes());
      const ss = pad(d.getSeconds());
      return `${yyyy}${mm}${dd} ${hh}:${min}:${ss}`;
    }
    function updateLiveClock(){
      try {
        const now = new Date();
        liveClockEl.textContent = formatToYMDHMSFromDateObj(now);
      } catch (e) {
        liveClockEl.textContent = '—';
      }
    }

    const CHECK_INTERVAL_MS = 60 * 60 * 1000; // 1 hour
    setInterval(() => {
      try {
        renderEntriesAccordingToLock();
        updateCounts();
        autoDeleteExpired();
        updateUserCount();
      } catch (e) {
        console.error('Periodic check error', e);
      }
    }, CHECK_INTERVAL_MS);

    window.addEventListener('DOMContentLoaded', async () => {
      updateLiveClock();
      setInterval(updateLiveClock, 1000);

      try { localStorage.removeItem(LOCAL_KEY); } catch (e) {}
      setUnlockedState(false);

      try { await registerVisitorIfNeeded(); } catch (e) { console.warn('visitor register failed', e); }
      try { startHeartbeatLocal(); } catch (e) { console.warn('startHeartbeat failed', e); }

      // refresh active user count frequently during testing
      try { await updateUserCount(); } catch(e){}
      setInterval(updateUserCount, 10 * 1000); // refresh every 10s while testing

      await loadRows();
      try { await autoDeleteExpired(); } catch (e) { console.warn('Initial cleanup failed', e); }
    });

    window.__overtime_diag = function(){
      try {
        console.log('localStorage key raw:', (function(){ try { return localStorage.getItem(LOCAL_KEY); } catch(e){ return 'err'; } })());
        console.log('visitor_id:', (function(){ try { return localStorage.getItem('visitor_id'); } catch(e){ return 'err'; } })());
        console.log('unlocked variable:', unlocked);
        console.log('lockIndicator color:', getComputedStyle(document.getElementById('lockIndicator')||{}).backgroundColor);
        console.log('lock-guard disabled count:', Array.from(document.querySelectorAll('.lock-guard')).filter(el=>el.disabled).length);
        console.log('rows children:', document.getElementById('rows')?.children.length);
        console.log('upcoming elements:', getUpcomingEntries().length);
        console.log('ongoing elements:', getOngoingEntries().length);
        console.log('expiring elements:', getExpiringEntries().length);
        console.log('dataCache sample:', window.dataCache.slice(0,10));
      } catch(e){ console.warn('diag error', e); }
    };
  </script>
</body>
</html>
