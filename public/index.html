<!doctype html>
<html lang="tl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Overtime Scheduler — Final Updated</title>
  <meta name="description" content="Overtime Scheduler — themes, lock refresh, stable edit date input, compact Add form." />
  <style>
    :root{
      /* default theme variables (will be overwritten by JS applyTheme) */
      --accent: #10b981;
      --accent-2: #059669;
      --bg-top: #04251f;
      --bg-bottom: #0b3b36;
      --card-top: rgba(8,40,34,0.08);
      --card-bottom: rgba(6,30,26,0.04);
      --date-pill-start: rgba(16,185,129,0.12);
      --date-pill-end: rgba(5,150,105,0.06);
      --text: #e6f7f2;
      --muted: #9fcfc3;
      --danger: #ef4444;
      --input-h: 40px;
      --radius: 10px;
      --mobile-width: 360px;
      --base-font: 15px;
      --theme-transition: 220ms ease;
    }

    html,body{
      height:100%;
      margin:0;
      padding:0;
      background: linear-gradient(180deg,var(--bg-top),var(--bg-bottom));
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
      -webkit-font-smoothing:antialiased;
      font-size:var(--base-font);
    }

    *,*::before,*::after{box-sizing:border-box}
    input,button,select,textarea{font-family:inherit}
    button{cursor:pointer}

    .canvas{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px;background:transparent}

    .app{
      width:var(--mobile-width);max-width:100%;
      display:flex;flex-direction:column;gap:12px;align-items:stretch;
      border-radius:14px;padding:12px;box-shadow:0 14px 36px rgba(2,10,8,0.45);
      border:1px solid rgba(255,255,255,0.04);
      transition:background var(--theme-transition), color var(--theme-transition);
      background: linear-gradient(180deg,var(--card-top),var(--card-bottom));
    }

    .card{background:transparent;border-radius:var(--radius);padding:12px}
    .header.card{display:flex;flex-direction:column;gap:8px}
    .brand{display:flex;flex-direction:column;align-items:center}
    .brand h1{margin:0;font-size:1rem}
    .brand p{margin:0;color:var(--muted);font-size:.85rem}

    .controls{display:flex;gap:8px;align-items:center}
    .search{flex:1;border-radius:8px;padding:8px 10px;height:var(--input-h);border:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.12);color:var(--text)}

    .theme-row{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:6px}
    .theme-swatch{width:36px;height:36px;border-radius:999px;border:2px solid rgba(255,255,255,0.06);display:inline-flex;align-items:center;justify-content:center;padding:0;background:transparent;transition:transform 160ms ease,box-shadow 220ms ease}
    .theme-swatch .dot{width:24px;height:24px;border-radius:999px;box-shadow:0 4px 10px rgba(0,0,0,0.25)}
    .theme-swatch.active{border-color:transparent;transform:scale(1.06);box-shadow:0 8px 26px rgba(0,0,0,0.32)}

    .swatch-ocean .dot{background:linear-gradient(180deg,#4f46e5,#3b82f6)}
    .swatch-warm .dot{background:linear-gradient(180deg,#ff7a59,#ff5a36)}
    .swatch-forest .dot{background:linear-gradient(180deg,#10b981,#059669)}
    .swatch-violet .dot{background:linear-gradient(180deg,#d946ef,#a78bfa)}

    .meta{font-size:.82rem;color:var(--muted);text-align:center}

    .list{display:flex;flex-direction:column;gap:8px}
    .item{display:flex;flex-direction:column;gap:8px;padding:10px;border-radius:10px;background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03)}
    .item-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .item-left{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}

    .name{font-weight:600;font-size:.96rem;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .notes{color:var(--muted);font-size:.82rem;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .date-pill{
      display:inline-flex;align-items:center;justify-content:center;
      min-width:72px; max-width:140px; padding:6px 12px;border-radius:10px;
      background: linear-gradient(180deg,var(--date-pill-start),var(--date-pill-end));
      border:1px solid rgba(255,255,255,0.04);
      color:var(--text); box-sizing:border-box;
      font-size:0.88rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0;
    }
    .date-pill time{display:block;width:100%;text-align:center}

    .item-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
    .btn{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#fff;border:0;padding:8px 10px;border-radius:10px;font-weight:600;font-size:.95rem;transition:background var(--theme-transition), color var(--theme-transition)}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted)}
    .btn.danger{background:transparent;border:1px solid rgba(255,0,0,0.08);color:var(--danger)}

    .lock-group{display:flex;align-items:center;gap:8px}
    .icon-btn{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--muted);padding:0;cursor:pointer;transition: background 180ms ease, color 180ms ease, transform 120ms ease, box-shadow 220ms ease;}
    .icon-btn:focus{outline:2px solid rgba(255,255,255,0.06);outline-offset:2px}
    .icon-btn:hover{transform:translateY(-1px)}
    .icon-btn.active{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(0,0,0,0.25)}
    .refresh-btn{width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}

    /* compact add form */
    #formCard{display:flex;flex-direction:column;gap:8px}
    #formCard label{font-size:0.92rem;color:var(--muted);margin:0 0 6px 0;text-align:left}
    .add-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start}
    .field{display:flex;flex-direction:column;gap:6px;min-width:0}
    input[type="text"], textarea, .date-text { width:100%;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:rgba(0,0,0,0.12);color:var(--text);height:36px;box-sizing:border-box;font-size:0.95rem;text-align:left; }
    .date-control{position:relative;display:block;min-width:0}
    .date-text{padding-right:44px;cursor:pointer;height:36px}
    .date-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;z-index:2;font-size:1rem;padding:0}
    .native-date{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:34px;height:34px;opacity:0;border:0;padding:0;margin:0;background:transparent;z-index:3;cursor:pointer}
    .form-actions{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:4px;flex-shrink:0}
    .btn-add{padding:6px 10px;height:34px;border-radius:999px;font-size:0.92rem;display:inline-flex;align-items:center;gap:8px;box-shadow:0 6px 14px rgba(2,10,8,0.12)}
    .btn-reset{padding:6px 10px;height:34px;border-radius:999px;font-size:0.92rem;display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}

    /* edit date input fix */
    .item.editing .edit-input[type="date"]{width:100%;min-width:0;max-width:100%;height:36px;padding:6px 10px;border-radius:8px;background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));border:1px solid rgba(255,255,255,0.06);color:var(--text);box-sizing:border-box}

    .actions-hidden .item-actions { display: none !important; }
    .form-hidden #formCard { display: none !important; }

    @media (max-width:420px){
      .add-row{grid-template-columns:1fr}
      .form-actions{flex-direction:row;gap:8px}
      .form-actions .btn-add, .form-actions .btn-reset { flex:1; justify-content:center; }
      input[type="text"], .date-text { height:40px; }
      .date-text{padding-right:48px}
      .date-pill{min-width:64px; max-width:96px; font-size:0.85rem}
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div id="appRoot" class="app" role="application" aria-label="Overtime Scheduler" data-theme="forest">
      <header class="card header" aria-labelledby="appTitle">
        <div class="brand">
          <h1 id="appTitle">Overtime Scheduler</h1>
          <p class="meta">Locked by default — unlock to add or edit</p>
        </div>

        <div class="controls" role="search" style="margin-top:6px;display:flex;gap:8px;align-items:center">
          <input id="search" class="search" placeholder="Search name or notes" aria-label="Search entries" />
          <div class="lock-group" style="margin-left:6px">
            <div id="lockIndicator" aria-hidden="true" style="width:10px;height:10px;border-radius:50%;background:#ef4444;transition:background var(--theme-transition)"></div>

            <button id="openUnlock" class="icon-btn" aria-pressed="false" aria-label="Unlock actions" title="Unlock actions" type="button">
              <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
                <path class="icon-fill" d="M12 17a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" />
                <path class="icon-fill" d="M17 8h-1V6a4 4 0 10-8 0v2H7a2 2 0 00-2 2v7a2 2 0 002 2h10a2 2 0 002-2v-7a2 2 0 00-2-2zM9 8V6a3 3 0 116 0v2" />
              </svg>
            </button>

            <button id="refreshLock" class="refresh-btn" title="Refresh lock state" aria-label="Refresh lock state" type="button">
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <path d="M21 12.79A9 9 0 1 1 11.21 3" stroke="none"></path>
                <path d="M21 3v6h-6" stroke="none"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="theme-row" role="toolbar" aria-label="Theme switcher">
          <button class="theme-swatch swatch-ocean" data-theme="ocean" aria-label="Ocean Indigo" title="Ocean Indigo" type="button"><span class="dot" aria-hidden="true"></span></button>
          <button class="theme-swatch swatch-warm" data-theme="warm" aria-label="Warm Sunset" title="Warm Sunset" type="button"><span class="dot" aria-hidden="true"></span></button>
          <button class="theme-swatch swatch-forest active" data-theme="forest" aria-label="Forest Teal" title="Forest Teal" type="button"><span class="dot" aria-hidden="true"></span></button>
          <button class="theme-swatch swatch-violet" data-theme="violet" aria-label="Violet Glow" title="Violet Glow" type="button"><span class="dot" aria-hidden="true"></span></button>
        </div>
      </header>

      <main class="card" aria-live="polite">
        <div style="display:flex;flex-direction:column;gap:10px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <strong>Entries</strong>
            <span id="status" class="meta">Idle</span>
          </div>

          <div id="rows" class="list" aria-live="polite"></div>
          <div id="empty" class="empty" style="display:none;color:var(--muted);padding:6px;border-radius:8px;background:rgba(255,255,255,0.01);text-align:center">Walang entries. I-unlock at magdagdag ng bagong overtime.</div>
        </div>
      </main>

      <aside id="formCard" class="card" aria-labelledby="addOvertimeTitle">
        <strong id="addOvertimeTitle" style="display:block;text-align:left;font-size:1rem">Add Overtime</strong>

        <form id="addForm" autocomplete="off" novalidate>
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" class="lock-guard" type="text" placeholder="Employee name" required />
          </div>

          <div class="add-row">
            <div class="field">
              <label for="overtime_date_text">Date</label>
              <div class="date-control">
                <input id="overtime_date_text" name="overtime_date_text" class="date-text lock-guard" type="text" placeholder="YYYY-MM-DD" aria-label="Overtime date" readonly />
                <button type="button" id="datePickerBtn" class="date-btn lock-guard" aria-label="Open date picker">📅</button>
                <input id="overtime_date_native" class="native-date" type="date" aria-hidden="true" />
              </div>
            </div>

            <div class="field">
              <label for="notes">Short note</label>
              <input id="notes" name="notes" class="lock-guard" type="text" placeholder="Short note" />
            </div>
          </div>

          <div class="form-actions" role="group" aria-label="Form actions">
            <button id="submitBtn" class="btn btn-add lock-guard" type="submit" title="Add entry" aria-label="Add entry">
              <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M11 11V6h2v5h5v2h-5v5h-2v-5H6v-2z"/></svg>
              <span>Add</span>
            </button>

            <button id="resetBtn" type="button" class="btn-reset lock-guard" title="Reset form" aria-label="Reset form">
              <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M12 6V3L8 7l4 4V8c2.8 0 5 2.2 5 5 0 .6-.1 1.2-.3 1.7l1.5 1.1C18.9 15 19 14.5 19 14c0-3.9-3.1-7-7-7zM6.3 6.3L4.8 5.2C5.1 4.8 5.9 4 7 4c3.9 0 7 3.1 7 7v1l4-4-4-4v3c-2.8 0-5 2.2-5 5 0 .6.1 1.2.3 1.7L6.3 6.3z"/></svg>
              <span>Reset</span>
            </button>
          </div>
        </form>
      </aside>

      <footer style="text-align:center;color:var(--muted);font-size:.8rem;padding:6px 0">
        <div style="font-weight:700">BoxTechHub™</div>
        <div style="font-size:.75rem;margin-top:4px">© 2026 BoxTechHub</div>
      </footer>
    </div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true" style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:linear-gradient(180deg, rgba(2,6,6,0.6), rgba(2,6,6,0.7));z-index:99999">
    <div class="modal" role="document" aria-labelledby="modalTitle" style="padding:12px;border-radius:10px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03);">
      <h3 id="modalTitle" style="margin:0 0 8px 0">Unlock Actions</h3>
      <p style="margin:0 0 8px;color:var(--muted);font-size:.9rem">Enter password to enable Add / Edit / Delete</p>
      <input id="pwInput" type="password" placeholder="Password" style="width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);margin-bottom:8px;height:40px" />
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button id="pwCancel" class="btn ghost">Cancel</button>
        <button id="pwSubmit" class="btn">Submit</button>
      </div>
      <div id="pwError" style="color:var(--danger);margin-top:8px;display:none"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const SUPABASE_URL = 'https://bisvmgjgyvludhqsvvcn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpc3ZtZ2pneXZsdWRocXN2dmNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTI1ODMsImV4cCI6MjA4NzI2ODU4M30.eodsmChKwoEiPlNz9d2Ge3lAmO3BWfdKRWVRdgk9Xl8';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const appRoot = document.getElementById('appRoot');
    const rowsEl = document.getElementById('rows');
    const statusEl = document.getElementById('status');
    const emptyEl = document.getElementById('empty');
    const form = document.getElementById('addForm');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const searchInput = document.getElementById('search');

    const openUnlock = document.getElementById('openUnlock');
    const refreshLock = document.getElementById('refreshLock');
    const lockIndicator = document.getElementById('lockIndicator');

    const modalBackdrop = document.getElementById('modalBackdrop');
    const pwInput = document.getElementById('pwInput');
    const pwSubmit = document.getElementById('pwSubmit');
    const pwCancel = document.getElementById('pwCancel');
    const pwError = document.getElementById('pwError');

    const dateText = document.getElementById('overtime_date_text');
    const dateNative = document.getElementById('overtime_date_native');
    const dateBtn = document.getElementById('datePickerBtn');

    const swatches = Array.from(document.querySelectorAll('.theme-swatch'));
    const THEME_KEY = 'overtime_theme_v1';
    const LOCAL_KEY = 'overtime_unlocked_v2';

    let dataCache = [];
    let unlocked = false;

    function safeGetLocal(key){ try { return localStorage.getItem(key); } catch (e) { return null; } }
    function safeSetLocal(key, value){ try { localStorage.setItem(key, value); return true; } catch (e) { return false; } }
    function formatDate(d){ if(!d) return '—'; return new Date(d + 'T00:00:00').toLocaleDateString(); }
    function isoDateFromText(s){ if(!s) return null; const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/); return m ? `${m[1]}-${m[2]}-${m[3]}` : null; }
    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    // Theme map for direct CSS variable updates
    const THEME_MAP = {
      forest: {
        '--accent':'#10b981','--accent-2':'#059669',
        '--bg-top':'#04251f','--bg-bottom':'#0b3b36',
        '--card-top':'rgba(8,40,34,0.08)','--card-bottom':'rgba(6,30,26,0.04)',
        '--date-pill-start':'rgba(16,185,129,0.12)','--date-pill-end':'rgba(5,150,105,0.06)',
        '--text':'#e6f7f2','--muted':'#9fcfc3'
      },
      ocean: {
        '--accent':'#4f46e5','--accent-2':'#3b82f6',
        '--bg-top':'#071428','--bg-bottom':'#0b1f2b',
        '--card-top':'rgba(10,20,40,0.08)','--card-bottom':'rgba(8,18,34,0.04)',
        '--date-pill-start':'rgba(79,70,229,0.12)','--date-pill-end':'rgba(59,130,246,0.06)',
        '--text':'#e6eef8','--muted':'#9fb0c6'
      },
      warm: {
        '--accent':'#ff7a59','--accent-2':'#ff5a36',
        '--bg-top':'#2b0b3a','--bg-bottom':'#3b0f2f',
        '--card-top':'rgba(60,20,50,0.08)','--card-bottom':'rgba(50,18,45,0.04)',
        '--date-pill-start':'rgba(255,122,89,0.12)','--date-pill-end':'rgba(255,90,54,0.06)',
        '--text':'#f0eef6','--muted':'#c9bfc9'
      },
      violet: {
        '--accent':'#d946ef','--accent-2':'#a78bfa',
        '--bg-top':'#0b0b12','--bg-bottom':'#2b1536',
        '--card-top':'rgba(40,18,40,0.08)','--card-bottom':'rgba(36,14,36,0.04)',
        '--date-pill-start':'rgba(217,70,239,0.12)','--date-pill-end':'rgba(167,139,250,0.06)',
        '--text':'#f3eefb','--muted':'#d6c7e9'
      }
    };

    // Apply theme by setting CSS variables on :root and toggling swatch active state
    function applyTheme(theme){
      if (!theme || !THEME_MAP[theme]) theme = 'forest';
      const vars = THEME_MAP[theme];
      const root = document.documentElement;
      Object.keys(vars).forEach(k => root.style.setProperty(k, vars[k]));
      if (appRoot) appRoot.setAttribute('data-theme', theme);
      swatches.forEach(btn => btn.classList.toggle('active', btn.dataset.theme === theme));
      safeSetLocal(THEME_KEY, theme);
    }

    // Initialize theme from storage
    (function initTheme(){
      const saved = safeGetLocal(THEME_KEY) || 'forest';
      applyTheme(saved);
    })();

    swatches.forEach(btn => {
      btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
      btn.addEventListener('keydown', (ev) => { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); btn.click(); } });
    });

    // Lock state helpers
    function updateGuardedControls(){
      document.querySelectorAll('.lock-guard').forEach(el => unlocked ? el.removeAttribute('disabled') : el.setAttribute('disabled','true'));
      lockIndicator.style.background = unlocked ? '#60a5fa' : '#ef4444';
      if (openUnlock) {
        openUnlock.setAttribute('aria-pressed', unlocked ? 'true' : 'false');
        openUnlock.title = unlocked ? 'Lock actions' : 'Unlock actions';
        openUnlock.setAttribute('aria-label', unlocked ? 'Lock actions' : 'Unlock actions');
        openUnlock.classList.toggle('active', unlocked);
      }
      if (!unlocked) appRoot.classList.add('actions-hidden'); else appRoot.classList.remove('actions-hidden');
      if (!unlocked) appRoot.classList.add('form-hidden'); else appRoot.classList.remove('form-hidden');
    }
    function setUnlockedState(state, persist = true){
      unlocked = !!state;
      updateGuardedControls();
      if (persist) safeSetLocal(LOCAL_KEY, unlocked ? 'true' : 'false');
    }
    function refreshLockState(){
      try {
        const stored = safeGetLocal(LOCAL_KEY);
        const shouldBeUnlocked = stored === 'true';
        setUnlockedState(shouldBeUnlocked, false);
        if (refreshLock) {
          refreshLock.animate([{ transform: 'rotate(0deg)' }, { transform: 'rotate(360deg)' }], { duration: 420, easing: 'ease-out' });
        }
      } catch (e) { console.warn('refreshLockState failed', e); }
    }

    // Date picker overlay
    (function attachNativeOverlay() {
      try {
        if (!dateText || !dateNative || !dateBtn) return;
        dateNative.addEventListener('change', () => dateText.value = dateNative.value || '');
        function openNativePicker(initialIso) {
          if (initialIso && /^\d{4}-\d{2}-\d{2}$/.test(initialIso)) dateNative.value = initialIso;
          else dateNative.value = '';
          if (typeof dateNative.showPicker === 'function') dateNative.showPicker();
          else { dateNative.focus(); try { dateNative.click(); } catch(e){} }
        }
        dateBtn.addEventListener('click', () => openNativePicker(isoDateFromText(dateText.value)));
        dateText.addEventListener('click', () => openNativePicker(isoDateFromText(dateText.value)));
      } catch (e) { console.warn('Date overlay attach failed', e); }
    })();

    // Render helpers
    function createRowElement(row){
      const el = document.createElement('div');
      el.className = 'item';
      el.dataset.id = row.id;
      const dateDisplay = row.overtime_date ? formatDate(row.overtime_date) : '—';
      const dateAttr = row.overtime_date ? row.overtime_date : '';
      el.innerHTML = `
        <div class="item-top">
          <div class="item-left">
            <div class="name" data-field="name">${escapeHtml(row.name)}</div>
            <div class="notes" data-field="notes">${escapeHtml(row.notes || '')}</div>
          </div>
          <div class="date-pill" data-field="overtime_date" aria-hidden="${row.overtime_date ? 'false' : 'true'}">
            <time datetime="${escapeHtml(dateAttr)}">${escapeHtml(dateDisplay)}</time>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;align-items:center;gap:8px">
          <div class="item-actions">
            <button class="btn ghost lock-guard" data-action="edit">Edit</button>
            <button class="btn ghost lock-guard" data-action="delete">Delete</button>
          </div>
        </div>
      `;
      return el;
    }
    function renderList(items){
      rowsEl.innerHTML = '';
      if (!items || !items.length) { emptyEl.style.display = 'block'; statusEl.textContent = 'No entries'; return; }
      emptyEl.style.display = 'none';
      items.forEach(r => rowsEl.appendChild(createRowElement(r)));
      updateGuardedControls();
      statusEl.textContent = `Loaded ${items.length} entries`;
    }

    // Data load
    async function loadRows(){
      statusEl.textContent = 'Loading...';
      try {
        const { data, error } = await supabase.from('overtime_data').select('id,name,notes,overtime_date').order('overtime_date',{ascending:true});
        if (error) throw error;
        dataCache = (data || []);
        renderList(dataCache);
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error loading data';
      }
    }

    // Form submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!unlocked) { alert('Actions are locked. Unlock to add entries.'); return; }
      const name = form.name.value.trim();
      const notes = form.notes.value.trim();
      const overtime_date = isoDateFromText(dateText.value) || null;
      if (!name) { alert('Name is required'); return; }
      submitBtn.disabled = true; submitBtn.setAttribute('aria-busy','true');
      try {
        const { data, error } = await supabase.from('overtime_data').insert([{ name, notes, overtime_date }]).select();
        if (error) throw error;
        dataCache = [...dataCache, ...(data||[])];
        renderList(dataCache);
        form.reset();
        dateText.value = '';
      } catch (err) {
        console.error(err);
        alert('Insert failed: ' + (err.message || err));
      } finally {
        submitBtn.disabled = false; submitBtn.removeAttribute('aria-busy');
      }
    });

    resetBtn.addEventListener('click', () => { form.reset(); dateText.value = ''; });

    // Row actions
    rowsEl.addEventListener('click', async (ev) => {
      const action = ev.target?.dataset?.action;
      if (!action) return;
      const item = ev.target.closest('.item');
      const id = item?.dataset?.id;
      if (!id) return;

      if (action === 'delete') {
        if (!unlocked) { alert('Actions are locked. Unlock to delete.'); return; }
        if (!confirm('Delete this entry? This cannot be undone.')) return;
        try {
          const { error } = await supabase.from('overtime_data').delete().eq('id', id);
          if (error) throw error;
          dataCache = dataCache.filter(r => String(r.id) !== String(id));
          renderList(dataCache);
        } catch (err) {
          console.error(err);
          alert('Delete failed: ' + (err.message || err));
        }
        return;
      }

      if (action === 'edit') {
        if (!unlocked) { alert('Actions are locked. Unlock to edit.'); return; }
        const row = dataCache.find(r => String(r.id) === String(id));
        if (!row) return;
        item.classList.add('editing');
        item.innerHTML = `
          <div style="display:flex;flex-direction:column;gap:8px">
            <input class="edit-input" data-edit="name" type="text" value="${escapeHtml(row.name)}" />
            <div style="display:flex;gap:8px;align-items:center">
              <input class="edit-input" data-edit="overtime_date" type="date" value="${row.overtime_date || ''}" style="flex:1;max-width:100%;box-sizing:border-box" />
            </div>
            <input class="edit-input" data-edit="notes" type="text" value="${escapeHtml(row.notes || '')}" />
            <div class="edit-actions" style="display:flex;gap:8px;justify-content:flex-end">
              <button class="btn ghost" data-action="save">Save</button>
              <button class="btn ghost" data-action="cancel">Cancel</button>
            </div>
          </div>
        `;
        updateGuardedControls();
        return;
      }

      if (action === 'save') {
        if (!unlocked) { alert('Actions are locked. Unlock to save.'); return; }
        const inputs = item.querySelectorAll('.edit-input');
        const name = inputs[0]?.value.trim();
        const overtime_date = inputs[1]?.value || null;
        const notes = inputs[2]?.value.trim();
        if (!name) { alert('Name required'); return; }
        try {
          const { data, error } = await supabase.from('overtime_data').update({ name, notes, overtime_date }).eq('id', id).select();
          if (error) throw error;
          dataCache = dataCache.map(r => String(r.id) === String(id) ? (data && data[0]) || { ...r, name, notes, overtime_date } : r);
          renderList(dataCache);
        } catch (err) {
          console.error(err);
          alert('Update failed: ' + (err.message || err));
        }
        return;
      }

      if (action === 'cancel') {
        renderList(dataCache);
        return;
      }
    });

    // Search filter
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) return renderList(dataCache);
      const filtered = dataCache.filter(r =>
        (r.name||'').toLowerCase().includes(q) ||
        (r.notes||'').toLowerCase().includes(q) ||
        (r.overtime_date||'').includes(q)
      );
      renderList(filtered);
    });

    // openUnlock behavior
    openUnlock.addEventListener('click', () => {
      if (!unlocked) openModal();
      else {
        if (!confirm('Lock actions?')) return;
        setUnlockedState(false, true);
      }
    });

    // refreshLock explicit action
    if (refreshLock) refreshLock.addEventListener('click', refreshLockState);

    function openModal(){ modalBackdrop.style.display = 'flex'; modalBackdrop.setAttribute('aria-hidden','false'); pwInput.value=''; pwError.style.display='none'; pwInput.focus(); }
    function closeModal(){ modalBackdrop.style.display = 'none'; modalBackdrop.setAttribute('aria-hidden','true'); pwError.style.display='none'; }

    async function submitPassword(password){
      try {
        pwError.style.display = 'block';
        pwError.textContent = 'Checking...';
        const res = await fetch('/api/unlock', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password }) });
        const raw = await res.text();
        let parsed;
        try { parsed = raw ? JSON.parse(raw) : null; } catch (e) { parsed = null; }
        if (!res.ok) {
          const msg = parsed?.error || parsed?.message || raw || `HTTP ${res.status}`;
          pwError.textContent = `Server: ${msg}`;
          return;
        }
        setUnlockedState(true, true);
        closeModal();
      } catch (err) {
        console.error(err);
        pwError.textContent = 'Network or server error.';
      }
    }

    pwSubmit.addEventListener('click', () => submitPassword(pwInput.value || '') );
    pwCancel.addEventListener('click', () => closeModal());
    pwInput.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); pwSubmit.click(); } });

    // Initialize: restore lock state and load rows
    window.addEventListener('DOMContentLoaded', async () => {
      const stored = safeGetLocal(LOCAL_KEY);
      const shouldBeUnlocked = stored === 'true';
      setUnlockedState(shouldBeUnlocked, false);
      await loadRows();
    });
  </script>
</body>
</html>
