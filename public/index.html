<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Overtime Scheduler — Edit & Delete (Aligned Inputs)</title>
  <meta name="description" content="Supabase single-file UI with edit, save, cancel, delete per row — inputs aligned" />
  <style>
    /* Core variables */
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --text:#e6eef8;
      --text-muted:#9fb0c6;
      --accent:#60a5fa;
      --accent-2:#7ee7c7;
      --danger:#ef4444;
      --radius:12px;
      --glass: rgba(255,255,255,0.03);
      --shadow: 0 8px 30px rgba(2,6,23,0.6);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Segoe UI Mono", monospace;
      --input-height:44px; /* unified input height for alignment */
    }
    [data-theme="light"]{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --text-muted:#6b7280;
      --accent:#2563eb;
      --accent-2:#06b6d4;
      --glass: rgba(255,255,255,0.6);
      --shadow: 0 6px 18px rgba(15,23,42,0.08);
    }

    /* Reset + layout */
    *, *::before, *::after { box-sizing: border-box; }
    html,body{height:100%}
    body{
      margin:0;
      min-height:100%;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: var(--bg);
      padding:18px;
      color: var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      -webkit-tap-highlight-color: transparent;
    }

    .container{
      max-width:980px;
      margin:0 auto;
      display:grid;
      grid-template-columns: 1fr 380px;
      gap:20px;
      align-items:start;
    }

    header{
      grid-column:1 / -1;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:6px;
    }
    h1{font-size:20px;margin:0}
    p.lead{margin:0;color:var(--text-muted);font-size:13px}

    /* Card */
    .card{
      background: var(--card);
      border-radius:12px;
      padding:16px;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,0.04);
      color:var(--text);
    }

    /* Form and inputs */
    form{display:flex;flex-direction:column;gap:10px}
    label{font-size:13px;color:var(--text-muted);display:block}
    input[type="text"], input[type="date"], textarea{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.04);
      background:transparent;
      outline:none;
      font-size:14px;
      color:var(--text);
      transition:box-shadow .12s, border-color .12s;
      min-width:0;
      height: var(--input-height); /* unified height */
      line-height: 1.1;
    }
    textarea{min-height:84px;resize:vertical;padding-top:10px;padding-bottom:10px;height:auto}

    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.28); }

    input:focus, textarea:focus{
      box-shadow:0 6px 18px rgba(96,165,250,0.08);
      border-color:var(--accent);
    }

    .row{
      display:flex;
      gap:8px;
      align-items:flex-start;
    }
    .row > *{ flex:1 1 0; min-width:0; }

    .actions{display:flex;gap:8px;align-items:center}
    button{
      background:linear-gradient(180deg,var(--accent), #1e40af);
      color:white;
      border:0;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      transition:transform .08s ease, box-shadow .08s;
    }
    button.secondary{
      background:transparent;
      color:var(--text-muted);
      border:1px solid rgba(255,255,255,0.04);
      font-weight:600;
    }
    .btn-ghost{
      background:transparent;color:var(--text-muted);border:0;padding:6px 8px;border-radius:8px;cursor:pointer;
    }
    .btn-danger{ background:transparent;color:var(--danger);border:1px solid rgba(255,0,0,0.08);padding:8px 10px;border-radius:8px; }

    /* List column */
    .list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .item{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px;
      border-radius:10px;
      background:var(--glass);
      border:1px solid rgba(255,255,255,0.04);
      align-items:center;
      transition:transform .12s ease, box-shadow .12s;
      color:var(--text);
      min-height:56px;
    }
    .item:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
    .meta{color:var(--text-muted);font-size:13px}
    .name{font-weight:700;color:var(--text)}
    .date{font-family:var(--mono);font-size:13px;color:var(--accent-2); align-self:center; }

    /* More menu / actions */
    .actions-inline{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .edit-input{ width:100%; padding:8px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.06); background:transparent; color:var(--text); height: var(--input-height); box-sizing: border-box; }

    /* Edit layout helpers */
    .edit-row { display:flex; gap:10px; align-items:flex-start; width:100%; }
    .edit-left { flex:1 1 0; min-width:0; display:flex; flex-direction:column; gap:6px; }
    .edit-right { width:160px; display:flex; flex-direction:column; gap:6px; align-items:flex-end; min-width:0; }

    /* ensure date input fits on desktop but becomes full width on mobile */
    .edit-right .edit-input[type="date"] { width:140px; height: var(--input-height); }

    /* top controls */
    .controls{display:flex;gap:8px;align-items:center}
    .search{
      padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--text);
    }

    /* tips area */
    .tips {
      margin-top:12px;
      padding:10px;
      border-radius:10px;
      background:rgba(255,255,255,0.02);
      color:var(--text-muted);
      font-size:13px;
      line-height:1.35;
    }

    /* status */
    #status{font-size:13px;color:var(--text-muted)}

    /* Responsive adjustments */
    @media (max-width:760px){
      body{padding:12px}
      .container{grid-template-columns:1fr; gap:12px}
      header{flex-direction:column;align-items:flex-start;gap:10px}
      .controls{width:100%;display:flex;gap:8px}
      .search{flex:1}
      .card{padding:12px}
      .item{padding:10px}
      .date{font-size:12px}
      .tips{font-size:12px;padding:10px}
      .row{flex-direction:column}
      .actions{flex-direction:row;flex-wrap:wrap}
      .actions button{flex:1 1 auto; min-width:0}

      /* stack edit layout vertically on small screens so notes won't overlap actions */
      .edit-row { flex-direction:column; gap:8px; }
      .edit-right { width:100%; align-items:flex-start; }
      .edit-right .edit-input[type="date"] { width:100%; }
      .actions-inline { justify-content:flex-start; gap:8px; }
      .edit-left .edit-input { width:100%; }
    }

    /* Small visual tweak: make display-date vertically centered with inputs */
    .display-right { display:flex; flex-direction:column; align-items:flex-end; justify-content:center; gap:6px; min-width:120px; }
    .display-right .date { margin:0; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <header>
      <div>
        <h1>Overtime Scheduler</h1>
        <p class="lead">View, edit, and delete overtime entries — inputs aligned</p>
      </div>
      <div class="controls">
        <input id="search" class="search" placeholder="Search name or notes" />
        <button id="themeToggle" class="secondary" title="Toggle theme">Toggle</button>
      </div>
    </header>

    <!-- Left: list -->
    <section class="card list" aria-live="polite">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <strong>Entries</strong>
        <span id="status">Idle</span>
      </div>

      <div id="rows" style="display:flex;flex-direction:column;gap:12px;margin-top:8px"></div>
      <div id="empty" class="meta" style="display:none">No entries yet.</div>

      <div class="tips" id="tips">
        Tips: Use the More menu to Edit or Delete rows. Edits are saved to Supabase.
      </div>
    </section>

    <!-- Right: form -->
    <aside class="card">
      <strong style="display:block;margin-bottom:8px">Add Overtime</strong>
      <form id="addForm" autocomplete="off">
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Employee name" required />
        </div>

        <div class="row">
          <div>
            <label for="overtime_date">Date</label>
            <input id="overtime_date" name="overtime_date" type="date" />
          </div>
          <div>
            <label for="notes">Notes</label>
            <input id="notes" name="notes" type="text" placeholder="Short note" />
          </div>
        </div>

        <div class="actions" style="margin-top:6px">
          <button id="submitBtn" type="submit">Add</button>
          <button type="button" class="secondary" id="resetBtn">Reset</button>
        </div>
      </form>
    </aside>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // TODO: replace with your Supabase values
    const SUPABASE_URL = 'https://bisvmgjgyvludhqsvvcn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpc3ZtZ2pneXZsdWRocXN2dmNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTI1ODMsImV4cCI6MjA4NzI2ODU4M30.eodsmChKwoEiPlNz9d2Ge3lAmO3BWfdKRWVRdgk9Xl8';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM refs
    const rowsEl = document.getElementById('rows');
    const statusEl = document.getElementById('status');
    const form = document.getElementById('addForm');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const emptyEl = document.getElementById('empty');
    const searchInput = document.getElementById('search');
    const themeToggle = document.getElementById('themeToggle');
    const root = document.documentElement;

    // Theme init
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') root.setAttribute('data-theme','light');
    function updateThemeButton() {
      const isLight = root.getAttribute('data-theme') === 'light';
      themeToggle.textContent = isLight ? 'Dark mode' : 'Light mode';
      themeToggle.setAttribute('aria-label', isLight ? 'Switch to dark mode' : 'Switch to light mode');
    }
    themeToggle.addEventListener('click', () => {
      const isLight = root.getAttribute('data-theme') === 'light';
      if (isLight) { root.removeAttribute('data-theme'); localStorage.setItem('theme','dark'); }
      else { root.setAttribute('data-theme','light'); localStorage.setItem('theme','light'); }
      updateThemeButton();
    });
    updateThemeButton();

    // State
    let dataCache = [];

    // Helpers
    function formatDate(d){
      if(!d) return '—';
      const dt = new Date(d + 'T00:00:00');
      return dt.toLocaleDateString();
    }
    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    // Render list with inline More actions (Edit/Delete)
    function renderList(items){
      rowsEl.innerHTML = '';
      if(!items.length){ emptyEl.style.display = 'block'; return; }
      emptyEl.style.display = 'none';

      items.forEach(row => {
        const wrapper = document.createElement('div');
        wrapper.className = 'item';
        wrapper.dataset.id = row.id;

        wrapper.innerHTML = `
          <div style="flex:1;min-width:0;display:flex;justify-content:space-between;align-items:center;gap:12px">
            <div style="min-width:0;flex:1">
              <div class="name" data-field="name">${escapeHtml(row.name)}</div>
              <div class="meta" data-field="notes">${escapeHtml(row.notes || '')}</div>
            </div>
            <div class="display-right">
              <div class="date" data-field="overtime_date">${formatDate(row.overtime_date)}</div>
              <div class="actions-inline" aria-hidden="false">
                <button class="btn-ghost" data-action="edit">Edit</button>
                <button class="btn-ghost" data-action="delete">Delete</button>
              </div>
            </div>
          </div>
        `;
        rowsEl.appendChild(wrapper);
      });
    }

    // Load rows from Supabase
    async function loadRows(){
      statusEl.textContent = 'Loading...';
      try {
        const { data, error } = await supabase
          .from('overtime_data')
          .select('id, name, notes, overtime_date')
          .order('id', { ascending: true });

        if (error) throw error;
        dataCache = data || [];
        renderList(dataCache);
        statusEl.textContent = `Loaded ${dataCache.length} rows`;
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error loading data';
      }
    }

    // Add new row
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = form.name.value.trim();
      const notes = form.notes.value.trim();
      const overtime_date = form.overtime_date.value || null;
      if (!name) return alert('Name is required');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Adding...';
      try {
        const { data, error } = await supabase
          .from('overtime_data')
          .insert([{ name, notes, overtime_date }])
          .select();

        if (error) throw error;
        dataCache = [...dataCache, ...data];
        renderList(dataCache);
        form.reset();
      } catch (err) {
        console.error(err);
        alert('Insert failed: ' + (err.message || err));
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Add';
      }
    });

    resetBtn.addEventListener('click', () => form.reset());

    // Event delegation for Edit/Delete/Save/Cancel
    rowsEl.addEventListener('click', async (e) => {
      const action = e.target.dataset.action;
      if (!action) return;

      const item = e.target.closest('.item');
      const id = item?.dataset?.id;
      if (!id) return;

      if (action === 'delete') {
        const ok = confirm('Delete this entry? This cannot be undone.');
        if (!ok) return;
        try {
          const { error } = await supabase
            .from('overtime_data')
            .delete()
            .eq('id', id);

          if (error) throw error;
          dataCache = dataCache.filter(r => String(r.id) !== String(id));
          renderList(dataCache);
        } catch (err) {
          console.error(err);
          alert('Delete failed: ' + (err.message || err));
        }
        return;
      }

      if (action === 'edit') {
        enterEditMode(item, id);
        return;
      }

      if (action === 'save') {
        await saveEdit(item, id);
        return;
      }

      if (action === 'cancel') {
        exitEditMode(item, id);
        return;
      }
    });

    // Enter edit mode
    function enterEditMode(item, id) {
      const row = dataCache.find(r => String(r.id) === String(id));
      if (!row) return;

      const editHtml = `
        <div style="flex:1;min-width:0">
          <div class="edit-row">
            <div class="edit-left">
              <input class="edit-input" data-edit="name" value="${escapeHtml(row.name)}" />
              <input class="edit-input" data-edit="notes" value="${escapeHtml(row.notes || '')}" />
            </div>
            <div class="edit-right">
              <input class="edit-input" data-edit="overtime_date" type="date" value="${row.overtime_date || ''}" />
              <div class="actions-inline">
                <button class="btn-ghost" data-action="save">Save</button>
                <button class="btn-ghost" data-action="cancel">Cancel</button>
                <button class="btn-danger" data-action="delete">Delete</button>
              </div>
            </div>
          </div>
        </div>
      `;
      item.innerHTML = editHtml;
      const nameInput = item.querySelector('[data-edit="name"]');
      if (nameInput) nameInput.focus();
    }

    // Exit edit mode without saving
    function exitEditMode(item, id) {
      const row = dataCache.find(r => String(r.id) === String(id));
      if (!row) return;
      item.innerHTML = `
        <div style="flex:1;min-width:0;display:flex;justify-content:space-between;align-items:center;gap:12px">
          <div style="min-width:0;flex:1">
            <div class="name" data-field="name">${escapeHtml(row.name)}</div>
            <div class="meta" data-field="notes">${escapeHtml(row.notes || '')}</div>
          </div>
          <div class="display-right">
            <div class="date" data-field="overtime_date">${formatDate(row.overtime_date)}</div>
            <div class="actions-inline" aria-hidden="false">
              <button class="btn-ghost" data-action="edit">Edit</button>
              <button class="btn-ghost" data-action="delete">Delete</button>
            </div>
          </div>
        </div>
      `;
    }

    // Save edit
    async function saveEdit(item, id) {
      const nameInput = item.querySelector('[data-edit="name"]');
      const notesInput = item.querySelector('[data-edit="notes"]');
      const dateInput = item.querySelector('[data-edit="overtime_date"]');

      const name = nameInput?.value.trim();
      const notes = notesInput?.value.trim();
      const overtime_date = dateInput?.value || null;

      if (!name) { alert('Name is required'); nameInput?.focus(); return; }

      const saveBtn = item.querySelector('[data-action="save"]');
      if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving...'; }

      try {
        const { data, error } = await supabase
          .from('overtime_data')
          .update({ name, notes, overtime_date })
          .eq('id', id)
          .select();

        if (error) throw error;
        if (data && data.length) {
          const updated = data[0];
          dataCache = dataCache.map(r => (String(r.id) === String(id) ? updated : r));
        } else {
          dataCache = dataCache.map(r => (String(r.id) === String(id) ? { ...r, name, notes, overtime_date } : r));
        }
        exitEditMode(item, id);
      } catch (err) {
        console.error(err);
        alert('Update failed: ' + (err.message || err));
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
      }
    }

    // Search filter (client-side)
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) return renderList(dataCache);
      const filtered = dataCache.filter(r =>
        (r.name || '').toLowerCase().includes(q) ||
        (r.notes || '').toLowerCase().includes(q) ||
        (r.overtime_date || '').includes(q)
      );
      renderList(filtered);
    });

    // Initial load
    window.addEventListener('DOMContentLoaded', loadRows);
  </script>
</body>
</html>
