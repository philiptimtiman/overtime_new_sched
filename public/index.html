<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Overtime Scheduler — Improved Search Contrast</title>
  <meta name="description" content="Supabase single-file UI with improved search box contrast and placeholder readability" />
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --text:#e6eef8;
      --text-muted:#9fb0c6;
      --accent:#60a5fa;
      --accent-2:#7ee7c7;
      --danger:#ef4444;
      --radius:12px;
      --glass: rgba(255,255,255,0.03);
      --shadow: 0 8px 30px rgba(2,6,23,0.6);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Segoe UI Mono", monospace;
      --input-height:44px;
      --search-bg: rgba(255,255,255,0.04);
      --search-border: rgba(255,255,255,0.12);
      --search-placeholder: rgba(255,255,255,0.55);
      --search-text: var(--text);
    }

    /* Light theme override */
    [data-theme="light"]{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --text-muted:#6b7280;
      --accent:#2563eb;
      --accent-2:#06b6d4;
      --glass: rgba(0,0,0,0.03);
      --shadow: 0 6px 18px rgba(15,23,42,0.06);
      --search-bg: rgba(0,0,0,0.03);
      --search-border: rgba(15,23,42,0.08);
      --search-placeholder: rgba(15,23,42,0.45);
      --search-text: var(--text);
    }

    /* Reset + layout */
    *, *::before, *::after { box-sizing: border-box; }
    html,body{height:100%}
    body{
      margin:0;
      min-height:100%;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: var(--bg);
      padding:18px;
      color: var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      -webkit-tap-highlight-color: transparent;
    }

    .container{
      max-width:980px;
      margin:0 auto;
      display:grid;
      grid-template-columns: 1fr 380px;
      gap:20px;
      align-items:start;
    }

    header{
      grid-column:1 / -1;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:6px;
    }
    h1{font-size:20px;margin:0}
    p.lead{margin:0;color:var(--text-muted);font-size:13px}

    .card{
      background: var(--card);
      border-radius:12px;
      padding:16px;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,0.04);
      color:var(--text);
    }

    /* Search box improved contrast */
    .controls{display:flex;gap:8px;align-items:center}
    .search{
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--search-border);
      background: var(--search-bg);
      color: var(--search-text);
      min-width:160px;
      width:100%;
      max-width:420px;
      height: var(--input-height);
      outline:none;
      font-size:14px;
      transition: box-shadow .12s ease, border-color .12s ease, background .12s ease;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }
    .search:focus{
      box-shadow: 0 6px 18px rgba(96,165,250,0.08);
      border-color: var(--accent);
      background: rgba(255,255,255,0.06);
    }
    /* Placeholder colors for readability */
    .search::placeholder { color: var(--search-placeholder); opacity:1; }
    /* For older browsers */
    .search::-webkit-input-placeholder { color: var(--search-placeholder); }
    .search:-ms-input-placeholder { color: var(--search-placeholder); }

    /* Ensure high contrast when user prefers it */
    @media (prefers-contrast: more) {
      .search { border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.06); }
      .search::placeholder { color: rgba(255,255,255,0.75); }
    }

    /* Inputs and layout (rest of UI) */
    form{display:flex;flex-direction:column;gap:10px}
    label{font-size:13px;color:var(--text-muted);display:block}
    input[type="text"], input[type="date"], textarea{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.04);
      background:transparent;
      outline:none;
      font-size:14px;
      color:var(--text);
      transition:box-shadow .12s, border-color .12s;
      min-width:0;
      height: var(--input-height);
      line-height:1.1;
      box-sizing:border-box;
    }
    textarea{min-height:84px;resize:vertical;padding-top:10px;padding-bottom:10px;height:auto}
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.28); }
    input:focus, textarea:focus{ box-shadow:0 6px 18px rgba(96,165,250,0.08); border-color:var(--accent); }

    .row{ display:flex; gap:8px; align-items:flex-start; }
    .row > *{ flex:1 1 0; min-width:0; }

    .actions{display:flex;gap:8px;align-items:center}
    button{
      background:linear-gradient(180deg,var(--accent), #1e40af);
      color:white;
      border:0;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      transition:transform .08s ease, box-shadow .08s;
    }
    button.secondary{
      background:transparent;
      color:var(--text-muted);
      border:1px solid rgba(255,255,255,0.04);
      font-weight:600;
    }

    /* List */
    .list{ display:flex; flex-direction:column; gap:12px; }
    .item{
      padding:12px;
      border-radius:10px;
      background:var(--glass);
      border:1px solid rgba(255,255,255,0.04);
      transition:transform .12s ease, box-shadow .12s;
      color:var(--text);
      min-height:56px;
    }
    .item:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
    .meta{color:var(--text-muted);font-size:13px}
    .name{font-weight:700;color:var(--text)}
    .date{font-family:var(--mono);font-size:13px;color:var(--accent-2); margin-top:6px; }

    .actions-inline{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .edit-input{ width:100%; padding:8px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.06); background:transparent; color:var(--text); height: var(--input-height); box-sizing: border-box; }

    /* Responsive */
    @media (max-width:760px){
      body{padding:12px}
      .container{grid-template-columns:1fr; gap:12px}
      header{flex-direction:column;align-items:flex-start;gap:10px}
      .controls{width:100%;display:flex;gap:8px}
      .search{flex:1}
      .card{padding:12px}
      .item{padding:10px}
      .date{font-size:12px}
      .row{flex-direction:column}
      .actions{flex-direction:row;flex-wrap:wrap}
      .actions button{flex:1 1 auto; min-width:0}
    }

    /* Accessibility: focus outline for keyboard users */
    .search:focus-visible, input:focus-visible, textarea:focus-visible, button:focus-visible {
      outline: 3px solid rgba(96,165,250,0.18);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <header>
      <div>
        <h1>Overtime Scheduler</h1>
        <p class="lead">Improved search contrast for readability</p>
      </div>
      <div class="controls">
        <input id="search" class="search" placeholder="Search name or notes" aria-label="Search name or notes" />
        <button id="themeToggle" class="secondary" title="Toggle theme">Toggle</button>
      </div>
    </header>

    <section class="card list" aria-live="polite">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <strong>Entries</strong>
        <span id="status">Idle</span>
      </div>

      <div id="rows" style="display:flex;flex-direction:column;gap:12px;margin-top:8px"></div>
      <div id="empty" class="meta" style="display:none">No entries yet.</div>

      <div class="tips" id="tips" style="margin-top:12px;padding:10px;border-radius:10px;background:rgba(255,255,255,0.02);color:var(--text-muted);font-size:13px;line-height:1.35;">
        Tips: Search box now has higher contrast and a clearer placeholder for both dark and light themes.
      </div>
    </section>

    <aside class="card">
      <strong style="display:block;margin-bottom:8px">Add Overtime</strong>
      <form id="addForm" autocomplete="off">
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Employee name" required />
        </div>

        <div class="row">
          <div>
            <label for="overtime_date">Date</label>
            <input id="overtime_date" name="overtime_date" type="date" />
          </div>
          <div>
            <label for="notes">Notes</label>
            <input id="notes" name="notes" type="text" placeholder="Short note" />
          </div>
        </div>

        <div class="actions" style="margin-top:6px">
          <button id="submitBtn" type="submit">Add</button>
          <button type="button" class="secondary" id="resetBtn">Reset</button>
        </div>
      </form>
    </aside>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // Replace with your Supabase values
    const SUPABASE_URL = 'https://bisvmgjgyvludhqsvvcn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpc3ZtZ2pneXZsdWRocXN2dmNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTI1ODMsImV4cCI6MjA4NzI2ODU4M30.eodsmChKwoEiPlNz9d2Ge3lAmO3BWfdKRWVRdgk9Xl8';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM
    const rowsEl = document.getElementById('rows');
    const statusEl = document.getElementById('status');
    const form = document.getElementById('addForm');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const emptyEl = document.getElementById('empty');
    const searchInput = document.getElementById('search');
    const themeToggle = document.getElementById('themeToggle');
    const root = document.documentElement;

    // Theme init
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') root.setAttribute('data-theme','light');
    function updateThemeButton() {
      const isLight = root.getAttribute('data-theme') === 'light';
      themeToggle.textContent = isLight ? 'Dark mode' : 'Light mode';
      themeToggle.setAttribute('aria-label', isLight ? 'Switch to dark mode' : 'Switch to light mode');
    }
    themeToggle.addEventListener('click', () => {
      const isLight = root.getAttribute('data-theme') === 'light';
      if (isLight) { root.removeAttribute('data-theme'); localStorage.setItem('theme','dark'); }
      else { root.setAttribute('data-theme','light'); localStorage.setItem('theme','light'); }
      updateThemeButton();
    });
    updateThemeButton();

    // State
    let dataCache = [];

    function formatDate(d){
      if(!d) return '—';
      const dt = new Date(d + 'T00:00:00');
      return dt.toLocaleDateString();
    }
    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    function renderList(items){
      rowsEl.innerHTML = '';
      if(!items.length){ emptyEl.style.display = 'block'; return; }
      emptyEl.style.display = 'none';
      items.forEach(row => {
        const wrapper = document.createElement('div');
        wrapper.className = 'item';
        wrapper.dataset.id = row.id;
        wrapper.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;width:100%">
            <div style="flex:1;min-width:0">
              <div class="name" data-field="name">${escapeHtml(row.name)}</div>
              <div class="meta" data-field="notes">${escapeHtml(row.notes || '')}</div>
              <div class="date" data-field="overtime_date">${formatDate(row.overtime_date)}</div>
            </div>
            <div style="min-width:120px;display:flex;justify-content:flex-end;gap:8px">
              <button class="btn-ghost" data-action="edit">Edit</button>
              <button class="btn-ghost" data-action="delete">Delete</button>
            </div>
          </div>
        `;
        rowsEl.appendChild(wrapper);
      });
    }

    async function loadRows(){
      statusEl.textContent = 'Loading...';
      try {
        const { data, error } = await supabase
          .from('overtime_data')
          .select('id, name, notes, overtime_date')
          .order('id', { ascending: true });

        if (error) throw error;
        dataCache = data || [];
        renderList(dataCache);
        statusEl.textContent = `Loaded ${dataCache.length} rows`;
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error loading data';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = form.name.value.trim();
      const notes = form.notes.value.trim();
      const overtime_date = form.overtime_date.value || null;
      if (!name) return alert('Name is required');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Adding...';
      try {
        const { data, error } = await supabase
          .from('overtime_data')
          .insert([{ name, notes, overtime_date }])
          .select();

        if (error) throw error;
        dataCache = [...dataCache, ...data];
        renderList(dataCache);
        form.reset();
      } catch (err) {
        console.error(err);
        alert('Insert failed: ' + (err.message || err));
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Add';
      }
    });

    resetBtn.addEventListener('click', () => form.reset());

    // Simple client-side search (filters cached rows)
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) return renderList(dataCache);
      const filtered = dataCache.filter(r =>
        (r.name || '').toLowerCase().includes(q) ||
        (r.notes || '').toLowerCase().includes(q) ||
        (r.overtime_date || '').includes(q)
      );
      renderList(filtered);
    });

    // Delegated actions (edit/delete/save/cancel) omitted here for brevity — keep your existing handlers
    // Initial load
    window.addEventListener('DOMContentLoaded', loadRows);
  </script>
</body>
</html>
