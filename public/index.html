<!doctype html>
<html lang="tl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Overtime Scheduler — Swipeable Rows</title>
  <meta name="description" content="Overtime Scheduler with touch-friendly scrolling and drag-to-scroll for long lists." />
  <style>
    :root{
      --accent:#10b981; --accent-2:#059669;
      --bg-top:#04251f; --bg-bottom:#0b3b36;
      --text:#e6f7f2; --muted:#9fcfc3; --danger:#ef4444;
      --card-bg-top: rgba(8,40,34,0.06);
      --card-bg-bottom: rgba(6,30,26,0.03);

      --input-h:40px; --radius:10px; --mobile-width:360px;
      --base-font:15px; --theme-transition:220ms ease;
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0;padding:0;background:transparent;color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;font-size:var(--base-font)}
    button,input,textarea{font-family:inherit}
    .canvas{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px}
    .app{
      width:var(--mobile-width);max-width:100%;display:flex;flex-direction:column;gap:12px;align-items:stretch;
      background:linear-gradient(180deg,var(--bg-top),var(--bg-bottom));border-radius:14px;padding:10px;
      box-shadow:0 14px 36px rgba(2,10,8,0.45);border:1px solid rgba(255,255,255,0.03);backdrop-filter:blur(4px);
      transition:background var(--theme-transition),color var(--theme-transition);
    }
    .card{background:linear-gradient(180deg,var(--card-bg-top),var(--card-bg-bottom));border-radius:var(--radius);padding:12px;box-shadow:0 8px 20px rgba(2,6,23,0.45);border:1px solid rgba(255,255,255,0.04)}
    .header.card{display:flex;flex-direction:column;gap:8px}
    .brand{display:flex;flex-direction:column;align-items:center}
    .brand h1{margin:0;font-size:1rem}
    .brand p{margin:0;color:var(--muted);font-size:.85rem}

    .controls{display:flex;gap:8px;align-items:center}
    .search{flex:1;border-radius:8px;padding:8px 10px;height:var(--input-h);border:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.12);color:var(--text)}

    /* Theme swatches (kept from previous) */
    .theme-row{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:6px}
    .theme-swatch{width:36px;height:36px;border-radius:999px;border:2px solid rgba(255,255,255,0.06);display:inline-flex;align-items:center;justify-content:center;padding:0;background:transparent}
    .theme-swatch .dot{width:24px;height:24px;border-radius:999px}
    .swatch-ocean .dot{background:linear-gradient(180deg,#4f46e5,#3b82f6)}
    .swatch-warm .dot{background:linear-gradient(180deg,#ff7a59,#ff5a36)}
    .swatch-forest .dot{background:linear-gradient(180deg,#10b981,#059669)}
    .swatch-violet .dot{background:linear-gradient(180deg,#d946ef,#a78bfa)}
    .theme-swatch.active{transform:scale(1.06);box-shadow:0 8px 26px rgba(0,0,0,0.32);border-color:transparent}

    .meta{font-size:.82rem;color:var(--muted);text-align:center}

    /* LIST area: make it scrollable with a fixed max-height so long lists can scroll */
    .list-wrap{
      /* set a comfortable max height so header + form remain visible on small screens */
      max-height: 44vh; /* adjust as needed (e.g., 50vh) */
      overflow: auto;
      -webkit-overflow-scrolling: touch; /* native momentum scrolling on iOS */
      border-radius:10px;
      padding:6px;
      /* subtle background so list stands out */
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));
      border:1px solid rgba(255,255,255,0.02);
      /* allow pointer-based drag-to-scroll (we'll implement JS) */
      touch-action: pan-y;
    }

    .list{display:flex;flex-direction:column;gap:8px;padding:4px}
    .item{display:flex;flex-direction:column;gap:8px;padding:10px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.03)}
    .item-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .notes{color:var(--muted);font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .date-pill{min-width:84px;text-align:center;padding:6px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.02)}

    .item-actions{display:flex;gap:6px;align-items:center}
    .btn{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#fff;border:0;padding:8px 10px;border-radius:10px;font-weight:600}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted)}

    /* small visual hint for drag-to-scroll when list is scrollable */
    .drag-hint{font-size:.78rem;color:var(--muted);text-align:center;padding:6px 0}

    /* make interactive elements not start drag-to-scroll */
    .no-drag { touch-action: manipulation; -ms-touch-action: manipulation; }

    @media (max-width:420px){
      .list-wrap{max-height:50vh}
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div id="appRoot" class="app" role="application" aria-label="Overtime Scheduler — Swipeable Rows" data-theme="forest">
      <header class="card header" aria-labelledby="appTitle">
        <div class="brand">
          <h1 id="appTitle">Overtime Scheduler</h1>
          <p class="meta">Locked by default — unlock to add or edit</p>
        </div>

        <div class="controls" role="search" style="margin-top:6px">
          <input id="search" class="search" placeholder="Search name or notes" aria-label="Search entries" />
          <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
            <div id="lockIndicator" style="width:10px;height:10px;border-radius:50%;background:#ef4444"></div>
            <button id="openUnlock" class="btn ghost no-drag" title="Unlock actions" style="margin-left:8px">Unlock</button>
          </div>
        </div>

        <div class="theme-row" role="toolbar" aria-label="Theme switcher" style="margin-top:8px">
          <button class="theme-swatch swatch-ocean" data-theme="ocean" aria-label="Ocean Indigo" title="Ocean Indigo" type="button"><span class="dot" aria-hidden="true"></span></button>
          <button class="theme-swatch swatch-warm" data-theme="warm" aria-label="Warm Sunset" title="Warm Sunset" type="button"><span class="dot" aria-hidden="true"></span></button>
          <button class="theme-swatch swatch-forest active" data-theme="forest" aria-label="Forest Teal" title="Forest Teal" type="button"><span class="dot" aria-hidden="true"></span></button>
          <button class="theme-swatch swatch-violet" data-theme="violet" aria-label="Violet Glow" title="Violet Glow" type="button"><span class="dot" aria-hidden="true"></span></button>
        </div>
      </header>

      <main class="card" aria-live="polite">
        <div style="display:flex;flex-direction:column;gap:10px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <strong>Entries</strong>
            <span id="status" class="meta">Idle</span>
          </div>

          <!-- Scrollable list wrapper -->
          <div id="listWrap" class="list-wrap" aria-live="polite" aria-label="Overtime entries list">
            <div id="rows" class="list"></div>
          </div>

          <div class="drag-hint">Swipe up/down or drag to scroll</div>
        </div>
      </main>

      <aside id="formCard" class="card" aria-labelledby="addOvertimeTitle">
        <strong id="addOvertimeTitle" style="display:block;text-align:center;font-size:1rem">Add Overtime</strong>

        <form id="addForm" autocomplete="off" novalidate>
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" class="lock-guard no-drag" type="text" placeholder="Employee name" required />
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="field">
              <label for="overtime_date_text">Date</label>
              <div style="position:relative;display:flex;align-items:center;gap:8px">
                <input id="overtime_date_text" name="overtime_date_text" class="date-text lock-guard no-drag" type="text" placeholder="YYYY-MM-DD" aria-label="Overtime date" readonly />
                <button type="button" id="datePickerBtn" class="btn ghost no-drag" aria-label="Open date picker">📅</button>
                <input id="overtime_date_native" class="native-date no-drag" type="date" style="position:absolute;right:6px;opacity:0" />
              </div>
            </div>

            <div class="field">
              <label for="notes">Notes</label>
              <input id="notes" name="notes" class="lock-guard no-drag" type="text" placeholder="Short note" />
            </div>
          </div>

          <div style="margin-top:10px;display:flex;gap:8px;flex-direction:column">
            <button id="submitBtn" class="btn lock-guard no-drag" type="submit">Add</button>
            <button id="resetBtn" type="button" class="btn ghost no-drag">Reset</button>
          </div>
        </form>
      </aside>

      <footer style="text-align:center;color:var(--muted);font-size:.8rem;padding:6px 0">
        <div style="font-weight:700">BoxTechHub™</div>
        <div style="font-size:.75rem;margin-top:4px">© 2026 BoxTechHub</div>
      </footer>
    </div>
  </div>

  <!-- modal (unchanged) -->
  <div id="modalBackdrop" style="display:none;position:fixed;inset:0;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);z-index:9999" role="dialog" aria-modal="true" aria-hidden="true">
    <div style="background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);width:320px">
      <h3 style="margin:0 0 8px 0">Unlock Actions</h3>
      <p style="margin:0 0 8px;color:var(--muted)">Enter password to enable Add / Edit / Delete</p>
      <input id="pwInput" type="password" placeholder="Password" style="width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);margin-bottom:8px;height:40px" />
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button id="pwCancel" class="btn ghost">Cancel</button>
        <button id="pwSubmit" class="btn">Submit</button>
      </div>
      <div id="pwError" style="color:var(--danger);margin-top:8px;display:none"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const SUPABASE_URL = 'https://bisvmgjgyvludhqsvvcn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpc3ZtZ2pneXZsdWRocXN2dmNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTI1ODMsImV4cCI6MjA4NzI2ODU4M30.eodsmChKwoEiPlNz9d2Ge3lAmO3BWfdKRWVRdgk9Xl8';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const appRoot = document.getElementById('appRoot');
    const rowsEl = document.getElementById('rows');
    const listWrap = document.getElementById('listWrap');
    const statusEl = document.getElementById('status');
    const form = document.getElementById('addForm');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const searchInput = document.getElementById('search');
    const openUnlock = document.getElementById('openUnlock');
    const lockIndicator = document.getElementById('lockIndicator');

    const modalBackdrop = document.getElementById('modalBackdrop');
    const pwInput = document.getElementById('pwInput');
    const pwSubmit = document.getElementById('pwSubmit');
    const pwCancel = document.getElementById('pwCancel');
    const pwError = document.getElementById('pwError');

    const dateText = document.getElementById('overtime_date_text');
    const dateNative = document.getElementById('overtime_date_native');
    const dateBtn = document.getElementById('datePickerBtn');

    const swatches = Array.from(document.querySelectorAll('.theme-swatch'));
    const THEME_KEY = 'overtime_theme_v1';
    const LOCAL_KEY = 'overtime_unlocked_v2';

    let dataCache = [];
    let unlocked = false;

    function safeGetLocal(key){ try { return localStorage.getItem(key); } catch (e) { return null; } }
    function safeSetLocal(key, value){ try { localStorage.setItem(key, value); return true; } catch (e) { return false; } }
    function formatDate(d){ if(!d) return '—'; return new Date(d + 'T00:00:00').toLocaleDateString(); }
    function isoDateFromText(s){ if(!s) return null; const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/); return m ? `${m[1]}-${m[2]}-${m[3]}` : null; }
    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    // Theme handling (batched)
    function applyTheme(theme){
      if (!theme) theme = 'forest';
      swatches.forEach(btn => btn.classList.remove('active'));
      requestAnimationFrame(() => {
        appRoot.setAttribute('data-theme', theme);
        requestAnimationFrame(() => {
          swatches.forEach(btn => btn.classList.toggle('active', btn.dataset.theme === theme));
          safeSetLocal(THEME_KEY, theme);
        });
      });
    }
    (function initTheme(){ const saved = safeGetLocal(THEME_KEY) || 'forest'; applyTheme(saved); })();
    swatches.forEach(btn => {
      btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
      btn.addEventListener('keydown', (ev) => { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); btn.click(); } });
    });

    // Update controls
    function updateGuardedControls(){
      document.querySelectorAll('.lock-guard').forEach(el => unlocked ? el.removeAttribute('disabled') : el.setAttribute('disabled','true'));
      lockIndicator.style.background = unlocked ? '#60a5fa' : '#ef4444';
      openUnlock.textContent = unlocked ? 'Lock' : 'Unlock';
      if (!unlocked) appRoot.classList.add('actions-hidden'); else appRoot.classList.remove('actions-hidden');
      if (!unlocked) appRoot.classList.add('form-hidden'); else appRoot.classList.remove('form-hidden');
    }
    function setUnlockedState(state, persist = true){
      unlocked = !!state; updateGuardedControls(); if (persist) safeSetLocal(LOCAL_KEY, unlocked ? 'true' : 'false');
    }

    function openModal(){ modalBackdrop.style.display='flex'; modalBackdrop.setAttribute('aria-hidden','false'); pwInput.value=''; pwError.style.display='none'; pwInput.focus(); }
    function closeModal(){ modalBackdrop.style.display='none'; modalBackdrop.setAttribute('aria-hidden','true'); pwError.style.display='none'; }

    async function submitPassword(password){
      try {
        pwError.style.display='block'; pwError.textContent='Checking...';
        const res = await fetch('/api/unlock', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password }) });
        const raw = await res.text();
        let parsed;
        try { parsed = raw ? JSON.parse(raw) : null; } catch(e){ parsed = null; }
        if (!res.ok) { const msg = parsed?.error || parsed?.message || raw || `HTTP ${res.status}`; pwError.textContent = `Server: ${msg}`; return; }
        setUnlockedState(true, true); closeModal();
      } catch (err) { console.error(err); pwError.textContent='Network or server error.'; }
    }

    // Date picker overlay
    (function attachNativeOverlay(){
      try {
        if (!dateNative || !dateText || !dateBtn) return;
        dateNative.addEventListener('change', () => dateText.value = dateNative.value || '');
        function openNativePicker(initialIso){
          if (initialIso && /^\d{4}-\d{2}-\d{2}$/.test(initialIso)) dateNative.value = initialIso; else dateNative.value = '';
          if (typeof dateNative.showPicker === 'function') dateNative.showPicker(); else { dateNative.focus(); try { dateNative.click(); } catch(e){} }
        }
        dateBtn.addEventListener('click', () => openNativePicker(isoDateFromText(dateText.value)));
        dateText.addEventListener('click', () => openNativePicker(isoDateFromText(dateText.value)));
      } catch(e){ console.warn('Date overlay attach failed', e); }
    })();

    // Render rows
    function createRowElement(row){
      const el = document.createElement('div');
      el.className = 'item';
      el.dataset.id = row.id;
      el.innerHTML = `
        <div class="item-top">
          <div style="flex:1;min-width:0">
            <div class="name" data-field="name">${escapeHtml(row.name)}</div>
            <div class="notes" data-field="notes">${escapeHtml(row.notes || '')}</div>
          </div>
          <div style="margin-left:8px">
            <div class="date-pill" data-field="overtime_date">${row.overtime_date ? formatDate(row.overtime_date) : '—'}</div>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:6px">
          <div class="item-actions">
            <button class="btn ghost no-drag" data-action="edit">Edit</button>
            <button class="btn ghost no-drag" data-action="delete">Delete</button>
          </div>
        </div>
      `;
      return el;
    }
    function renderList(items){
      rowsEl.innerHTML = '';
      if (!items || !items.length) { rowsEl.innerHTML = ''; statusEl.textContent = 'No entries'; return; }
      items.forEach(r => rowsEl.appendChild(createRowElement(r)));
      statusEl.textContent = `Loaded ${items.length} entries`;
    }

    // Load rows from supabase
    async function loadRows(){
      statusEl.textContent = 'Loading...';
      try {
        const { data, error } = await supabase.from('overtime_data').select('id,name,notes,overtime_date').order('overtime_date',{ascending:true});
        if (error) throw error;
        dataCache = (data || []);
        renderList(dataCache);
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error loading data';
      }
    }

    // Add form submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!unlocked) { alert('Actions are locked. Unlock to add entries.'); return; }
      const name = form.name.value.trim();
      const notes = form.notes.value.trim();
      const overtime_date = isoDateFromText(dateText.value) || null;
      if (!name) { alert('Name is required'); return; }
      submitBtn.disabled = true; submitBtn.textContent = 'Adding...';
      try {
        const { data, error } = await supabase.from('overtime_data').insert([{ name, notes, overtime_date }]).select();
        if (error) throw error;
        dataCache = [...dataCache, ...(data||[])];
        renderList(dataCache);
        form.reset(); dateText.value = '';
        // scroll to bottom to show new entry
        requestAnimationFrame(()=> listWrap.scrollTop = listWrap.scrollHeight);
      } catch (err) {
        console.error(err);
        alert('Insert failed: ' + (err.message || err));
      } finally {
        submitBtn.disabled = false; submitBtn.textContent = 'Add';
      }
    });

    resetBtn.addEventListener('click', () => { form.reset(); dateText.value = ''; });

    // Row actions (edit/delete)
    rowsEl.addEventListener('click', async (ev) => {
      const action = ev.target?.dataset?.action;
      if (!action) return;
      const item = ev.target.closest('.item');
      const id = item?.dataset?.id;
      if (!id) return;

      if (action === 'delete') {
        if (!unlocked) { alert('Actions are locked. Unlock to delete.'); return; }
        if (!confirm('Delete this entry? This cannot be undone.')) return;
        try {
          const { error } = await supabase.from('overtime_data').delete().eq('id', id);
          if (error) throw error;
          dataCache = dataCache.filter(r => String(r.id) !== String(id));
          renderList(dataCache);
        } catch (err) {
          console.error(err);
          alert('Delete failed: ' + (err.message || err));
        }
        return;
      }

      if (action === 'edit') {
        if (!unlocked) { alert('Actions are locked. Unlock to edit.'); return; }
        const row = dataCache.find(r => String(r.id) === String(id));
        if (!row) return;
        item.classList.add('editing');
        item.innerHTML = `
          <div style="display:flex;flex-direction:column;gap:8px">
            <input class="edit-input" data-edit="name" type="text" value="${escapeHtml(row.name)}" />
            <div style="display:flex;gap:8px;align-items:center">
              <input class="edit-input" data-edit="overtime_date" type="date" value="${row.overtime_date || ''}" style="flex:1;max-width:100%;box-sizing:border-box" />
            </div>
            <input class="edit-input" data-edit="notes" type="text" value="${escapeHtml(row.notes || '')}" />
            <div style="display:flex;gap:8px">
              <button class="btn ghost" data-action="save">Save</button>
              <button class="btn ghost" data-action="cancel">Cancel</button>
            </div>
          </div>
        `;
        return;
      }

      if (action === 'save') {
        if (!unlocked) { alert('Actions are locked. Unlock to save.'); return; }
        const inputs = item.querySelectorAll('.edit-input');
        const name = inputs[0]?.value.trim();
        const overtime_date = inputs[1]?.value || null;
        const notes = inputs[2]?.value.trim();
        if (!name) { alert('Name required'); return; }
        try {
          const { data, error } = await supabase.from('overtime_data').update({ name, notes, overtime_date }).eq('id', id).select();
          if (error) throw error;
          dataCache = dataCache.map(r => String(r.id) === String(id) ? (data && data[0]) || { ...r, name, notes, overtime_date } : r);
          renderList(dataCache);
        } catch (err) {
          console.error(err);
          alert('Update failed: ' + (err.message || err));
        }
        return;
      }

      if (action === 'cancel') {
        renderList(dataCache);
        return;
      }
    });

    // Search filter
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) return renderList(dataCache);
      const filtered = dataCache.filter(r =>
        (r.name||'').toLowerCase().includes(q) ||
        (r.notes||'').toLowerCase().includes(q) ||
        (r.overtime_date||'').includes(q)
      );
      renderList(filtered);
    });

    // Unlock modal handlers
    openUnlock.addEventListener('click', () => { if (!unlocked) openModal(); else { if (!confirm('Lock actions?')) return; setUnlockedState(false, true); } });
    pwSubmit.addEventListener('click', () => submitPassword(pwInput.value || '') );
    pwCancel.addEventListener('click', () => closeModal());
    pwInput.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); pwSubmit.click(); } });

    // ---------------------------
    // Drag-to-scroll implementation
    // ---------------------------
    // Behavior:
    // - Allows dragging the list area (mouse or touch) to scroll vertically.
    // - Does not start drag when the initial target is an interactive element (buttons, inputs) — those have .no-drag class.
    // - Uses pointer events for unified handling (works for mouse, touch, pen).
    (function enableDragToScroll(){
      let isDown = false;
      let startY = 0;
      let startScroll = 0;
      let activePointerId = null;
      const MIN_MOVE_TO_START = 6; // small threshold to avoid accidental drags

      function onPointerDown(e){
        // only left mouse button or touch/pen
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        // if the initial target (or its ancestor) has .no-drag, don't start drag
        if (e.target.closest('.no-drag')) return;
        isDown = true;
        activePointerId = e.pointerId;
        startY = e.clientY;
        startScroll = listWrap.scrollTop;
        listWrap.setPointerCapture(activePointerId);
        // add a class for possible styling (not required)
        listWrap.classList.add('dragging');
      }

      function onPointerMove(e){
        if (!isDown || e.pointerId !== activePointerId) return;
        const dy = e.clientY - startY;
        // if small movement, don't update yet (prevents accidental drags)
        if (Math.abs(dy) < MIN_MOVE_TO_START) return;
        // invert dy because dragging up should scroll down
        listWrap.scrollTop = startScroll - dy;
      }

      function endDrag(e){
        if (!isDown || e.pointerId !== activePointerId) return;
        isDown = false;
        try { listWrap.releasePointerCapture(activePointerId); } catch(_) {}
        activePointerId = null;
        listWrap.classList.remove('dragging');
      }

      // attach listeners
      listWrap.addEventListener('pointerdown', onPointerDown, { passive: true });
      window.addEventListener('pointermove', onPointerMove, { passive: true });
      window.addEventListener('pointerup', endDrag);
      window.addEventListener('pointercancel', endDrag);

      // Also support quick flick with wheel (mouse wheel) — nothing special needed; browser handles it.
      // For accessibility: allow keyboard scrolling when focused
      listWrap.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown') { listWrap.scrollBy({ top: 48, behavior: 'smooth' }); e.preventDefault(); }
        if (e.key === 'ArrowUp') { listWrap.scrollBy({ top: -48, behavior: 'smooth' }); e.preventDefault(); }
        if (e.key === 'PageDown') { listWrap.scrollBy({ top: listWrap.clientHeight * 0.9, behavior: 'smooth' }); e.preventDefault(); }
        if (e.key === 'PageUp') { listWrap.scrollBy({ top: -listWrap.clientHeight * 0.9, behavior: 'smooth' }); e.preventDefault(); }
      });
      // make listWrap focusable for keyboard scrolling
      listWrap.tabIndex = 0;
    })();

    // Initialize: force locked on load (per earlier requirement) and load rows
    window.addEventListener('DOMContentLoaded', async () => {
      setUnlockedState(false, true);
      await loadRows();
    });
  </script>
</body>
</html>
